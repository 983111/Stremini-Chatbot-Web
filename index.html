<style>

/* ═══════════════════════════════════════════════
   LIGHT THEME (warm parchment)
═══════════════════════════════════════════════ */
:root, [data-theme="light"] {
  --bg:#f5f0e8;
  --bg-sub:#ede8df;
  --bg-side:#e8e2d8;
  --bg-hov:rgba(255,255,255,0.55);
  --bg-act:rgba(255,255,255,0.82);
  --bdr:rgba(180,160,130,0.30);
  --bdr-soft:rgba(180,160,130,0.18);
  --tx:#1a1814;
  --tx2:#6b6055;
  --tx3:#a09080;
  --acc:#c96a2b;
  --acc-bg:rgba(201,106,43,0.10);
  --acc-bdr:rgba(201,106,43,0.30);
  --code-bg:rgba(255,255,255,0.65);
  --sh-sm:0 1px 4px rgba(0,0,0,0.06);
  --sh:0 4px 24px rgba(0,0,0,0.10);
  --font:'DM Sans',ui-sans-serif,sans-serif;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --sw:264px;
  --ease:.15s ease;
  /* Sidebar */
  --sb-bg:linear-gradient(175deg,rgba(232,226,216,0.98) 0%,rgba(225,218,206,0.95) 100%);
  --main-bg:linear-gradient(160deg,#ede8df 0%,#e6e0d6 100%);
  --topbar-bg:rgba(237,232,223,0.88);
  /* Shell */
  --shell-bg:rgba(255,255,255,0.55);
  --shell-bdr:rgba(255,255,255,0.80);
  --shell-focus-bdr:rgba(201,106,43,0.35);
  --shell-sh:0 2px 16px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.9);
  --shell-focus-sh:0 4px 24px rgba(0,0,0,0.10),0 0 0 3px rgba(201,106,43,0.07),inset 0 1px 0 rgba(255,255,255,0.95);
  /* Cards */
  --card-bg:rgba(255,255,255,0.45);
  --card-bdr:rgba(255,255,255,0.70);
  --card-sh:0 2px 12px rgba(0,0,0,0.07),inset 0 1px 0 rgba(255,255,255,0.8);
  --card-hover-bg:rgba(255,255,255,0.65);
  --card-hover-sh:0 6px 24px rgba(0,0,0,0.10),inset 0 1px 0 rgba(255,255,255,0.9);
  /* Send btn */
  --send-bg:linear-gradient(145deg,#3d3830,#1a1714);
  --send-sh:0 3px 10px rgba(0,0,0,0.25);
  --send-hover-sh:0 5px 16px rgba(0,0,0,0.28);
  /* bmark */
  --bmark-bg:#1a1714;
  --bmark-sh:0 2px 8px rgba(26,23,20,0.25);
  /* uav */
  --uav-bg:#1a1714;
  --uav-sh:0 2px 6px rgba(0,0,0,0.2);
  /* mav ai */
  --mav-ai-bg:#1a1714;
  --mav-ai-sh:0 2px 6px rgba(0,0,0,0.2);
  /* active ci */
  --ci-active-bg:rgba(255,255,255,0.82);
  --ci-active-bdr:transparent;
  /* auth */
  --auth-bg:#f5f0e8;
  --auth-input-bg:#f5f0e8;
  /* wicon */
  --wicon-grad:linear-gradient(145deg,#d0ccbf 0%,#b8b4a6 20%,#c8c4b6 35%,#9a9690 50%,#b4b0a2 65%,#ccc8ba 80%,#b8b4a6 100%);
  --wicon-sh:0 8px 32px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,0.4);
  --wicon-tx:rgba(60,55,48,0.85);
  --wicon-tx-sh:0 1px 2px rgba(255,255,255,0.5),0 -1px 1px rgba(0,0,0,0.2);
  --wicon-radius:20px;
  --wicon-ring:none;
  /* pattern */
  --pattern:rgba(150,130,100,0.07);
  /* toggle */
  --toggle-bg:rgba(255,255,255,0.45);
  --toggle-bdr:rgba(180,160,130,0.40);
  /* star */
  --star-color:rgba(100,80,50,0.5);
  --star2-color:transparent;
  /* loading */
  --load-bg:#f5f0e8;
}

/* ═══════════════════════════════════════════════
   DARK THEME (deep obsidian + gold)
═══════════════════════════════════════════════ */
[data-theme="dark"] {
  --bg:#141210;
  --bg-sub:#1c1916;
  --bg-side:#111009;
  --bg-hov:rgba(255,255,255,0.06);
  --bg-act:rgba(200,146,42,0.10);
  --bdr:rgba(180,150,80,0.18);
  --bdr-soft:rgba(180,150,80,0.10);
  --tx:#f0ebe0;
  --tx2:#a09070;
  --tx3:#6a6050;
  --acc:#c8922a;
  --acc-bg:rgba(200,146,42,0.10);
  --acc-bdr:rgba(200,146,42,0.28);
  --code-bg:rgba(255,255,255,0.05);
  --sh-sm:0 1px 6px rgba(0,0,0,0.35);
  --sh:0 4px 28px rgba(0,0,0,0.45);
  --font:'DM Sans',ui-sans-serif,sans-serif;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --sw:264px;
  --ease:.15s ease;
  /* Sidebar */
  --sb-bg:linear-gradient(175deg,rgba(18,16,12,0.99) 0%,rgba(15,13,10,0.99) 100%);
  --main-bg:linear-gradient(160deg,#181512 0%,#141210 100%);
  --topbar-bg:rgba(18,15,11,0.92);
  /* Shell */
  --shell-bg:rgba(255,255,255,0.05);
  --shell-bdr:rgba(180,150,80,0.22);
  --shell-focus-bdr:rgba(200,146,42,0.40);
  --shell-sh:0 2px 20px rgba(0,0,0,0.40),inset 0 1px 0 rgba(255,255,255,0.04);
  --shell-focus-sh:0 4px 28px rgba(0,0,0,0.50),0 0 0 3px rgba(200,146,42,0.08);
  /* Cards */
  --card-bg:rgba(255,255,255,0.04);
  --card-bdr:rgba(180,150,80,0.22);
  --card-sh:0 2px 18px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.05);
  --card-hover-bg:rgba(255,255,255,0.07);
  --card-hover-sh:0 6px 28px rgba(0,0,0,0.45),0 0 0 1px rgba(200,146,42,0.12);
  /* Send btn */
  --send-bg:linear-gradient(145deg,#b8781a,#7a4e10);
  --send-sh:0 3px 14px rgba(180,120,20,0.40);
  --send-hover-sh:0 5px 20px rgba(200,146,42,0.55);
  /* bmark */
  --bmark-bg:linear-gradient(145deg,#c8922a,#8a5e10);
  --bmark-sh:0 2px 10px rgba(200,146,42,0.35);
  /* uav */
  --uav-bg:linear-gradient(145deg,#c8922a,#7a5010);
  --uav-sh:0 2px 8px rgba(200,146,42,0.3);
  /* mav ai */
  --mav-ai-bg:linear-gradient(145deg,#c8922a,#7a5010);
  --mav-ai-sh:0 2px 8px rgba(200,146,42,0.3);
  /* active ci */
  --ci-active-bg:rgba(200,146,42,0.10);
  --ci-active-bdr:rgba(200,146,42,0.22);
  /* auth */
  --auth-bg:#181512;
  --auth-input-bg:#1c1916;
  /* wicon */
  --wicon-grad:radial-gradient(circle at 35% 30%,#d4a830 0%,#8a6010 30%,#5a3c08 60%,#3a2405 100%);
  --wicon-sh:0 8px 40px rgba(200,150,20,0.30),0 2px 10px rgba(0,0,0,0.50),inset 0 1px 0 rgba(255,220,100,0.30);
  --wicon-tx:rgba(255,230,150,0.95);
  --wicon-tx-sh:0 1px 3px rgba(0,0,0,0.6),0 0 12px rgba(255,200,50,0.25);
  --wicon-radius:50%;
  --wicon-ring:2px solid rgba(200,150,40,0.30);
  /* pattern */
  --pattern:rgba(180,150,80,0.03);
  /* toggle */
  --toggle-bg:rgba(255,255,255,0.07);
  --toggle-bdr:rgba(180,150,80,0.30);
  /* star */
  --star-color:rgba(210,170,55,0.85);
  --star2-color:rgba(255,220,80,0.35);
  /* loading */
  --load-bg:#141210;
}

/* ═══════════════════════════════════
   RESET & BASE
═══════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--tx);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;transition:background 0.35s,color 0.35s;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px;}

/* Background texture */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--pattern) 1px,transparent 1px),linear-gradient(90deg,var(--pattern) 1px,transparent 1px),repeating-linear-gradient(45deg,transparent,transparent 60px,var(--pattern) 60px,var(--pattern) 61px);
  background-size:40px 40px,40px 40px,auto;
}
/* Dark vignette */
[data-theme="dark"] #app::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,rgba(180,130,30,0.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(120,80,20,0.05) 0%,transparent 50%);
}

/* ═══════════════════════════════════
   LOADING
═══════════════════════════════════ */
#loading{
  position:fixed;inset:0;background:var(--load-bg);
  display:flex;align-items:center;justify-content:center;
  z-index:200;flex-direction:column;gap:14px;
  transition:background 0.35s;
}
.load-logo{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:22px;color:#fff;
  background:var(--bmark-bg);box-shadow:var(--bmark-sh);
  animation:pulse 1.5s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.load-txt{font-size:13.5px;color:var(--tx3);}

/* ═══════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════ */
#auth-screen{
  position:fixed;inset:0;background:var(--auth-bg);
  display:none;align-items:center;justify-content:center;z-index:100;
  transition:background 0.35s;
}
.auth-card{
  width:100%;max-width:400px;padding:40px 36px;
  border:1px solid var(--bdr);border-radius:20px;
  box-shadow:var(--sh);background:var(--bg);
  transition:background 0.35s,border-color 0.35s;
}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.auth-logo .bmark{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:18px;color:#fff;
  background:var(--bmark-bg);box-shadow:var(--bmark-sh);
}
.auth-logo span{font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--tx);}
.auth-tabs{display:flex;border:1px solid var(--bdr);border-radius:10px;padding:3px;margin-bottom:24px;background:var(--bg-sub);}
.auth-tab{flex:1;padding:7px 0;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:13.5px;font-weight:500;color:var(--tx2);border-radius:8px;transition:background var(--ease),color var(--ease);}
.auth-tab.active{background:var(--bg);color:var(--tx);box-shadow:var(--sh-sm);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:12.5px;font-weight:600;color:var(--tx2);margin-bottom:5px;letter-spacing:.01em;}
.auth-field input{
  width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:10px;
  font-family:var(--font);font-size:14.5px;color:var(--tx);
  background:var(--auth-input-bg);outline:none;
  transition:border-color var(--ease),box-shadow var(--ease);
}
.auth-field input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(201,106,43,.08);}
.auth-submit{
  width:100%;padding:11px;border:none;border-radius:10px;
  background:var(--bmark-bg);color:#fff;font-family:var(--font);
  font-size:14.5px;font-weight:600;cursor:pointer;margin-top:6px;
  transition:opacity var(--ease),transform var(--ease);
  box-shadow:var(--bmark-sh);
}
.auth-submit:hover{opacity:0.88;}
.auth-submit:active{transform:scale(.98);}
.auth-submit:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.auth-msg{font-size:13px;margin-top:10px;text-align:center;min-height:18px;}
.auth-msg.err{color:#dc2626;}.auth-msg.ok{color:#16a34a;}
.auth-divider{text-align:center;font-size:12px;color:var(--tx3);margin:18px 0 14px;position:relative;}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--bdr);}
.auth-divider::before{left:0;}.auth-divider::after{right:0;}
.auth-google{
  width:100%;padding:10px;border:1.5px solid var(--bdr);border-radius:10px;
  background:var(--bg);font-family:var(--font);font-size:14px;font-weight:500;
  color:var(--tx);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:background var(--ease),border-color var(--ease);
}
.auth-google:hover{background:var(--bg-hov);}
.auth-google:disabled{opacity:.6;cursor:not-allowed;}

/* ═══════════════════════════════════
   LAYOUT
═══════════════════════════════════ */
#app{display:none;height:100vh;overflow:hidden;flex-direction:row;position:relative;z-index:1;}

/* ═══════════════════════════════════
   SIDEBAR
═══════════════════════════════════ */
#sb{
  width:var(--sw);
  background:var(--sb-bg);
  border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;flex-shrink:0;
  z-index:20;
  transition:transform var(--ease),background 0.35s,border-color 0.35s;
}
#sb.collapsed{transform:translateX(calc(-1 * var(--sw)));position:absolute;height:100%;}

/* Dark sidebar gold border accent */
[data-theme="dark"] #sb::after{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,transparent 0%,rgba(200,146,42,0.25) 30%,rgba(200,146,42,0.15) 70%,transparent 100%);
  pointer-events:none;
}

.sb-top{display:flex;align-items:center;padding:14px 12px 12px;gap:4px;border-bottom:1px solid var(--bdr-soft);}
.brand{display:flex;align-items:center;gap:9px;flex:1;}
.bmark{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:15px;color:#fff;flex-shrink:0;
  background:var(--bmark-bg);box-shadow:var(--bmark-sh);
  position:relative;overflow:hidden;
  transition:background 0.35s,box-shadow 0.35s;
}
.bmark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.20) 0%,transparent 60%);border-radius:inherit;}
.bname{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--tx);}
.ib{background:none;border:none;cursor:pointer;color:var(--tx3);padding:7px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background var(--ease),color var(--ease);}
.ib:hover{background:var(--bg-hov);color:var(--tx);}

.clist{flex:1;overflow-y:auto;padding:8px;}
.clabel{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);padding:10px 8px 5px;}
.ci{
  display:flex;align-items:center;padding:7px 9px;border-radius:9px;cursor:pointer;
  transition:background var(--ease),border-color var(--ease);
  font-size:13.5px;color:var(--tx2);margin-bottom:1px;
  border:1px solid transparent;
}
.ci:hover{background:var(--bg-hov);color:var(--tx);}
.ci.active{background:var(--ci-active-bg);border-color:var(--ci-active-bdr);color:var(--tx);box-shadow:var(--sh-sm);}
.ci-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-del{opacity:0;background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px 5px;border-radius:5px;font-size:12px;transition:opacity var(--ease),color var(--ease),background var(--ease);}
.ci:hover .ci-del{opacity:1;}
.ci-del:hover{color:#dc2626;background:rgba(220,38,38,0.12);}

.sb-foot{padding:8px 10px 14px;border-top:1px solid var(--bdr-soft);}
.ctx-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:13px;color:var(--tx2);transition:background var(--ease);margin-bottom:4px;}
.ctx-btn:hover{background:var(--bg-hov);color:var(--tx);}
#ctx-panel{display:none;padding:10px;border-top:1px solid var(--bdr-soft);}
#ctx-panel.open{display:block;}
#ctx-panel textarea{
  width:100%;border:1.5px solid var(--bdr);border-radius:9px;padding:9px 11px;
  font-family:var(--font);font-size:13px;color:var(--tx);resize:none;outline:none;
  line-height:1.5;height:90px;background:var(--code-bg);transition:border-color var(--ease);
}
#ctx-panel textarea:focus{border-color:var(--acc);}
.ctx-save{margin-top:6px;width:100%;padding:7px;border:none;border-radius:8px;background:var(--bmark-bg);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity var(--ease);}
.ctx-save:hover{opacity:0.85;}

.urow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:default;transition:background var(--ease);}
.urow:hover{background:var(--bg-hov);}
.uav{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
  background:var(--uav-bg);box-shadow:var(--uav-sh);
  position:relative;overflow:hidden;
  transition:background 0.35s,box-shadow 0.35s;
}
.uav::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.15);border-radius:50% 50% 0 0;}
.uinfo{flex:1;min-width:0;}
.ulabel{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.uemail{font-size:11px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.signout-btn{background:none;border:none;cursor:pointer;color:var(--tx3);padding:6px;border-radius:6px;display:flex;align-items:center;transition:color var(--ease),background var(--ease);}
.signout-btn:hover{color:#dc2626;background:rgba(220,38,38,0.12);}

/* ═══════════════════════════════════
   MAIN
═══════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--main-bg);transition:background 0.35s;}

#topbar{
  display:flex;align-items:center;padding:0 16px;height:52px;
  border-bottom:1px solid var(--bdr);background:var(--topbar-bg);
  backdrop-filter:blur(12px);flex-shrink:0;gap:8px;position:relative;z-index:5;
  transition:background 0.35s,border-color 0.35s;
}
.mpill{
  display:flex;align-items:center;gap:7px;padding:5px 12px 5px 9px;
  border-radius:20px;border:1px solid var(--bdr);
  background:var(--shell-bg);font-family:var(--font);
  font-size:13.5px;font-weight:600;color:var(--tx);
  letter-spacing:-.01em;box-shadow:var(--sh-sm);
  backdrop-filter:blur(4px);transition:all 0.35s;
}
.mdot{
  width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0;
  box-shadow:0 0 0 2px rgba(200,146,42,0.25);
  animation:pulseDot 2.5s ease infinite;
}
@keyframes pulseDot{
  0%,100%{box-shadow:0 0 0 2px rgba(200,146,42,0.25);}
  50%{box-shadow:0 0 0 4px rgba(200,146,42,0.10);}
}

/* Theme toggle */
#theme-toggle{
  width:34px;height:34px;border-radius:9px;
  border:1px solid var(--toggle-bdr);background:var(--toggle-bg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--tx2);flex-shrink:0;transition:all 0.2s;
  position:relative;
}
#theme-toggle:hover{background:var(--bg-hov);border-color:var(--bdr);color:var(--tx);}
#theme-toggle .i-sun,#theme-toggle .i-moon{position:absolute;transition:opacity 0.2s,transform 0.25s;}
[data-theme="light"] .i-sun{opacity:1;transform:rotate(0deg) scale(1);}
[data-theme="light"] .i-moon{opacity:0;transform:rotate(90deg) scale(0.5);}
[data-theme="dark"] .i-sun{opacity:0;transform:rotate(-90deg) scale(0.5);}
[data-theme="dark"] .i-moon{opacity:1;transform:rotate(0deg) scale(1);}

/* ═══════════════════════════════════
   CHAT AREA
═══════════════════════════════════ */
#chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;scroll-behavior:smooth;}

#welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px 20px;gap:20px;animation:fu .4s ease both;text-align:center;
}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Welcome icon */
.wicon{
  width:68px;height:68px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:var(--wicon-grad);box-shadow:var(--wicon-sh);
  border-radius:var(--wicon-radius);outline:var(--wicon-ring);outline-offset:4px;
  transition:background 0.35s,box-shadow 0.35s,border-radius 0.35s;
  cursor:default;
}
.wicon::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,0.28) 0%,transparent 100%);border-radius:inherit;z-index:1;pointer-events:none;}
.wicon::after{content:'';position:absolute;inset:2px;border-radius:inherit;border:1px solid rgba(255,255,255,0.22);pointer-events:none;z-index:2;}
.wicon-text{
  font-family:var(--serif);font-size:30px;font-style:italic;
  position:relative;z-index:3;
  color:var(--wicon-tx);text-shadow:var(--wicon-tx-sh);
  letter-spacing:-0.02em;
  transition:color 0.35s,text-shadow 0.35s;
}

.wtitle{font-family:var(--serif);font-size:32px;font-weight:400;letter-spacing:-.02em;line-height:1.25;color:var(--tx);}
.wsub{font-size:13.5px;color:var(--tx3);margin-top:4px;}
.whead{display:flex;flex-direction:column;align-items:center;gap:6px;max-width:660px;width:100%;}

/* ═══════════════════════════════════
   SUGGESTION CARDS
═══════════════════════════════════ */
.sugs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:660px;width:100%;margin-top:2px;}
.sc{
  background:var(--card-bg);border:1px solid var(--card-bdr);border-radius:14px;
  padding:0;cursor:pointer;text-align:left;font-family:var(--font);
  transition:transform 0.18s,box-shadow 0.18s,background 0.18s,border-color 0.18s;
  box-shadow:var(--card-sh);
  position:relative;overflow:hidden;
  display:flex;align-items:stretch;min-height:82px;
}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 100%);pointer-events:none;z-index:1;}
[data-theme="dark"] .sc::before{background:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,transparent 100%);}
.sc:hover{transform:translateY(-2px);background:var(--card-hover-bg);box-shadow:var(--card-hover-sh);}
[data-theme="dark"] .sc:hover{border-color:rgba(200,146,42,0.40);}
.sc:active{transform:translateY(0);}
.sc-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 16px 18px;width:100%;position:relative;z-index:2;}
.sc-text{flex:1;min-width:0;}
.sc strong{display:block;font-size:13.5px;font-weight:600;color:var(--tx);margin-bottom:3px;letter-spacing:-.01em;}
.sc span{font-size:12.5px;color:var(--tx3);line-height:1.4;display:block;}
.sc-illus{
  width:62px;height:62px;border-radius:12px;margin-left:10px;flex-shrink:0;overflow:hidden;
  position:relative;box-shadow:0 3px 12px rgba(0,0,0,0.20),inset 0 1px 0 rgba(255,255,255,0.30);
}
[data-theme="dark"] .sc-illus{box-shadow:0 4px 16px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.08);}
.sc-illus::after{content:'';position:absolute;inset:0;border-radius:12px;border:1px solid rgba(255,255,255,0.28);background:linear-gradient(135deg,rgba(255,255,255,0.14) 0%,transparent 55%);pointer-events:none;z-index:10;}

/* ═══════════════════════════════════
   MESSAGES
═══════════════════════════════════ */
#msgs-wrap{max-width:720px;width:100%;margin:0 auto;padding:20px 28px 0;display:none;flex-direction:column;}
.mr{padding:20px 0;display:flex;gap:14px;border-bottom:1px solid var(--bdr-soft);animation:mi .22s ease both;}
.mr:last-child{border-bottom:none;}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.mav{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
.mav.ai{
  background:var(--mav-ai-bg);color:#fff;
  font-family:var(--serif);font-size:14px;font-style:italic;
  box-shadow:var(--mav-ai-sh);
  position:relative;overflow:hidden;
  transition:background 0.35s,box-shadow 0.35s;
}
.mav.ai::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.15);border-radius:7px 7px 0 0;}
.mav.usr{background:var(--bg-hov);color:var(--tx);border:1px solid var(--bdr);}
.mbody{flex:1;min-width:0;}
.mname{font-size:11.5px;font-weight:600;color:var(--tx3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;}
.mc{color:var(--tx);font-size:15px;line-height:1.75;}
.mc>*+*{margin-top:10px;}
.mc p{margin:0;}.mc p+p{margin-top:10px;}
.mc ul{padding-left:22px;list-style:disc;}.mc ol{padding-left:22px;list-style:decimal;}
.mc li{margin-bottom:5px;line-height:1.65;}
.mc h1{font-family:var(--serif);font-size:21px;font-weight:400;margin:20px 0 6px;letter-spacing:-.02em;line-height:1.3;}
.mc h2{font-size:16px;font-weight:600;margin:18px 0 5px;letter-spacing:-.01em;border-bottom:1px solid var(--bdr-soft);padding-bottom:6px;}
.mc h3{font-size:14.5px;font-weight:600;margin:14px 0 4px;color:var(--tx2);}
.mc h1:first-child,.mc h2:first-child,.mc h3:first-child{margin-top:0;}
.mc strong{font-weight:600;}.mc em{font-style:italic;}
.mc a{color:var(--acc);text-decoration:underline;text-underline-offset:2px;}
.mc code{font-family:var(--mono);background:var(--code-bg);border:1px solid var(--bdr);border-radius:4px;padding:2px 6px;font-size:13px;color:var(--acc);}
.mc pre{background:var(--code-bg);border:1px solid var(--bdr);border-radius:10px;padding:16px 18px;overflow-x:auto;font-size:13px;line-height:1.65;}
.mc pre code{background:none;border:none;padding:0;color:var(--tx);}
.mc blockquote{border-left:3px solid var(--acc);padding:8px 0 8px 16px;color:var(--tx2);font-style:italic;background:var(--acc-bg);border-radius:0 6px 6px 0;}
.mc hr{border:none;border-top:1px solid var(--bdr);}
.mc table{width:100%;border-collapse:collapse;font-size:14px;}
.mc th{background:var(--bg-sub);font-weight:600;text-align:left;padding:8px 12px;border:1px solid var(--bdr);font-size:13px;color:var(--tx);}
.mc td{padding:7px 12px;border:1px solid var(--bdr);vertical-align:top;color:var(--tx);}
.mc tr:nth-child(even) td{background:var(--bg-sub);}
.macts{display:flex;gap:2px;margin-top:10px;opacity:0;transition:opacity var(--ease);}
.mr:hover .macts{opacity:1;}
.abt{background:none;border:1px solid transparent;cursor:pointer;color:var(--tx3);padding:4px 8px;border-radius:6px;font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:4px;transition:background var(--ease),border-color var(--ease),color var(--ease);}
.abt:hover{background:var(--bg-hov);border-color:var(--bdr);color:var(--tx);}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.td{width:6px;height:6px;background:var(--tx3);border-radius:50%;animation:tb 1.2s infinite;}
.td:nth-child(2){animation-delay:.15s;}.td:nth-child(3){animation-delay:.3s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}
.pad{height:28px;flex-shrink:0;}

/* ═══════════════════════════════════
   BOTTOM INPUT
═══════════════════════════════════ */
#bottom{flex-shrink:0;padding:6px 28px 18px;position:relative;z-index:5;}
#inner{max-width:720px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:6px;}
#docbar{display:none;background:var(--acc-bg);border:1px solid var(--acc-bdr);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--tx2);align-items:center;gap:8px;}
#docbar.on{display:flex;}
.dic{color:var(--acc);flex-shrink:0;}
.dnm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--tx);}
.drm{background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px 6px;border-radius:4px;font-size:12px;transition:color var(--ease);}
.drm:hover{color:#dc2626;}

.shell{
  background:var(--shell-bg);
  border:1.5px solid var(--shell-bdr);
  border-radius:18px;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
  box-shadow:var(--shell-sh);
  position:relative;
}
.shell::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 100%);pointer-events:none;z-index:0;}
[data-theme="dark"] .shell::before{background:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,transparent 100%);}
.shell:focus-within{border-color:var(--shell-focus-bdr);box-shadow:var(--shell-focus-sh);}

#inp{display:block;width:100%;background:none;border:none;outline:none;resize:none;font-family:var(--font);font-size:15px;color:var(--tx);line-height:1.6;padding:14px 16px 6px;max-height:200px;overflow-y:auto;min-height:54px;position:relative;z-index:1;}
#inp::placeholder{color:var(--tx3);}

.ibar{display:flex;align-items:center;padding:7px 10px 10px;gap:4px;position:relative;z-index:1;}
.ibar-actions{margin-left:auto;display:flex;align-items:center;gap:8px;}
.bb{background:none;border:none;cursor:pointer;color:var(--tx3);padding:6px 9px;border-radius:8px;font-size:13px;font-family:var(--font);display:flex;align-items:center;gap:5px;transition:background var(--ease),color var(--ease);}
.bb:hover{background:var(--bg-hov);color:var(--tx);}

#sendbtn{
  width:34px;height:34px;border-radius:10px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#fff;flex-shrink:0;position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;
  background:var(--send-bg);box-shadow:var(--send-sh);
}
#sendbtn::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.20) 0%,transparent 100%);border-radius:10px 10px 0 0;}
#sendbtn:hover{transform:translateY(-1px);box-shadow:var(--send-hover-sh);}
#sendbtn:active{transform:scale(.94);}
#sendbtn:disabled{background:linear-gradient(145deg,#555,#333);box-shadow:none;cursor:not-allowed;}
#sendbtn svg{position:relative;z-index:1;}

#stopbtn{background:none;border:1.5px solid var(--bdr);border-radius:8px;color:var(--tx);font-family:var(--font);font-size:13px;cursor:pointer;padding:5px 12px;display:none;align-items:center;gap:5px;transition:background var(--ease);}
#stopbtn.on{display:flex;}
#stopbtn:hover{background:var(--bg-hov);}
.disc{text-align:center;font-size:11.5px;color:var(--tx3);padding-top:7px;}
#finput{display:none;}

/* ═══════════════════════════════════
   TOAST & CORNER STAR
═══════════════════════════════════ */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--tx);color:var(--bg);border-radius:8px;padding:8px 16px;font-size:13px;opacity:0;pointer-events:none;z-index:999;transition:opacity .2s,transform .2s;white-space:nowrap;box-shadow:var(--sh);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

.corner-star{position:fixed;bottom:22px;right:22px;width:34px;height:34px;pointer-events:none;z-index:50;animation:sPulse 3s ease infinite;}
@keyframes sPulse{0%,100%{opacity:0.55;transform:scale(1) rotate(0deg);}50%{opacity:0.9;transform:scale(1.08) rotate(20deg);}}
.cs-l,.cs-d{display:none;}
[data-theme="light"] .cs-l{display:block;}
[data-theme="dark"]  .cs-d{display:block;}

/* ═══════════════════════════════════
   MARKDOWN / STEP / KV helpers
═══════════════════════════════════ */
.step-item{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;border:1px solid var(--bdr);border-radius:10px;background:var(--bg-sub);margin:8px 0;}
.step-item strong{font-size:12.5px;color:var(--tx2);white-space:nowrap;}
.step-item span{font-size:14px;color:var(--tx);}
.rs-kv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin:8px 0;}
.kv-item{border:1px solid var(--bdr);border-radius:10px;padding:8px 10px;background:var(--bg-sub);display:flex;flex-direction:column;gap:2px;}
.kv-item strong{font-size:12px;color:var(--tx2);}
.kv-item span{font-size:13px;color:var(--tx);}
.math-block{font-family:var(--mono);background:var(--code-bg);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;overflow:auto;color:var(--acc);}
pre.mermaid{background:var(--code-bg);border:1px dashed var(--acc-bdr);border-radius:10px;padding:10px 12px;}

/* ═══════════════════════════════════
   CODE AGENT RENDERER STYLES
═══════════════════════════════════ */
.ca-prose{font-family:var(--font);font-size:14px;line-height:1.75;color:var(--tx);}
.ca-prose p{margin:0 0 .7em}.ca-prose p:last-child{margin-bottom:0}
.ca-prose h2,.ca-prose h3{font-size:15px;font-weight:600;margin:.9em 0 .3em;letter-spacing:-.01em;}
.ca-prose h4{font-size:13.5px;font-weight:600;margin:.8em 0 .25em;color:var(--tx2);}
.ca-prose hr{border:none;border-top:1px solid var(--bdr);margin:.9em 0}
.ca-prose ul,.ca-prose ol{padding-left:1.4em;margin:.3em 0 .7em}
.ca-prose li{margin:.2em 0;line-height:1.65}
.ca-prose code{font-family:var(--mono);font-size:12.5px;background:var(--code-bg);border:1px solid var(--bdr);padding:1px 5px;border-radius:3px;color:var(--acc);}
.ca-prose blockquote{border-left:3px solid var(--bdr);margin:.5em 0;padding:.3em .8em;color:var(--tx2);font-style:italic;}
.ca-prose strong{font-weight:600}.ca-prose em{font-style:italic}
.ca-prose .sh{font-size:10.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin:1.3em 0 .4em;display:block}
.ca-prose .sh:first-child{margin-top:0}
.ca-prose .arrow-item{display:flex;gap:7px;margin:.25em 0;align-items:flex-start}
.ca-prose .arrow-icon{color:var(--acc);font-size:11px;flex-shrink:0;margin-top:.25em;font-weight:700}
.ca-prose .arrow-body{flex:1}
.ca-prose .step-wrap{margin:.4em 0;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg-sub);}
.ca-prose .step-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ca-code-block{background:var(--bg);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin:.6em 0;box-shadow:var(--sh-sm);}
.ca-code-block-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;background:var(--bg-sub);border-bottom:1px solid var(--bdr);}
.ca-code-lang{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--tx3);text-transform:lowercase;}
.ca-copy-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--bdr);cursor:pointer;font-size:11px;color:var(--tx3);font-family:var(--font);padding:3px 8px;border-radius:3px;transition:all .15s;}
.ca-copy-btn:hover{background:var(--bg-hov);color:var(--tx)}
.ca-copy-btn.copied{background:#ecfdf5;color:#059669;border-color:#6ee7b7}
.ca-code-block pre{margin:0;border-radius:0;border:none;background:var(--code-bg)}
.ca-code-block pre code.hljs{font-family:var(--mono);font-size:12.5px;line-height:1.65;padding:14px 16px;background:var(--code-bg);display:block;border-radius:0;}
.ca-files-bar{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--acc-bg);border:1px solid var(--acc-bdr);border-radius:8px;font-size:12.5px;color:var(--tx2);margin-bottom:7px;}
.ca-files-bar-count{font-weight:600}
.ca-files-actions{display:flex;gap:5px;margin-left:auto}
.ca-files-btn{background:none;border:1px solid var(--bdr);cursor:pointer;font-size:11px;color:var(--tx2);font-family:var(--font);padding:2px 8px;border-radius:3px;transition:all .15s;}
.ca-files-btn:hover{background:var(--bg-hov)}
.ca-file-widgets{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.ca-fw{background:var(--bg);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;box-shadow:var(--sh-sm);transition:border-color .15s;}
.ca-fw:hover{border-color:var(--acc-bdr)}
.ca-fw-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg-sub);cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:border-color .15s;}
.ca-fw.open .ca-fw-hd{border-bottom-color:var(--bdr)}
.ca-fw-hd:hover{background:var(--bg-hov)}
.ca-fw-left{display:flex;align-items:center;gap:8px}
.ca-fw-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;font-weight:700;letter-spacing:-.2px;}
.fi-js{background:#fef3c7;color:#b45309}.fi-ts{background:#dbeafe;color:#1d4ed8}.fi-py{background:#ede9fe;color:#7c3aed}
.fi-go{background:#d1fae5;color:#059669}.fi-rs{background:#fef3c7;color:#d97706}.fi-cpp{background:#dbeafe;color:#2563eb}
.fi-html{background:#fee2e2;color:#dc2626}.fi-css{background:#dbeafe;color:#1d4ed8}.fi-json{background:#dcfce7;color:#15803d}
.fi-sh{background:#f0fdf4;color:#166534}.fi-default{background:var(--bg-sub);color:var(--tx2)}
.ca-fw-name{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--tx)}
.ca-fw-path{font-size:10px;color:var(--tx3)}
.ca-fw-right{display:flex;align-items:center;gap:6px}
.ca-fw-lines{font-size:10.5px;color:var(--tx3);font-family:var(--mono)}
.ca-fw-lang{padding:2px 6px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;font-size:9.5px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px;}
.ca-fw-copy{background:none;border:1px solid var(--bdr);cursor:pointer;font-size:11px;color:var(--tx3);font-family:var(--font);display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:3px;transition:all .15s;}
.ca-fw-copy:hover{background:var(--bg-hov);color:var(--tx)}
.ca-fw-copy.copied{background:#ecfdf5;color:#059669;border-color:#6ee7b7}
.ca-fw-chevron{transition:transform .18s;color:var(--tx3);flex-shrink:0}
.ca-fw.open .ca-fw-chevron{transform:rotate(180deg)}
.ca-fw-body{display:none}
.ca-fw.open .ca-fw-body{display:block}
.ca-fw-body pre{margin:0;border-radius:0;border:none;background:var(--code-bg)}
.ca-fw-body pre code.hljs{font-family:var(--mono);font-size:12px;line-height:1.6;padding:13px 15px;background:var(--code-bg);display:block;border-radius:0;}
.ca-dl-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.ca-dl-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border:none;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.ca-dl-dark{background:var(--tx);color:var(--bg)}.ca-dl-dark:hover{opacity:0.85;transform:translateY(-1px)}
.ca-dl-blue{background:#0369a1;color:#fff}.ca-dl-blue:hover{background:#075985;transform:translateY(-1px)}
.ca-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;margin-bottom:9px;background:var(--acc-bg);color:var(--acc);border:1px solid var(--acc-bdr);}

/* ═══════════════════════════════════
   RESPONSIVE
═══════════════════════════════════ */
@media(max-width:720px){
  #sb{position:absolute;height:100%;transform:translateX(calc(-1 * var(--sw)));}

var CODE_KEYWORDS = [
  'write','build','implement','create a function','create a script','make a','code',
  'debug','fix this','bug','error','exception','traceback','not working','broken',
  'review this','review my','check my code','refactor','optimize','improve this',

  'java','kotlin','swift','c++','cpp','html','css','sql','bash','shell',

  'dockerfile','kubernetes','terraform','cloudflare worker','supabase'

function isCodeQuery(text) {
  var lower = text.toLowerCase();
  if (/```/.test(text)) return true;
  for (var i = 0; i < CODE_KEYWORDS.length; i++) {
    if (lower.indexOf(CODE_KEYWORDS[i]) !== -1) return true;

  return false;
}

function detectCodeMode(text) {
  var lower = text.toLowerCase();
  if (/\b(debug|fix|error|bug|exception|traceback|not working|broken|issue)\b/.test(lower)) return 'debug';
  if (/\b(review|check|audit|inspect|security|flaw|vulnerability)\b/.test(lower)) return 'review';
  if (/\b(explain|what does|how does|what is|understand|walk me through)\b/.test(lower)) return 'explain';
  return 'implement';
}

  var p = PROMPT_LIBRARY[primaryId] || PROMPT_LIBRARY.CONCEPT_EXPLAINER;
  var collab = (collaborators || []).filter(function(id){ return PROMPT_LIBRARY[id]; });
  var collabText = collab.length ? 'Secondary collaboration lenses: ' + collab.map(function(id){ return PROMPT_LIBRARY[id].label; }).join(', ') + '. Use them only when relevant.' : 'No secondary collaborator is required for this user request.';
  return ['You are StreminiAI operating as the ' + p.label + '.', p.systemInstruction, collabText, BASE_RESPONSE_FORMAT, 'Use compact code blocks, math, tables, mermaid, or step cards only when they materially improve the answer.', 'When uncertainty is high, state assumptions explicitly before recommendations.'].join('\n');
}

window.addEventListener('DOMContentLoaded', function () {

  try {
    sb = window.supabase.createClient(SB_URL, SB_ANON, { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } });
  } catch (e) { hideLoading(); showAuth('Could not init auth. Please refresh.'); return; }
  sb.auth.onAuthStateChange(function (event, session) {
    if (session && session.user) { currentUser = session.user; if (!booted) { booted = true; startApp(); } }
    else if (event === 'SIGNED_OUT') { currentUser = null; booted = false; chats = {}; activeId = null; messages = []; userContext = ''; document.getElementById('app').style.display = 'none'; showAuth(); }
  });
  sb.auth.getSession().then(function (res) {
    if (res.data && res.data.session) { currentUser = res.data.session.user; if (!booted) { booted = true; startApp(); } }
    else { hideLoading(); showAuth(); }
  }).catch(function () { hideLoading(); showAuth('Connection error. Please refresh.'); });
});

  document.getElementById('auth-name-field').style.display = _activeTab === 'signup' ? 'block' : 'none';

}
async function doAuth() {
  var email = document.getElementById('auth-email').value.trim();
  var pass  = document.getElementById('auth-password').value;
  var btn   = document.getElementById('auth-btn');
  setMsg('', false);
  if (!email) { setMsg('Email is required.', false); return; }
  if (!pass || pass.length < 6) { setMsg('Password must be at least 6 characters.', false); return; }
  btn.disabled = true;
  btn.textContent = _activeTab === 'signin' ? 'Signing in…' : 'Creating account…';
  try {
    var res;
    if (_activeTab === 'signin') {
      res = await sb.auth.signInWithPassword({ email: email, password: pass });
      if (res.error) throw res.error;
    } else {
      var name = document.getElementById('auth-name').value.trim() || email.split('@')[0];
      res = await sb.auth.signUp({ email: email, password: pass, options: { data: { display_name: name } } });
      if (res.error) throw res.error;
      if (res.data.user && !res.data.session) {
        setMsg('Check your email to confirm, then sign in.', true);
        document.querySelectorAll('.auth-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab==='signin');});
        _activeTab='signin'; document.getElementById('auth-btn').textContent='Sign in'; document.getElementById('auth-name-field').style.display='none';
        return;
      }
    }
  } catch (e) { setMsg(e.message || 'Authentication failed.', false); }
  finally { btn.disabled = false; btn.textContent = _activeTab === 'signin' ? 'Sign in' : 'Create account'; }
}

async function loadChats() {
  var res = await sb.from('chats').select('id,title,updated_at').eq('user_id', currentUser.id).order('updated_at', { ascending: false });
  if (res.error) { console.error(res.error.message); return; }

async function createChat(title) {
  var res = await sb.from('chats').insert({ user_id: currentUser.id, title: title || 'New Chat' }).select().single();
  if (res.error) throw new Error(res.error.message);
  var c = res.data;
  chats[c.id] = { id: c.id, title: c.title, ts: new Date(c.updated_at).getTime() };
  renderSidebar(); return c.id;
}
async function updateChatTitle(chatId, title) {
  if (!chats[chatId]) return;
  chats[chatId].title = title; chats[chatId].ts = Date.now(); renderSidebar();
  await sb.from('chats').update({ title: title }).eq('id', chatId);
}
async function deleteChat(chatId) {
  delete chats[chatId];
  if (activeId === chatId) { activeId = null; messages = []; showWelcome(); }
  renderSidebar();
  await sb.from('messages').delete().eq('chat_id', chatId);
  await sb.from('chats').delete().eq('id', chatId);
}
async function loadMessages(chatId) {
  var res = await sb.from('messages').select('role,content,created_at').eq('chat_id', chatId).order('created_at', { ascending: true });
  if (res.error) throw new Error(res.error.message);
  messages = (res.data || []).map(function(m){ return { role: m.role, content: m.content }; });
  return res.data || [];
}
async function saveMessage(chatId, role, content) {
  var res = await sb.from('messages').insert({ chat_id: chatId, user_id: currentUser.id, role: role, content: content });
  if (res.error) { console.error('saveMessage:', res.error.message); return; }
  messages.push({ role: role, content: content });
  await sb.from('chats').update({ updated_at: new Date().toISOString() }).eq('id', chatId);
  if (chats[chatId]) chats[chatId].ts = Date.now();
}

/* ═══════════════════════════════════
   MARKDOWN RENDERER
═══════════════════════════════════ */
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function inlineRender(s){
  if(!s)return '';
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[\s(])\*([^*\n]+?)\*(?=[\s).,!?]|$)/g,'$1<em>$2</em>');
  s=s.replace(/`([^`\n]+?)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function renderMd(raw){
  if(!raw)return '';
  function isTableDivider(line){ return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line||''); }
  function parseTableRow(line){
    var row=(line||'').trim();
    if(row.startsWith('|'))row=row.slice(1);
    if(row.endsWith('|'))row=row.slice(0,-1);
    return row.split('|').map(function(cell){return cell.trim();});
  }
  var blocks=[];
  var t=raw.replace(/\$\$([\s\S]+?)\$\$/g,function(_,expr){var i=blocks.length;blocks.push('<div class="math-block">'+escHtml(expr.trim())+'</div>');return '\x02B'+i+'\x03';});
  t=t.replace(/```([\w-]*)\n?([\s\S]*?)```/g,function(_,lang,code){var i=blocks.length;var l=(lang||'').toLowerCase();if(l==='mermaid')blocks.push('<pre class="mermaid">'+escHtml(code.trim())+'</pre>');else blocks.push('<pre><code'+(lang?' class="lang-'+escHtml(lang)+'"':'')+'>'+escHtml(code.trim())+'</code></pre>');return '\x02B'+i+'\x03';});
  var lines=t.split('\n'),out=[],i=0;
  while(i<lines.length){
    var l=lines[i];
    var bm=l.trim().match(/^\x02B(\d+)\x03$/); if(bm){out.push(blocks[+bm[1]]);i++;continue;}
    var hm=l.match(/^(#{1,3})\s+(.+)$/); if(hm){out.push('<h'+hm[1].length+'>'+inlineRender(escHtml(hm[2]))+'</h'+hm[1].length+'>');i++;continue;}
    if(l.includes('|') && i+1<lines.length && isTableDivider(lines[i+1])){
      var headerCells=parseTableRow(l), bodyRows=[];
      i+=2;
      while(i<lines.length && lines[i].trim() && lines[i].includes('|')){ bodyRows.push(parseTableRow(lines[i])); i++; }
      var cols=headerCells.length;
      var thead='<thead><tr>'+headerCells.map(function(c){return '<th>'+inlineRender(escHtml(c))+'</th>';}).join('')+'</tr></thead>';
      var tbody='<tbody>'+bodyRows.map(function(r){var cells=[];for(var ci=0;ci<cols;ci++) cells.push('<td>'+inlineRender(escHtml(r[ci]||''))+'</td>');return '<tr>'+cells.join('')+'</tr>';}).join('')+'</tbody>';
      out.push('<div style="overflow-x:auto"><table>'+thead+tbody+'</table></div>');
      continue;
    }
    if(/^---+$/.test(l.trim())){out.push('<hr>');i++;continue;}
    if(/^> /.test(l)){var bq=[];while(i<lines.length&&/^> ?/.test(lines[i])){bq.push(lines[i].replace(/^> ?/,''));i++;}out.push('<blockquote>'+inlineRender(escHtml(bq.join(' ')))+'</blockquote>');continue;}
    if(/^\d+\.\s/.test(l)){var ol=[];while(i<lines.length&&/^\d+\.\s/.test(lines[i])){ol.push('<li>'+inlineRender(escHtml(lines[i].replace(/^\d+\.\s+/,'')))+'</li>');i++;}out.push('<ol>'+ol.join('')+'</ol>');continue;}
    if(/^[-*]\s/.test(l)){var kv=[],ul=[];while(i<lines.length&&/^[-*]\s/.test(lines[i])){var item=lines[i].replace(/^[-*]\s+/,'');var kvm=item.match(/^([^:]{1,60}):\s+(.+)$/);if(kvm)kv.push('<div class="kv-item"><strong>'+inlineRender(escHtml(kvm[1]))+'</strong><span>'+inlineRender(escHtml(kvm[2]))+'</span></div>');else ul.push('<li>'+inlineRender(escHtml(item))+'</li>');i++;}if(kv.length)out.push('<div class="rs-kv-grid">'+kv.join('')+'</div>');if(ul.length)out.push('<ul>'+ul.join('')+'</ul>');continue;}
    var sm=l.match(/^Step\s*(\d+)\s*[—-]\s*(.+)$/i); if(sm){out.push('<div class="step-item"><strong>Step '+escHtml(sm[1])+'</strong><span>'+inlineRender(escHtml(sm[2]))+'</span></div>');i++;continue;}
    if(!l.trim()){i++;continue;}
    var pl=[];
    while(i<lines.length){var ll=lines[i];if(!ll.trim()||/^(#{1,3}\s|> |[-*]\s|\d+\.\s|---+$|\x02B)/.test(ll))break;pl.push(inlineRender(escHtml(ll)));i++;}
    if(pl.length)out.push('<p>'+pl.join('<br>')+'</p>');
  }
  return out.join('\n');
}

/* ═══════════════════════════════════
   SEND MESSAGE (full pipeline)
═══════════════════════════════════ */
async function sendMsg() {
  if(busy||!currentUser)return;
  var inp=document.getElementById('inp'), text=inp.value.trim();
  _lastUserQuery = text;
  if(!text)return;

  if(!activeId){
    try{ activeId=await createChat(text.slice(0,52)+(text.length>52?'…':'')); }
    catch(e){ toast('Error creating chat: '+e.message); return; }
  }

  inp.value=''; resize(inp);

  var hist = messages.slice(-MAX_H).map(function(m){return{role:m.role,content:m.content};});
  await saveMessage(activeId,'user',text);
  if(messages.filter(function(m){return m.role==='user';}).length===1){
    updateChatTitle(activeId, text.slice(0,52)+(text.length>52?'…':''));
  }
  addMsgRow('user', text);
  setBusy(true);

  var answer = '';

  // ── Branch: specialist agent router ──
  if (window.StreminiAgentRouter) {
    var agentType = window.StreminiAgentRouter.detect(text);
    if (agentType) {
      addStreamRow();
      var agentLabels = { math:'Solving…', research:'Researching…', growth:'Building growth strategy…', strategy:'Building strategy report…', legal:'Analysing legal query…', competitive:'Running competitive intelligence…' };
      updateStream(agentLabels[agentType] || 'Processing…');
      try {
        var srowAgent = document.getElementById('srow');
        if (srowAgent) srowAgent.remove();
        var mwAgent = document.getElementById('msgs-wrap');
        mwAgent.style.display = 'flex';
        document.getElementById('welcome').style.display = 'none';
        var rowAgent = document.createElement('div'); rowAgent.className = 'mr';
        var agentSlotId = 'agent-slot-' + Date.now();
        rowAgent.innerHTML = '<div class="mav ai">S</div><div class="mbody"><div class="mname">StreminiAI</div><div class="mc" id="' + agentSlotId + '"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div><div class="macts"><button class="abt" onclick="copyMsg(this)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button></div></div>';
        mwAgent.appendChild(rowAgent);
        scrollBottom();
        var agentSlot = document.getElementById(agentSlotId);
        var handled = await window.StreminiAgentRouter.handle(text, hist, agentSlot);
        if (handled) {
          scrollBottom();
          var agentContent = agentSlot ? agentSlot.innerText : text;
          await saveMessage(activeId, 'assistant', agentContent.slice(0, 4000));
          setBusy(false); return;
        }
        rowAgent.remove();
      } catch(agentErr) {
        var srowClean = document.getElementById('srow');
        if (srowClean) srowClean.remove();
        var errMsgAgent = 'Error: ' + escHtml(agentErr.message);
        addMsgRow('assistant', errMsgAgent);
        await saveMessage(activeId, 'assistant', errMsgAgent);
        setBusy(false); return;
      }
    }
  }

  // ── Branch: code query ──
  if (isCodeQuery(text)) {
    var codeMode = detectCodeMode(text);
    addStreamRow();
    updateStream('Analyzing code query…');
    try {
      answer = await callCodeAPI(text, codeMode, hist);
      if (!answer || !answer.trim()) answer = 'No response from code agent.';
      var srow = document.getElementById('srow');
      if (srow) srow.remove();
      addCodeMsgRow(answer, codeMode);
      scrollBottom();
      await saveMessage(activeId, 'assistant', answer);
    } catch(err) {
      var srow2 = document.getElementById('srow');
      if (srow2) srow2.remove();
      var errMsg = 'Error: ' + escHtml(err.message);
      addMsgRow('assistant', errMsg);
      await saveMessage(activeId, 'assistant', errMsg);
    }
    setBusy(false); return;
  }

  // ── Normal flow ──
  var route = await getRoutingDecision(text);
  var systemPrompt = buildUnifiedSystemPrompt(route.primary, route.collaborators);
  hist.unshift({role:'system',content:systemPrompt});
  if(userContext) hist.unshift({role:'system',content:'User context: '+userContext});

  addStreamRow();

  try {
    if (docFile) {
      var docQuestion = systemPrompt + '\n\nUser question:\n' + text;
      answer = await callDoc(docQuestion, docFile.text);
    } else {
      answer = await callStream(text, hist);
    }
    if(!answer||!answer.trim()) answer='No response from model. Please try again.';
    finalizeStream(answer);
    await saveMessage(activeId,'assistant',answer);
  } catch(err){
    var em = err.message==='stopped' ? '*(Generation stopped)*' : 'Error: '+escHtml(err.message);
    finalizeStream(em);
    if(err.message!=='stopped') await saveMessage(activeId,'assistant',em);
  } finally{ setBusy(false); }
}

/* ═══════════════════════════════════
   API CALLERS
═══════════════════════════════════ */
async function callStream(message,history){
  var res;
  try{ res=await fetch(API+'/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,history:history})}); }
  catch(e){ throw new Error('Network error: '+e.message); }
  if(!res.ok){ console.warn('Stream failed '+res.status+', fallback'); return await callMessage(message,history); }
  var reader=res.body.getReader(); streamRdr=reader;
  var dec=new TextDecoder(), buf='', full='';
  try{
    while(true){
      if(stopFlag){reader.cancel();throw new Error('stopped');}
      var r=await reader.read(); if(r.done)break;
      buf+=dec.decode(r.value,{stream:true});
      var lines=buf.split('\n'); buf=lines.pop();
      for(var j=0;j<lines.length;j++){
        var line=lines[j].trim();
        if(!line.startsWith('data:'))continue;
        var data=line.slice(5).trim();
        if(data==='[DONE]')return full;
        try{ var p=JSON.parse(data); if(p.token){full+=p.token;updateStream(full);} if(p.error)throw new Error(p.error); }
        catch(pe){}
      }
    }
  } finally{ streamRdr=null; }
  if(!full.trim()) return await callMessage(message,history);
  return full;
}
async function callMessage(message,history){
  updateStream('Thinking…');
  var res;
  try{ res=await fetch(API+'/chat/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,history:history})}); }
  catch(e){ throw new Error('Network error: '+e.message); }
  if(!res.ok){ var t=await res.text().catch(function(){return '';}); throw new Error('API '+res.status+(t?': '+t:'')); }
  var d=await res.json(); if(d.error)throw new Error(d.error);
  return d.response||'';
}
async function callDoc(question,documentText){
  updateStream('Analyzing document…');
  var res;
  try{ res=await fetch(API+'/chat/document',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:question,documentText:documentText})}); }
  catch(e){ throw new Error('Network error: '+e.message); }
  if(!res.ok){ var t=await res.text().catch(function(){return '';}); throw new Error('API '+res.status+(t?': '+t:'')); }
  var d=await res.json(); if(d.error)throw new Error(d.error);
  return d.response||'No response.';
}

/* ═══════════════════════════════════
   FILE HANDLING
═══════════════════════════════════ */
async function onFile(e){
  var file=e.target.files[0]; if(!file)return; e.target.value='';
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){
    toast('Extracting PDF…');
    try{ var t=await extractPDF(file); docFile={name:file.name,text:t}; updateDocBar(); toast('PDF ready — '+Math.round(t.length/1000)+'k chars'); }
    catch(e){ toast('PDF error: '+e.message); }
  } else if(ext==='docx'||ext==='doc'){
    toast('Extracting DOCX…');
    try{ var t=await extractDOCX(file); docFile={name:file.name,text:t}; updateDocBar(); toast('DOCX ready'); }
    catch(e){ toast('DOCX error: '+e.message); }
  } else toast('Use PDF or DOCX only');
}
async function extractPDF(file){
  if(!window.pdfjsLib)throw new Error('PDF support unavailable.');
  var buf=await file.arrayBuffer();
  var pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  var text='';
  for(var p=1;p<=pdf.numPages;p++){var pg=await pdf.getPage(p);var ct=await pg.getTextContent();text+=ct.items.map(function(x){return x.str;}).join(' ')+'\n\n';}
  return text.trim();
}
async function extractDOCX(file){
  var u8=new Uint8Array(await file.arrayBuffer()),pos=0;
  while(pos<u8.length-4){
    if(u8[pos]===0x50&&u8[pos+1]===0x4B&&u8[pos+2]===0x03&&u8[pos+3]===0x04){
      var comp=u8[pos+8]|(u8[pos+9]<<8),csz=u8[pos+18]|(u8[pos+19]<<8)|(u8[pos+20]<<16)|(u8[pos+21]<<24);
      var fnl=u8[pos+26]|(u8[pos+27]<<8),exl=u8[pos+28]|(u8[pos+29]<<8);
      var fn=new TextDecoder().decode(u8.slice(pos+30,pos+30+fnl)),ds=pos+30+fnl+exl;
      if(fn==='word/document.xml'){
        var xml; if(comp===0){xml=u8.slice(ds,ds+csz);}
        else if(comp===8){var c=u8.slice(ds,ds+csz),ds2=new DecompressionStream('deflate-raw'),w=ds2.writable.getWriter(),r2=ds2.readable.getReader();w.write(c);w.close();var cks=[],rd;while(true){rd=await r2.read();if(rd.done)break;cks.push(rd.value);}var tot=cks.reduce(function(s,ch){return s+ch.length;},0);xml=new Uint8Array(tot);var off=0;cks.forEach(function(ch){xml.set(ch,off);off+=ch.length;});}
        if(xml)return new TextDecoder().decode(xml).replace(/<w:br[^>]*\/>/g,'\n').replace(/<w:p[ >][^>]*>/g,'\n').replace(/<[^>]+>/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/ {2,}/g,' ').trim();
      }
      pos=ds+csz;
    } else pos++;
  }
  throw new Error('Could not find content in DOCX');
}

function updateDocBar(){ var b=document.getElementById('docbar'),n=document.getElementById('docnm'); docFile?(b.classList.add('on'),n.textContent=docFile.name):(b.classList.remove('on'),n.textContent=''); }
function removeDoc(){ docFile=null; updateDocBar(); toast('Document removed'); }
function setBusy(v){ busy=v; stopFlag=false; document.getElementById('sendbtn').disabled=v; var s=document.getElementById('stopbtn'); v?s.classList.add('on'):s.classList.remove('on'); }
function doStop(){ stopFlag=true; if(streamRdr){try{streamRdr.cancel();}catch(e){}} }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }
function useSug(t){ var i=document.getElementById('inp'); i.value=t; resize(i); i.focus(); }
function copyMsg(btn){ var row=btn.closest('.mr'); navigator.clipboard.writeText(row.querySelector('.mc').innerText).then(function(){toast('Copied');}).catch(function(){toast('Copy failed');}); }
var _tt;
function toast(msg){ var e=document.getElementById('toast'); e.textContent=msg; e.classList.add('on'); clearTimeout(_tt); _tt=setTimeout(function(){e.classList.remove('on');},2400); }
</script>
