<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreminiAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>mermaid.initialize({startOnLoad:false,theme:'neutral'});</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root,[data-theme="dark"]{
  --bg-sidebar:#1c1c1e;--bg-main:#ffffff;--bg-input:#f4f4f6;--bg-input-focus:#ffffff;
  --sb-tx:#e8e8ea;--sb-tx2:#8e8e93;--sb-tx3:#48484a;
  --sb-active-bg:rgba(255,255,255,0.10);--sb-active-bdr:rgba(255,255,255,0.14);
  --sb-hover-bg:rgba(255,255,255,0.06);--sb-bdr:rgba(255,255,255,0.07);
  --tx:#0d0d0f;--tx2:#48484a;--tx3:#8e8e93;
  --acc:#e8622a;--acc-bg:rgba(232,98,42,0.08);--acc-bdr:rgba(232,98,42,0.20);
  --bdr-card:#e5e5ea;--bdr-input:#d1d1d6;--bdr-strong:#aeaeb2;
  --red:#ff3b30;--green:#34c759;
  --font:'DM Sans',ui-sans-serif,sans-serif;
  --serif:'Lora',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sw:264px;--topbar-h:52px;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-2xl:24px;
  --sh-orb:0 8px 32px rgba(232,98,42,0.25),0 2px 8px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.5);
  --sh-send:0 2px 12px rgba(232,98,42,0.45),0 1px 3px rgba(0,0,0,0.10);
}
[data-theme="light"]{--tx:#0d0d0f;--tx2:#48484a;--tx3:#8e8e93;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:#1a1612;display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:18px;}
.load-orb{width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#ff7a40,#e8622a,#c0400e);box-shadow:var(--sh-orb);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:26px;color:#fff;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.load-txt{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#8e8e93;}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:#f7f7f8;display:none;align-items:center;justify-content:center;z-index:100;}
.auth-card{width:100%;max-width:400px;padding:44px 40px;background:#fff;border:1px solid #e5e5ea;border-radius:var(--r-2xl);box-shadow:0 8px 40px rgba(0,0,0,.10);}
.auth-logo{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
.auth-orb{width:44px;height:44px;border-radius:50%;background:linear-gradient(145deg,#ff7a40,#e8622a,#c0400e);box-shadow:var(--sh-orb);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:22px;color:#fff;}
.auth-logo-name{font-size:18px;font-weight:600;color:var(--tx);}
.auth-logo-sub{font-size:11px;color:var(--tx3);margin-top:1px;}
.auth-tabs{display:flex;background:rgba(0,0,0,.05);border:1px solid var(--bdr-card);border-radius:var(--r-md);padding:3px;margin-bottom:22px;gap:2px;}
.auth-tab{flex:1;padding:8px 0;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;color:var(--tx3);border-radius:var(--r-sm);transition:all .2s;}
.auth-tab.active{background:rgba(255,255,255,.85);color:var(--tx);box-shadow:0 1px 4px rgba(80,60,30,.12);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:6px;}
.auth-field input{width:100%;padding:11px 14px;border:1.5px solid var(--bdr-input);border-radius:var(--r-md);font-family:var(--font);font-size:14px;color:var(--tx);background:var(--bg-input);outline:none;transition:all .2s;}
.auth-field input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg);background:var(--bg-input-focus);}
.auth-submit{width:100%;padding:12px;border:none;border-radius:var(--r-md);background:linear-gradient(145deg,#ff7a40,#e8622a,#c0400e);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;box-shadow:var(--sh-send);transition:opacity .2s,transform .15s;}
.auth-submit:hover{opacity:.9;transform:translateY(-1px);}
.auth-submit:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.auth-msg{font-size:12.5px;margin-top:10px;text-align:center;min-height:18px;}
.auth-msg.err{color:var(--red);}.auth-msg.ok{color:var(--green);}
.auth-divider{text-align:center;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin:18px 0 14px;display:flex;align-items:center;gap:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bdr-card);}
.auth-google{width:100%;padding:11px;border:1.5px solid var(--bdr-input);border-radius:var(--r-md);background:var(--bg-input);font-family:var(--font);font-size:13.5px;font-weight:500;color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.auth-google:hover{background:var(--bg-input-focus);border-color:var(--bdr-strong);}

/* ── APP LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden;flex-direction:row;}

/* ── SIDEBAR ── */
#sb{width:var(--sw);background:var(--bg-sidebar);display:flex;flex-direction:column;flex-shrink:0;z-index:20;position:relative;border-right:1px solid rgba(255,255,255,.05);transition:transform .3s cubic-bezier(.16,1,.3,1);}
#sb.collapsed{transform:translateX(calc(-1 * var(--sw)));position:absolute;height:100%;}
.sb-top{display:flex;align-items:center;padding:14px 12px 12px;gap:6px;border-bottom:1px solid var(--sb-bdr);}
.brand{display:flex;align-items:center;gap:10px;flex:1;}
.b-orb{width:28px;height:28px;border-radius:50%;background:linear-gradient(145deg,#ff7a40,#e8622a,#c0400e);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:14px;color:#fff;flex-shrink:0;}
.bname{font-size:13.5px;font-weight:600;color:var(--sb-tx);}
.ib{background:none;border:none;cursor:pointer;color:var(--sb-tx2);padding:6px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.ib:hover{background:var(--sb-hover-bg);color:var(--sb-tx);}
.ib-new{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);color:var(--sb-tx);}
.ib-new:hover{background:rgba(255,255,255,.12)!important;color:#fff!important;}
.clist{flex:1;overflow-y:auto;padding:6px 8px;}
.clabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.10em;color:var(--sb-tx3);padding:12px 8px 4px;}
.ci{display:flex;align-items:center;padding:7px 10px;border-radius:var(--r-md);cursor:pointer;font-size:12.5px;color:var(--sb-tx2);margin-bottom:1px;border:1px solid transparent;gap:10px;transition:all .15s;}
.ci:hover{background:var(--sb-hover-bg);color:var(--sb-tx);}
.ci.active{background:var(--sb-active-bg);border-color:var(--sb-active-bdr);color:var(--sb-tx);}
.ci-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;background:rgba(255,255,255,.07);color:var(--sb-tx2);}
.ci-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-del{opacity:0;background:none;border:none;cursor:pointer;color:var(--sb-tx3);padding:2px 5px;border-radius:4px;font-size:11px;transition:all .15s;flex-shrink:0;}
.ci:hover .ci-del{opacity:1;}
.ci-del:hover{color:#e07070;background:rgba(200,80,80,.12);}

/* ── SIDEBAR FOOTER ── */
.sb-foot{padding:8px 10px 12px;border-top:1px solid var(--sb-bdr);display:flex;flex-direction:column;gap:2px;}
.sb-foot-btn{width:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-md);border:none;background:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--sb-tx2);transition:all .15s;}
.sb-foot-btn:hover{background:var(--sb-hover-bg);color:var(--sb-tx);}
#notion-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-md);border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;color:var(--sb-tx2);transition:all .15s;margin-bottom:2px;}
#notion-btn:hover{background:rgba(255,255,255,.09);color:var(--sb-tx);border-color:rgba(255,255,255,.14);}
#notion-btn.connected{color:#4ade80;border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.06);}
#notion-btn.connected:hover{background:rgba(74,222,128,.10);}
#notion-btn svg{flex-shrink:0;}
#notion-btn-label{flex:1;text-align:left;}
.n-badge{font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:99px;flex-shrink:0;}
.n-badge.off{background:rgba(255,255,255,.08);color:var(--sb-tx3);}
.n-badge.on{background:rgba(74,222,128,.20);color:#4ade80;}
#ctx-panel{display:none;padding:4px 2px 6px;}
#ctx-panel.open{display:block;}
#ctx-panel textarea{width:100%;border:1.5px solid rgba(255,255,255,.12);border-radius:var(--r-md);padding:9px 12px;font-family:var(--font);font-size:12px;color:var(--sb-tx);resize:none;outline:none;line-height:1.5;height:80px;background:rgba(255,255,255,.05);}
.ctx-save{margin-top:5px;width:100%;padding:7px;border:none;border-radius:var(--r-sm);background:linear-gradient(145deg,#ff7a40,#e8622a);color:#fff;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;}
.urow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-md);cursor:default;}
.urow:hover{background:var(--sb-hover-bg);}
.uav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;background:linear-gradient(145deg,#ff7a40,#e8622a);}
.uinfo{flex:1;min-width:0;}
.ulabel{font-size:12px;font-weight:600;color:var(--sb-tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.uemail{font-size:10px;color:var(--sb-tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.signout-btn{background:none;border:none;cursor:pointer;color:var(--sb-tx3);padding:5px;border-radius:5px;display:flex;align-items:center;transition:all .15s;}
.signout-btn:hover{color:#e07070;background:rgba(200,80,80,.10);}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:#fff;position:relative;}
#topbar{display:flex;align-items:center;padding:0 20px;height:var(--topbar-h);background:#fff;border-bottom:1px solid #f2f2f7;flex-shrink:0;gap:10px;z-index:5;}
.mpill{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 10px;border-radius:99px;border:1px solid var(--bdr-card);background:#f4f4f6;font-size:12.5px;font-weight:600;color:var(--tx);}
.mdot{width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0;}
#domain-pill{display:none;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:99px;}
#notion-indicator{display:none;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:rgba(74,222,128,.12);color:#16a34a;border:1px solid rgba(74,222,128,.25);}
#notion-indicator.on{display:inline-flex;}
#theme-btn{width:34px;height:34px;border-radius:var(--r-md);border:1px solid var(--bdr-card);background:#f4f4f6;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);flex-shrink:0;position:relative;}
#theme-btn .i-sun,#theme-btn .i-moon{position:absolute;transition:opacity .2s,transform .25s;}
[data-theme="light"] .i-sun{opacity:1;transform:rotate(0) scale(1);}
[data-theme="light"] .i-moon{opacity:0;transform:rotate(90deg) scale(.5);}
[data-theme="dark"] .i-sun{opacity:0;transform:rotate(-90deg) scale(.5);}
[data-theme="dark"] .i-moon{opacity:1;transform:rotate(0) scale(1);}

/* ── CHAT ── */
#chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;scroll-behavior:smooth;}
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 0;gap:28px;text-align:center;}
.w-orb-wrap{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center;}
.w-orb-ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(232,98,42,.20);animation:rp 4s ease infinite;}
.w-orb-ring2{position:absolute;inset:-22px;border-radius:50%;border:1px solid rgba(232,98,42,.10);animation:rp 4s ease infinite 1s;}
@keyframes rp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.04)}}
.w-orb{width:96px;height:96px;border-radius:50%;background:linear-gradient(145deg,#ff8c52,#e8622a,#c03a0a);box-shadow:0 16px 56px rgba(232,98,42,.35),0 4px 16px rgba(0,0,0,.12),inset 0 2px 4px rgba(255,255,255,.30);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:44px;color:rgba(255,255,255,.92);z-index:1;}
.wtitle{font-family:var(--serif);font-size:40px;font-weight:400;font-style:italic;letter-spacing:-.02em;line-height:1.2;color:#0d0d0f;}
.wsub{font-size:13px;color:var(--tx2);}
.sugs{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:780px;width:100%;}
.sc{background:#fff;border:1px solid #e5e5ea;border-radius:var(--r-xl);padding:0;cursor:pointer;text-align:left;font-family:var(--font);transition:all .25s;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;min-height:80px;}
.sc:hover{transform:translateY(-3px);border-color:rgba(232,98,42,.40);box-shadow:0 4px 20px rgba(232,98,42,.10);}
.sc-inner{display:flex;align-items:center;height:100%;}
.sc-text{flex:1;padding:20px 20px 20px 22px;}
.sc strong{display:block;font-size:13.5px;font-weight:600;color:var(--tx);margin-bottom:3px;}
.sc span{font-size:12px;color:var(--tx2);line-height:1.4;}
.sc-img-wrap{width:80px;height:80px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sc-emoji{font-size:46px;line-height:1;transition:transform .25s;}
.sc:hover .sc-emoji{transform:scale(1.12) rotate(-3deg);}

/* ── MESSAGES ── */
#msgs-wrap{max-width:780px;width:100%;margin:0 auto;padding:24px 28px 0;display:none;flex-direction:column;}
.mr{padding:20px 0;display:flex;gap:14px;border-bottom:1px solid #f2f2f7;animation:mi .3s ease both;}
.mr:last-child{border-bottom:none;}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px;}
.mav.ai{background:linear-gradient(145deg,#ff7a40,#e8622a,#c0400e);color:#fff;font-family:var(--serif);font-style:italic;font-size:15px;}
.mav.usr{background:#f4f4f6;border:1px solid #e5e5ea;color:var(--tx2);}
.mbody{flex:1;min-width:0;}
.mname{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px;}
.mc{color:var(--tx);font-size:14px;line-height:1.75;}
.mc p{margin:0;}.mc p+p{margin-top:10px;}
.mc ul{padding-left:22px;list-style:disc;}.mc ol{padding-left:22px;list-style:decimal;}
.mc li{margin-bottom:4px;line-height:1.68;}
.mc h1{font-family:var(--serif);font-size:22px;font-weight:400;font-style:italic;margin:18px 0 6px;}
.mc h2{font-size:15px;font-weight:600;margin:16px 0 5px;border-bottom:1px solid rgba(160,140,110,.15);padding-bottom:6px;}
.mc h3{font-size:13px;font-weight:600;margin:12px 0 4px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;}
.mc h1:first-child,.mc h2:first-child,.mc h3:first-child{margin-top:0;}
.mc strong{font-weight:600;}.mc em{font-style:italic;color:var(--tx2);}
.mc a{color:var(--acc);text-decoration:underline;text-underline-offset:3px;}
.mc code{font-family:var(--mono);background:#f4f4f6;border:1px solid #e5e5ea;border-radius:4px;padding:2px 6px;font-size:12.5px;color:#e8622a;}
.mc pre{background:#1c1c1e;border:1px solid #3a3a3c;border-radius:var(--r-md);padding:16px 18px;overflow-x:auto;font-size:13px;line-height:1.7;}
.mc pre code{background:none;border:none;padding:0;color:#e8e8ea;}
.mc blockquote{border-left:2px solid var(--acc);padding:8px 0 8px 16px;color:var(--tx2);font-style:italic;}
.mc table{width:100%;border-collapse:collapse;font-size:13.5px;}
.mc th{background:#f7f7f8;font-weight:600;text-align:left;padding:8px 12px;border:1px solid #e5e5ea;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--tx2);}
.mc td{padding:7px 12px;border:1px solid #e5e5ea;vertical-align:top;}
.mc tr:nth-child(even) td{background:#f7f7f8;}
.macts{display:flex;gap:4px;margin-top:10px;opacity:0;transition:opacity .15s;}
.mr:hover .macts{opacity:1;}
.abt{background:none;border:1px solid transparent;cursor:pointer;color:var(--tx3);padding:4px 9px;border-radius:5px;font-size:11.5px;font-family:var(--font);font-weight:500;display:flex;align-items:center;gap:4px;transition:all .15s;}
.abt:hover{background:rgba(0,0,0,.06);border-color:rgba(160,140,110,.25);color:var(--tx);}
.typing{display:flex;gap:4px;align-items:center;padding:6px 0;}
.td{width:5px;height:5px;background:var(--tx3);border-radius:50%;animation:tb 1.2s ease infinite;}
.td:nth-child(2){animation-delay:.14s;}.td:nth-child(3){animation-delay:.28s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-6px);opacity:1}}
.pad{height:28px;flex-shrink:0;}

/* ── INPUT ── */
#bottom{flex-shrink:0;padding:8px 28px 20px;z-index:5;}
#inner{max-width:780px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:6px;}
#docbar{display:none;background:rgba(200,134,74,.10);border:1px solid var(--acc-bdr);border-radius:var(--r-md);padding:7px 14px;font-size:12.5px;color:var(--tx2);align-items:center;gap:8px;}
#docbar.on{display:flex;}
.dnm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:var(--tx);}
.drm{background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px 7px;border-radius:4px;font-size:11.5px;font-family:var(--font);font-weight:600;}
.drm:hover{color:var(--red);}
.shell{background:var(--bg-input);border:1.5px solid var(--bdr-input);border-radius:var(--r-2xl);overflow:hidden;transition:all .25s;}
.shell:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg);background:var(--bg-input-focus);}
#inp{display:block;width:100%;background:none;border:none;outline:none;resize:none;font-family:var(--font);font-size:14px;color:var(--tx);line-height:1.65;padding:16px 20px 8px;max-height:200px;overflow-y:auto;min-height:52px;}
#inp::placeholder{color:var(--tx3);}
.ibar{display:flex;align-items:center;padding:8px 12px 12px;gap:4px;}
.ibar-actions{margin-left:auto;display:flex;align-items:center;gap:6px;}
.bb{background:none;border:none;cursor:pointer;color:var(--tx2);padding:6px 11px;border-radius:var(--r-md);font-size:12.5px;font-family:var(--font);font-weight:500;display:flex;align-items:center;gap:5px;transition:all .15s;}
.bb:hover{background:rgba(0,0,0,.06);color:var(--tx);}
#sendbtn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;position:relative;overflow:hidden;background:linear-gradient(145deg,#ff7a40,#e8622a,#c0400e);box-shadow:var(--sh-send);transition:all .2s;}
#sendbtn:hover{transform:scale(1.06);}
#sendbtn:active{transform:scale(.95);}
#sendbtn:disabled{background:rgba(0,0,0,.12);box-shadow:none;cursor:not-allowed;color:var(--tx3);}
#sendbtn svg{position:relative;z-index:1;}
#stopbtn{background:none;border:1.5px solid var(--bdr-input);border-radius:var(--r-md);color:var(--tx2);font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;padding:5px 12px;display:none;align-items:center;gap:5px;}
#stopbtn.on{display:flex;}
.disc{text-align:center;font-size:11px;color:var(--tx3);padding-top:6px;}

/* ── CODE BLOCKS ── */
.code-block{background:#1c1c1e;border:1px solid #3a3a3c;border-radius:var(--r-md);overflow:hidden;margin:10px 0;}
.code-block-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#2c2c2e;border-bottom:1px solid #3a3a3c;}
.code-lang{font-family:var(--mono);font-size:11px;font-weight:500;color:#8e8e93;text-transform:lowercase;}
.code-copy-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid #3a3a3c;cursor:pointer;font-size:11px;font-weight:600;color:#8e8e93;font-family:var(--font);padding:3px 9px;border-radius:5px;transition:all .15s;}
.code-copy-btn:hover{background:#3a3a3c;color:#e8e8ea;}
.code-copy-btn.copied{background:rgba(52,199,89,.15);color:#34c759;border-color:rgba(52,199,89,.3);}
.code-block pre{margin:0;border-radius:0;border:none;background:#1c1c1e;}
.code-block pre code.hljs{font-family:var(--mono);font-size:13px;line-height:1.7;padding:16px 18px;background:#1c1c1e;display:block;}
.table-wrap{overflow-x:auto;margin:10px 0;}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13.5px;}
.table-wrap th{background:#f7f7f8;font-weight:600;text-align:left;padding:8px 12px;border:1px solid #e5e5ea;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#48484a;}
.table-wrap td{padding:7px 12px;border:1px solid #e5e5ea;color:var(--tx);}
.table-wrap tr:nth-child(even) td{background:#f7f7f8;}
.mermaid-wrap{background:#f7f7f8;border:1px solid #e5e5ea;border-radius:var(--r-md);padding:16px;margin:10px 0;overflow-x:auto;}
.math-display,.katex-display{overflow-x:auto;padding:14px 18px;margin:10px 0;background:#f7f7f8;border:1px solid #e5e5ea;border-radius:var(--r-md);text-align:center;}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--tx);color:#fff;border-radius:var(--r-md);padding:9px 18px;font-size:12.5px;font-weight:600;opacity:0;pointer-events:none;z-index:999;transition:opacity .2s,transform .2s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.20);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:768px){
  #sb{position:absolute;height:100%;transform:translateX(calc(-1 * var(--sw)));}
  #sb.open{transform:translateX(0);box-shadow:0 24px 80px rgba(0,0,0,.35);}
  .sugs{grid-template-columns:1fr;}
  #bottom{padding:6px 16px 18px;}
  #msgs-wrap{padding:18px 16px 0;}
  .wtitle{font-size:30px;}
}

<script>
/* ═══════════════════════════════════
   CONFIG

var SB_URL     = 'https://svhgvvwbhmheqylmjzub.supabase.co';
var SB_ANON    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2aGd2dndiaG1oZXF5bG1qenViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDU2NTgsImV4cCI6MjA4ODgyMTY1OH0.9RrwV0kje63N6KBBfO2iAdgvvHX8gooh-G6kTwvIr78';
var API        = 'https://stremini.vishwajeetadkine705.workers.dev';
var NOTION_API = 'https://stremini-notion.vishwajeetadkine705.workers.dev';

var sb=null,currentUser=null,chats={},activeId=null;
var messages=[],busy=false,stopFlag=false;
var docFile=null,streamRdr=null,userContext='',sbOpen=true,booted=false;
var _activeTab='signin';

/* ═══════════════════════════════════
   THEME
═══════════════════════════════════ */
function toggleTheme(){var h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('sai-theme',h.getAttribute('data-theme'));}
(function(){var s=localStorage.getItem('sai-theme');if(s)document.documentElement.setAttribute('data-theme',s);})();

/* ═══════════════════════════════════
   NOTION — FIXED ROUTING
═══════════════════════════════════ */
var notionState = { connected: false, workspace_name: null };

// Tracks whether the current active chat started as a Notion conversation.
// Key: chatId → true/false
var notionChatSessions = {};

/* ── Primary trigger patterns ── */
var NOTION_TRIGGER_PATTERNS = [
  // Explicit Notion mention anywhere in the message
  /\bnotion\b/i,

  // Create/make/build + any Notion object type
  /\b(create|make|add|build|set up|setup|generate)\b[\s\S]{0,80}\b(page|database|table|tracker|crm|kanban|board|doc|note|calendar|log|journal)\b/i,

  // Read/find/show/list things
  /\b(show|list|find|search|get|fetch|read|open|display)\b[\s\S]{0,60}\b(pages?|databases?|tables?|trackers?|notes?|docs?|entries|rows?|records?)\b/i,

  // Update/edit/modify things
  /\b(update|edit|change|mark|set|move|archive|delete|remove|rename|complete)\b[\s\S]{0,60}\b(page|row|entry|task|item|record|status|title|property)\b/i,

  // Append / write to page
  /\b(append|write|add|insert|put)\b[\s\S]{0,40}\b(to|into|on|onto)\b[\s\S]{0,40}\b(page|doc|note|entry)\b/i,

  // Common named Notion templates / workflows
  /\b(task tracker|habit tracker|project tracker|content calendar|reading list|meeting notes|kanban board|crm database|expense tracker|goal tracker)\b/i,
];

/* ── Follow-up patterns (used when chat session is already Notion) ── */
var NOTION_FOLLOWUP_PATTERNS = [
  /\b(tell me more|more details|explain more|what else|show more)\b/i,
  /\b(add|create|update|change|list|show|find|read|open|mark|set|delete|remove|archive|append|insert)\b/i,
  /\b(the tracker|this tracker|that tracker|the database|the page|the table|the board|the list|that page|this page)\b/i,
  /\b(add a row|add a task|add an entry|new entry|new task|new row|update status|show all|list all|filter by|sort by)\b/i,
  /\b(how do i|how can i|what can i|can you)\b/i,
];

function isNotionQuery(text) {
  // If current chat is already a Notion session, be permissive with follow-ups
  if (activeId && notionChatSessions[activeId]) {
    for (var i = 0; i < NOTION_FOLLOWUP_PATTERNS.length; i++) {
      if (NOTION_FOLLOWUP_PATTERNS[i].test(text)) return true;
    }
  }
  // Check primary trigger patterns
  for (var j = 0; j < NOTION_TRIGGER_PATTERNS.length; j++) {
    if (NOTION_TRIGGER_PATTERNS[j].test(text)) return true;
  }
  return false;
}

function notionFetch(path, opts) {
  var uid = currentUser ? currentUser.id : '';
  var hdrs = Object.assign({'Content-Type':'application/json'}, (opts && opts.headers) || {});
  if (uid) hdrs['Authorization'] = 'Bearer ' + uid;
  return fetch(NOTION_API + path, Object.assign({}, opts || {}, { headers: hdrs })).then(function(r){ return r.json(); });
}

async function checkNotionStatus() {
  if (!currentUser) return;
  try {
    var d = await notionFetch('/status');
    notionState.connected = !!d.connected;
    notionState.workspace_name = d.workspace_name || null;
    updateNotionBtn();
  } catch(e) {}
}

function updateNotionBtn() {
  var btn   = document.getElementById('notion-btn');
  var lbl   = document.getElementById('notion-btn-label');
  var badge = document.getElementById('notion-badge');
  var icon  = document.getElementById('notion-btn-icon');
  var ind   = document.getElementById('notion-indicator');
  if (!btn) return;
  if (notionState.connected) {
    btn.classList.add('connected');
    lbl.textContent = notionState.workspace_name || 'Notion Connected';
    badge.textContent = 'ON'; badge.className = 'n-badge on';
    if (ind) ind.classList.add('on');
    icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  } else {
    btn.classList.remove('connected');
    lbl.textContent = 'Connect Notion';
    badge.textContent = 'OFF'; badge.className = 'n-badge off';
    if (ind) ind.classList.remove('on');
    icon.innerHTML = '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/>';
  }
}

async function notionConnectOrDisconnect() {
  if (!currentUser) { toast('Please sign in first'); return; }
  if (notionState.connected) {
    if (!confirm('Disconnect Notion workspace "' + (notionState.workspace_name || '') + '"?')) return;
    try {
      await notionFetch('/disconnect', { method:'POST', body:JSON.stringify({ userId:currentUser.id }) });
      notionState.connected = false; notionState.workspace_name = null;
      notionChatSessions = {}; // clear all session flags on disconnect
      updateNotionBtn(); toast('Notion disconnected');
    } catch(e) { toast('Disconnect failed'); }
    return;
  }
  try {
    var d = await notionFetch('/auth/url');
    if (!d.url) { toast('Could not get Notion auth URL'); return; }
    sessionStorage.setItem('notion_oauth_state', d.state || '');
    sessionStorage.setItem('notion_oauth_user', currentUser.id);
    var w=600,h=700,left=Math.floor((screen.width-w)/2),top=Math.floor((screen.height-h)/2);
    var popup = window.open(d.url, 'notion_oauth', 'width='+w+',height='+h+',left='+left+',top='+top+',toolbar=0,menubar=0');
    if (!popup) { window.location.href = d.url; return; }
    var poll = setInterval(function(){ if (popup.closed) { clearInterval(poll); setTimeout(checkNotionStatus, 800); } }, 600);
  } catch(e) { toast('Notion connect failed: ' + e.message); }
}

async function handleNotionCallback() {
  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');
  if (!code) return;
  var userId = sessionStorage.getItem('notion_oauth_user');
  var state  = sessionStorage.getItem('notion_oauth_state');
  sessionStorage.removeItem('notion_oauth_user');
  sessionStorage.removeItem('notion_oauth_state');
  window.history.replaceState({}, document.title, window.location.pathname);
  if (!userId) { toast('OAuth session expired'); return; }
  try {
    var d = await fetch(NOTION_API + '/auth/callback', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code, userId, state }),
    }).then(function(r){ return r.json(); });
    if (d.success) { toast('✓ Notion connected: ' + (d.workspace_name || 'workspace')); await checkNotionStatus(); }
    else toast('Notion auth failed: ' + (d.error || 'unknown error'));
  } catch(e) { toast('OAuth callback failed: ' + e.message); }
}

async function executeNotionRequest(message) {
  return notionFetch('/execute', { method:'POST', body:JSON.stringify({ message }) });
}

/* ═══════════════════════════════════
   SEND MESSAGE — FIXED NOTION ROUTING
═══════════════════════════════════ */
async function sendMsg() {
  if (busy || !currentUser) return;
  var inp=document.getElementById('inp'), text=inp.value.trim();
  if (!text) return;

  /* ── Notion branch ── */
  if (notionState.connected && isNotionQuery(text)) {
    inp.value=''; resize(inp);

    // Create chat if needed
    if (!activeId) {
      try { activeId = await createChat(text.slice(0,52)+(text.length>52?'…':'')); }
      catch(e) { toast('Error: '+e.message); return; }
    }

    // Mark this chat as a Notion session so follow-ups stay in Notion
    notionChatSessions[activeId] = true;

    addMsgRow('user', text);
    saveMessage(activeId, 'user', text);
    setBusy(true);
    addStreamRow();
    showDomainPill('notion');

    try {
      var result = await executeNotionRequest(text);

      if (result.error) {
        var errMsg;
        if (/401|not connected|unauthorized/i.test(result.error)) {
          errMsg = '**Notion connection error.** Please reconnect Notion from the sidebar and try again.';
          notionChatSessions[activeId] = false; // reset on auth failure
        } else {
          errMsg = '**Notion error:** ' + result.error;
        }
        finalizeStream(errMsg);
        saveMessage(activeId, 'assistant', errMsg);
      } else {
        var msg = result.message || 'Done!';

        // Append clickable open links
        if (result.tool_calls && result.tool_calls.length) {
          var openLinks = result.tool_calls.filter(function(c){ return c.success && c.url; });
          if (openLinks.length) {
            msg += '\n\n';
            openLinks.forEach(function(c){ msg += '→ [Open in Notion]('+c.url+')\n'; });
          }
          var failed = result.tool_calls.filter(function(c){ return !c.success; });
          if (failed.length) {
            msg += '\n\n⚠️ Some actions had issues:\n';
            failed.forEach(function(c){ msg += '- `'+c.tool+'`: '+(c.error||'failed')+'\n'; });
          }
        }

        finalizeStream(msg.trim());
        saveMessage(activeId, 'assistant', msg.trim());

        // Auto-title the chat on first user message
        if (messages.filter(function(m){ return m.role==='user'; }).length === 1) {
          updateChatTitle(activeId, text.slice(0,52)+(text.length>52?'…':''));
        }
      }
    } catch(err) {
      var em = '**Notion error:** ' + escHtml(err.message);
      finalizeStream(em);
      saveMessage(activeId, 'assistant', em);
    } finally {
      setBusy(false);
    }
    return;
  }

  /* ── Normal AI branch ── */
  if (!activeId) {
    try { activeId = await createChat(text.slice(0,52)+(text.length>52?'…':'')); }
    catch(e) { toast('Error: '+e.message); return; }
  }
  inp.value=''; resize(inp);
  var hist=messages.slice(-20).map(function(m){return{role:m.role,content:m.content};});
  await saveMessage(activeId, 'user', text);
  if (messages.filter(function(m){return m.role==='user';}).length===1) updateChatTitle(activeId, text.slice(0,52)+(text.length>52?'…':''));
  addMsgRow('user', text);
  setBusy(true);
  var answer='', detDomain='general'; addStreamRow();
  try {
    if (docFile) { var da=await callDoc(text,docFile.text); answer=da||'No response.'; finalizeStream(answer); await saveMessage(activeId,'assistant',answer); setBusy(false); return; }
    answer = await callStream(text, hist, function(d){ detDomain=d||'general'; showDomainPill(detDomain); });
    if (!answer||!answer.trim()) answer='No response from model. Please try again.';
    finalizeStream(answer);
    await saveMessage(activeId,'assistant',answer);
  } catch(err) {
    var em2=err.message==='stopped'?'*(Generation stopped)*':'Error: '+escHtml(err.message);
    finalizeStream(em2); if(err.message!=='stopped')await saveMessage(activeId,'assistant',em2);
  } finally { setBusy(false); }
}

/* ═══════════════════════════════════
   API CALLERS
═══════════════════════════════════ */
async function callStream(message,history,onDomain){
  var res;
  try { res=await fetch(API+'/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message,history,userContext:userContext||''})}); }
  catch(e){ throw new Error('Network error: '+e.message); }
  if(!res.ok){console.warn('Stream failed '+res.status+', fallback');return await callMessage(message,history);}
  var reader=res.body.getReader(); streamRdr=reader;
  var dec=new TextDecoder(),buf='',full='';
  try {
    while(true){
      if(stopFlag){reader.cancel();throw new Error('stopped');}
      var r=await reader.read(); if(r.done)break;
      buf+=dec.decode(r.value,{stream:true});
      var lns=buf.split('\n'); buf=lns.pop();
      for(var j=0;j<lns.length;j++){
        var line=lns[j].trim(); if(!line.startsWith('data:'))continue;
        var data=line.slice(5).trim(); if(data==='[DONE]')return full;
        try{var p=JSON.parse(data);if(p.domain&&onDomain)onDomain(p.domain);if(p.token){full+=p.token;updateStream(full);}if(p.error)throw new Error(p.error);}catch(pe){}
      }
    }
  } finally { streamRdr=null; }
  if(!full.trim())return await callMessage(message,history);
  return full;
}
async function callMessage(message,history){
  updateStream('Thinking…');
  var res;
  try{res=await fetch(API+'/chat/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message,history})});}
  catch(e){throw new Error('Network error: '+e.message);}
  if(!res.ok){var t=await res.text().catch(function(){return '';});throw new Error('API '+res.status+(t?': '+t:''));}
  var d=await res.json(); if(d.error)throw new Error(d.error); return d.response||'';
}
async function callDoc(question,documentText){
  updateStream('Analyzing document…');
  var res;
  try{res=await fetch(API+'/chat/document',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question,documentText})});}
  catch(e){throw new Error('Network error: '+e.message);}
  if(!res.ok){var t=await res.text().catch(function(){return '';});throw new Error('API '+res.status+(t?': '+t:''));}
  var d=await res.json(); if(d.error)throw new Error(d.error); return d.response||'No response.';
}

async function onFile(e){
  var file=e.target.files[0]; if(!file)return; e.target.value='';
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){toast('Extracting PDF…');try{var t=await extractPDF(file);docFile={name:file.name,text:t};updateDocBar();toast('PDF ready — '+Math.round(t.length/1000)+'k chars');}catch(e){toast('PDF error: '+e.message);}}
  else if(ext==='docx'||ext==='doc'){toast('Extracting DOCX…');try{var t=await extractDOCX(file);docFile={name:file.name,text:t};updateDocBar();toast('DOCX ready');}catch(e){toast('DOCX error: '+e.message);}}
  else toast('Use PDF or DOCX only');
}
async function extractPDF(file){
  if(!window.pdfjsLib)throw new Error('PDF support unavailable.');
  var buf=await file.arrayBuffer(); var pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  var text='';
  for(var p=1;p<=pdf.numPages;p++){var pg=await pdf.getPage(p);var ct=await pg.getTextContent();text+=ct.items.map(function(x){return x.str;}).join(' ')+'\n\n';}
  return text.trim();
}
async function extractDOCX(file){
  var u8=new Uint8Array(await file.arrayBuffer()),pos=0;
  while(pos<u8.length-4){
    if(u8[pos]===0x50&&u8[pos+1]===0x4B&&u8[pos+2]===0x03&&u8[pos+3]===0x04){
      var comp=u8[pos+8]|(u8[pos+9]<<8),csz=u8[pos+18]|(u8[pos+19]<<8)|(u8[pos+20]<<16)|(u8[pos+21]<<24);
      var fnl=u8[pos+26]|(u8[pos+27]<<8),exl=u8[pos+28]|(u8[pos+29]<<8);
      var fn=new TextDecoder().decode(u8.slice(pos+30,pos+30+fnl)),ds=pos+30+fnl+exl;
      if(fn==='word/document.xml'){
        var xml;
        if(comp===0){xml=u8.slice(ds,ds+csz);}
        else if(comp===8){var c=u8.slice(ds,ds+csz),ds2=new DecompressionStream('deflate-raw'),w=ds2.writable.getWriter(),r2=ds2.readable.getReader();w.write(c);w.close();var cks=[],rd;while(true){rd=await r2.read();if(rd.done)break;cks.push(rd.value);}var tot=cks.reduce(function(s,ch){return s+ch.length;},0);xml=new Uint8Array(tot);var off=0;cks.forEach(function(ch){xml.set(ch,off);off+=ch.length;});}
        if(xml)return new TextDecoder().decode(xml).replace(/<w:br[^>]*\/>/g,'\n').replace(/<w:p[ >][^>]*>/g,'\n').replace(/<[^>]+>/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/ {2,}/g,' ').trim();
      }
      pos=ds+csz;
    } else pos++;
  }
  throw new Error('Could not extract DOCX content');
}

/* ═══════════════════════════════════
   MARKDOWN RENDERER
═══════════════════════════════════ */
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderMath(tex,display){if(window.katex){try{return window.katex.renderToString(tex,{displayMode:display,throwOnError:false,output:'html'});}catch(e){}}return display?'<div class="math-display">\\['+escHtml(tex)+'\\]</div>':'<span>\\('+escHtml(tex)+'\\)</span>';}
function inlineRender(s){
  if(!s)return '';
  s=s.replace(/\\\(([^)]+?)\\\)/g,function(_,t){return renderMath(t,false);});
  s=s.replace(/(?<!\$)\$(?!\$)([^$\n]+?)(?<!\$)\$(?!\$)/g,function(_,t){return renderMath(t,false);});
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g,'<em>$1</em>');
  s=s.replace(/`([^`\n]+?)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function buildCodeBlock(lang,code){
  var id='cb_'+Math.random().toString(36).slice(2),h='';
  if(window.hljs){try{h=lang?hljs.highlight(code,{language:lang,ignoreIllegals:true}).value:hljs.highlightAuto(code).value;}catch(e){h=escHtml(code);}}
  else h=escHtml(code);
  return '<div class="code-block"><div class="code-block-hd"><span class="code-lang">'+escHtml(lang||'code')+'</span><button class="code-copy-btn" onclick="copyCode(this,\''+id+'\')">Copy</button></div><pre><code id="'+id+'" class="hljs'+(lang?' language-'+escHtml(lang):'')+'">'+h+'</code></pre></div>';
}
function copyCode(btn,id){var el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.innerText).then(function(){btn.textContent='✓ Copied';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied');},2000);});}
function isTableDiv(l){return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(l||'');}
function parseRow(l){var r=(l||'').trim();if(r.startsWith('|'))r=r.slice(1);if(r.endsWith('|'))r=r.slice(0,-1);return r.split('|').map(function(c){return c.trim();});}
function renderMd(raw){
  if(!raw)return '';
  var blocks=[];
  raw=raw.replace(/\$\$([\s\S]+?)\$\$/g,function(_,t){var i=blocks.length;blocks.push(renderMath(t.trim(),true));return '\x02B'+i+'\x03';});
  raw=raw.replace(/\\\[([\s\S]+?)\\\]/g,function(_,t){var i=blocks.length;blocks.push(renderMath(t.trim(),true));return '\x02B'+i+'\x03';});
  raw=raw.replace(/```([\w-]*)\n?([\s\S]*?)```/g,function(_,lang,code){var i=blocks.length;var l=(lang||'').toLowerCase();if(l==='mermaid'){blocks.push('<div class="mermaid-wrap"><pre class="mermaid">'+escHtml(code.trim())+'</pre></div>');}else{blocks.push(buildCodeBlock(l,code.trim()));}return '\x02B'+i+'\x03';});
  var lines=raw.split('\n'),out=[],i=0;
  while(i<lines.length){
    var l=lines[i];
    var bm=l.trim().match(/^\x02B(\d+)\x03$/);if(bm){out.push(blocks[+bm[1]]);i++;continue;}
    var hm=l.match(/^(#{1,4})\s+(.+)$/);if(hm){out.push('<h'+hm[1].length+'>'+inlineRender(hm[2])+'</h'+hm[1].length+'>');i++;continue;}
    if(l.includes('|')&&i+1<lines.length&&isTableDiv(lines[i+1])){
      var hc=parseRow(l),br=[];i+=2;
      while(i<lines.length&&lines[i].trim()&&lines[i].includes('|')){br.push(parseRow(lines[i]));i++;}
      var cols=hc.length;
      var th='<thead><tr>'+hc.map(function(c){return '<th>'+inlineRender(c)+'</th>';}).join('')+'</tr></thead>';
      var tb='<tbody>'+br.map(function(r){var cs=[];for(var ci=0;ci<cols;ci++)cs.push('<td>'+inlineRender(r[ci]||'')+'</td>');return '<tr>'+cs.join('')+'</tr>';}).join('')+'</tbody>';
      out.push('<div class="table-wrap"><table>'+th+tb+'</table></div>');continue;
    }
    if(/^---+$/.test(l.trim())){out.push('<hr>');i++;continue;}
    if(/^> /.test(l)){var bq=[];while(i<lines.length&&/^> ?/.test(lines[i])){bq.push(lines[i].replace(/^> ?/,''));i++;}out.push('<blockquote>'+inlineRender(bq.join(' '))+'</blockquote>');continue;}
    if(/^\d+[.)]\s/.test(l)){var ol=[];while(i<lines.length&&/^\d+[.)]\s/.test(lines[i])){ol.push('<li>'+inlineRender(lines[i].replace(/^\d+[.)]\s+/,''))+'</li>');i++;}out.push('<ol>'+ol.join('')+'</ol>');continue;}
    if(/^[-*•]\s/.test(l)){var ul=[];while(i<lines.length&&/^[-*•]\s/.test(lines[i])){ul.push('<li>'+inlineRender(lines[i].replace(/^[-*•]\s+/,''))+'</li>');i++;}out.push('<ul>'+ul.join('')+'</ul>');continue;}
    if(!l.trim()){i++;continue;}
    var pl=[l];while(i+1<lines.length){var nt=lines[i+1];if(!nt.trim()||/^(#{1,4}\s|> |[-*•]\s|\d+[.)]\s|---+$|\x02B)/.test(nt))break;pl.push(nt);i++;}
    out.push('<p>'+pl.map(function(x){return inlineRender(x);}).join('<br>')+'</p>');i++;
  }
  return out.join('\n');
}
function postRender(el){
  if(!el)return;
  var ms=el.querySelectorAll('pre.mermaid:not([data-processed])');
  if(ms.length&&window.mermaid){try{ms.forEach(function(m){m.setAttribute('data-processed','1');});mermaid.init(undefined,ms);}catch(e){}}
  el.querySelectorAll('pre code:not(.hljs)').forEach(function(b){try{hljs.highlightElement(b);}catch(e){}});
  if(window.katex&&window.renderMathInElement){try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}],throwOnError:false});}catch(e){}}
}

function updateDocBar(){var b=document.getElementById('docbar'),n=document.getElementById('docnm');docFile?(b.classList.add('on'),n.textContent=docFile.name):(b.classList.remove('on'),n.textContent='');}
function removeDoc(){docFile=null;updateDocBar();toast('Document removed');}
function setBusy(v){busy=v;stopFlag=false;document.getElementById('sendbtn').disabled=v;var s=document.getElementById('stopbtn');v?s.classList.add('on'):s.classList.remove('on');}
function doStop(){stopFlag=true;if(streamRdr){try{streamRdr.cancel();}catch(e){}}}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px';}
function useSug(t){var i=document.getElementById('inp');i.value=t;resize(i);i.focus();}
function copyMsg(btn){var row=btn.closest('.mr');navigator.clipboard.writeText(row.querySelector('.mc').innerText).then(function(){toast('Copied');}).catch(function(){toast('Copy failed');});}
var _tt;
function toast(msg){var e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('on');},2400);}
</script>
