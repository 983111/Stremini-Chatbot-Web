<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreminiAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════
   DESIGN TOKENS — Pure Black Cosmos
═══════════════════════════════════ */
:root {
  --bg-void:       #000000;
  --bg-sidebar:    rgba(5,6,8,0.96);
  --bg-main:       #000000;
  --bg-card:       rgba(10,12,22,0.85);
  --bg-input:      rgba(15,17,26,0.92);
  --bg-input-focus:rgba(6,16,42,0.85);
  --bg-hover:      #0f111a;

  --tx:            #e2e8f0;
  --tx2:           #cbd5e1;
  --tx3:           #64748b;
  --tx4:           #4a6070;

  --acc:           #8ab4f8;
  --acc2:          #a4c4f9;
  --acc-bg:        rgba(138,180,248,0.08);
  --acc-bdr:       rgba(138,180,248,0.20);

  --bdr:           #1a1d24;
  --bdr2:          #2a303c;

  --red:           #ff5a6e;
  --green:         #3dffa0;

  --font:          'Outfit', ui-sans-serif, sans-serif;
  --mono:          'JetBrains Mono', ui-monospace, monospace;

  --sw:            260px;
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     14px;
  --radius-xl:     18px;
  --radius-2xl:    24px;

  --sh-send:       0 0 14px rgba(138,180,248,0.2);
  --sh-card:       0 4px 20px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════
   RESET
═══════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  background: #000000;
  color: var(--tx);
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ═══════════════════════════════════
   ANIMATIONS
═══════════════════════════════════ */
@keyframes sdot { 0%,60%,100%{transform:translateY(0);opacity:.25;} 30%{transform:translateY(-6px);opacity:1;} }
@keyframes smsgIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
@keyframes scardIn { from{opacity:0;transform:translateY(24px) scale(0.97);} to{opacity:1;transform:none;} }
@keyframes sorbitDot { 0%{transform:rotate(0deg) translateX(48px) rotate(0deg);} 100%{transform:rotate(360deg) translateX(48px) rotate(-360deg);} }
@keyframes sring { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(1.04);} }
@keyframes spulse { 0%,100%{box-shadow:0 0 6px #8ab4f8,0 0 12px rgba(138,180,248,0.4);} 50%{box-shadow:0 0 12px #8ab4f8,0 0 24px rgba(138,180,248,0.7);} }
@keyframes wIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:none;} }
@keyframes tdBounce { 0%,60%,100%{transform:translateY(0);opacity:.25;} 30%{transform:translateY(-6px);opacity:1;} }
@keyframes pulseDot { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
@keyframes orbBreath { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

/* ═══════════════════════════════════
   BACKGROUND
═══════════════════════════════════ */
#bg-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  background: #000000;
}
#bg-layer::before {
  content: '';
  position: absolute; top: -20%; right: -10%; width: 70%; height: 70%;
  background: radial-gradient(ellipse, rgba(20,30,50,0.15) 0%, transparent 70%);
  filter: blur(40px);
}
#bg-layer::after {
  content: '';
  position: absolute; bottom: -10%; left: -10%; width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(25,35,60,0.10) 0%, transparent 70%);
  filter: blur(40px);
}
.bg-network {
  position: absolute; inset: 0; width: 100%; height: 100%;
}
.bg-planet {
  position: absolute; top: 35%; left: -10%; width: 500px; height: 500px;
  opacity: 0.05; transform: rotate(-12deg); pointer-events: none;
}

/* ═══════════════════════════════════
   LOADING
═══════════════════════════════════ */
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px; z-index: 200;
}
.load-wrap { position: relative; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.load-ring-outer {
  position: absolute; inset: -14px; border-radius: 50%;
  border: 1px solid rgba(138,180,248,0.2); animation: sring 4s ease infinite;
}
.load-ring-dot {
  position: absolute; top: -4px; left: 50%; margin-left: -4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: #8ab4f8; box-shadow: 0 0 10px #8ab4f8;
  animation: sorbitDot 4s linear infinite;
}
.load-orb {
  width: 72px; height: 72px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 40%, #0055cc 100%);
  box-shadow: 0 0 30px rgba(138,180,248,0.5), 0 0 60px rgba(138,180,248,0.2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-size: 26px; font-weight: 700; color: #fff;
  animation: orbBreath 2s ease-in-out infinite;
  position: relative; z-index: 1;
}
.load-txt {
  font-size: 12px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: #4a6a88;
}

/* ═══════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════ */
#auth-screen {
  position: fixed; inset: 0; background: #000;
  display: none; align-items: center; justify-content: center; z-index: 100;
}
#auth-screen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(20,80,200,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(80,20,160,0.12) 0%, transparent 60%);
  pointer-events: none;
}
.auth-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 400px; padding: 44px 40px;
  background: rgba(10,12,20,0.95);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-2xl);
  box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 60px rgba(138,180,248,0.05);
  animation: scardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
.auth-logo { display:flex; align-items:center; gap:14px; margin-bottom:32px; }
.auth-logo-orb {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 40%, #0044aa 100%);
  box-shadow: 0 0 20px rgba(138,180,248,0.5);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-size: 18px; font-weight: 700; color: #fff;
}
.auth-logo-name { font-size: 18px; font-weight: 700; letter-spacing: 0.01em; color: #f0f4ff; }
.auth-logo-sub { font-size: 11px; color: #64748b; letter-spacing: 0.04em; margin-top: 2px; }
.auth-tabs {
  display: flex; background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-md);
  padding: 3px; margin-bottom: 22px; gap: 2px;
}
.auth-tab {
  flex: 1; padding: 8px; border: none; background: none; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 500; color: #64748b;
  border-radius: 7px; transition: all 0.2s;
}
.auth-tab.active { background: rgba(138,180,248,0.12); color: #8ab4f8; box-shadow: 0 0 12px rgba(138,180,248,0.1); }
.auth-field { margin-bottom: 14px; }
.auth-field label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:#4a6a88; margin-bottom:6px; }
.auth-field input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid rgba(255,255,255,0.08); border-radius: var(--radius-md);
  font-family: var(--font); font-size: 14px; color: var(--tx);
  background: rgba(255,255,255,0.04); outline: none; transition: all 0.2s;
}
.auth-field input:focus { border-color: rgba(138,180,248,0.5); box-shadow: 0 0 0 3px rgba(138,180,248,0.08); background: rgba(138,180,248,0.04); }
.auth-submit {
  width: 100%; padding: 12px; border: none; border-radius: var(--radius-md);
  background: linear-gradient(135deg, #2a3c5a 0%, #1a2a4a 100%);
  color: var(--tx); font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; margin-top: 8px; transition: all 0.2s;
  border: 1px solid rgba(138,180,248,0.25); box-shadow: 0 0 20px rgba(138,180,248,0.15);
}
.auth-submit:hover { background: linear-gradient(135deg, #3a4c6a 0%, #2a3a5a 100%); transform: translateY(-1px); }
.auth-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.auth-msg { font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
.auth-msg.err { color: var(--red); } .auth-msg.ok { color: var(--green); }
.auth-divider {
  display: flex; align-items: center; gap: 12px; margin: 18px 0 14px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: #4a6a88;
}
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.07); }
.auth-google {
  width: 100%; padding: 11px;
  border: 1.5px solid rgba(255,255,255,0.08); border-radius: var(--radius-md);
  background: rgba(255,255,255,0.03);
  font-family: var(--font); font-size: 13px; font-weight: 500; color: #8b92a5;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.2s;
}
.auth-google:hover { background: rgba(138,180,248,0.06); border-color: rgba(138,180,248,0.25); color: var(--tx); }
.auth-google:disabled { opacity: 0.6; cursor: not-allowed; }

/* ═══════════════════════════════════
   APP LAYOUT
═══════════════════════════════════ */
#app {
  display: none; height: 100vh; overflow: hidden;
  flex-direction: row; position: relative; z-index: 1;
}

/* ═══════════════════════════════════
   SIDEBAR
═══════════════════════════════════ */
#sb {
  width: var(--sw); height: 100%;
  background: var(--bg-sidebar); backdrop-filter: blur(20px);
  border-right: 1px solid var(--bdr);
  display: flex; flex-direction: column;
  z-index: 20; position: relative; flex-shrink: 0;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
#sb.collapsed { transform: translateX(calc(-1 * var(--sw))); position: absolute; height: 100%; }

.sb-top {
  padding: 22px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display:flex; align-items:center; gap:12px; }
.b-orb {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 45%, #0044aa 100%);
  box-shadow: 0 0 12px rgba(138,180,248,0.5);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-size: 11px; font-weight: 700; color: #fff;
}
.bname-wrap { display: flex; align-items: center; gap: 0; }
.bname { font-size: 15px; font-weight: 600; color: #d1d5db; letter-spacing: 0.05em; }
.bsep { font-size: 11px; color: #4b5563; margin: 0 6px; }
.bsub { font-size: 11px; color: #64748b; }
.ib {
  background: none; border: none; cursor: pointer; color: var(--tx3);
  padding: 4px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); transition: color 0.15s;
}
.ib:hover { color: var(--tx); }

.sb-new-btn {
  margin: 0 12px 12px;
  width: calc(100% - 24px);
  padding: 10px 16px;
  border-radius: var(--radius-lg);
  background: #0f111a; border: 1px solid var(--bdr);
  color: #d1d5db; font-size: 13px; font-weight: 500;
  cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.15s; font-family: var(--font);
}
.sb-new-btn:hover { background: rgba(255,255,255,0.04); }
.sb-new-icon { color: var(--tx3); display: flex; }

.clist { flex:1; overflow-y:auto; padding: 4px 12px; display: flex; flex-direction: column; gap: 2px; }
.clabel {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.10em; color: #4a6070; padding: 10px 8px 4px;
}
.ci {
  display: flex; align-items: center; padding: 7px 10px;
  border-radius: var(--radius-md); cursor: pointer;
  font-size: 12.5px; font-weight: 400; color: #8b92a5;
  margin-bottom: 1px; border: 1px solid transparent;
  gap: 8px; transition: all 0.12s;
}
.ci:hover { background: #0f111a; color: var(--tx); }
.ci.active { background: #151821; border-color: var(--bdr2); color: var(--tx); }
.ci-icon { font-size: 10px; opacity: 0.5; flex-shrink: 0; }
.ci-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ci-del {
  opacity: 0; background: none; border: none; cursor: pointer;
  color: #4b5563; padding: 1px 4px; border-radius: 4px;
  font-size: 11px; transition: all 0.15s; flex-shrink: 0;
}
.ci:hover .ci-del { opacity: 1; }
.ci-del:hover { color: var(--red); }

.sb-foot { padding: 8px 12px 16px; border-top: 1px solid var(--bdr); background: #050608; }
.ctx-btn {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius-md); border: none;
  background: none; cursor: pointer; font-family: var(--font);
  font-size: 12.5px; font-weight: 500; color: #8b92a5;
  transition: all 0.15s; margin-bottom: 4px;
}
.ctx-btn:hover { color: #d1d5db; }
#ctx-panel { display: none; padding: 4px 0 8px; }
#ctx-panel.open { display: block; }
#ctx-panel textarea {
  width: 100%; border: 1.5px solid rgba(138,180,248,0.15);
  border-radius: var(--radius-md); padding: 8px 10px;
  font-family: var(--font); font-size: 12px; color: #d1d5db;
  resize: none; outline: none; line-height: 1.5; height: 72px;
  background: rgba(4,10,26,0.90); transition: border-color 0.2s;
}
#ctx-panel textarea:focus { border-color: var(--acc); }
#ctx-panel textarea::placeholder { color: var(--tx3); }
.ctx-save {
  margin-top: 5px; width: 100%; padding: 7px; border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #2a3c5a, #1a2a4a);
  color: var(--tx); font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(138,180,248,0.2);
}

.urow {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-md); cursor: default;
}
.uav {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #1e2a3a, #0a1020);
  border: 1px solid var(--bdr2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--acc2); flex-shrink: 0;
}
.uinfo { flex:1; min-width:0; }
.ulabel { font-size: 12.5px; font-weight: 600; color: #d1d5db; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.uemail { font-size: 10.5px; color: #4a6070; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.signout-btn {
  background: none; border: none; cursor: pointer; color: #4a6070;
  padding: 4px; border-radius: 5px; display:flex; transition: color 0.15s;
}
.signout-btn:hover { color: var(--red); }

/* ═══════════════════════════════════
   MAIN PANEL
═══════════════════════════════════ */
#main {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  position: relative; z-index: 2; overflow: hidden;
}

#topbar {
  display: flex; align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--bdr);
  background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
  flex-shrink: 0; gap: 10px; z-index: 20;
  position: relative;
}
.tb-brand { display:flex; align-items:center; gap:8px; }
.tb-orb-sm {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 45%, #0044aa 100%);
  box-shadow: 0 0 8px rgba(138,180,248,0.4);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-size: 10px; font-weight: 700; color: #fff;
}
.tb-name { font-weight: 700; font-size: 14px; color: #fff; letter-spacing: 0.03em; }
.mpill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 14px 5px 10px; border-radius: 99px;
  border: 1px solid rgba(138,180,248,0.2);
  background: rgba(138,180,248,0.06);
  font-size: 12.5px; font-weight: 600; color: #ddeeff; letter-spacing: 0.01em;
}
.mdot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--acc); flex-shrink: 0;
  animation: pulseDot 2s ease-in-out infinite;
  box-shadow: 0 0 6px var(--acc);
}
#domain-pill { display:none; }

/* Desktop menu toggle */
.desktop-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-radius: 20px;
  border: 1px solid var(--bdr2); background: rgba(0,0,0,0.5);
  font-size: 12px; color: #9ca3af; cursor: pointer;
  font-family: var(--font); transition: all 0.2s;
}
.desktop-toggle:hover { color: #fff; background: rgba(255,255,255,0.05); }

/* Mobile header */
#mobile-header {
  display: none;
  align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--bdr);
  background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
  flex-shrink: 0; z-index: 20;
}
.mb-new {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid var(--bdr2); background: transparent;
  font-size: 12px; color: #9ca3af; cursor: pointer;
  font-family: var(--font);
}

/* ═══════════════════════════════════
   CHAT AREA
═══════════════════════════════════ */
#chat-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; position:relative; z-index:1; }

/* WELCOME */
#welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px 0; gap: 10px; text-align: center;
  animation: wIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
.w-orb-wrap { position:relative; width:96px; height:96px; display:flex; align-items:center; justify-content:center; margin-bottom:0; }
.w-ring1 { position:absolute; inset:-12px; border-radius:50%; border:1px solid rgba(138,180,248,0.2); animation:sring 4s ease infinite; }
.w-ring1::after {
  content:''; position:absolute; top:-4px; left:50%; margin-left:-4px;
  width:8px; height:8px; border-radius:50%;
  background:var(--acc); box-shadow:0 0 8px var(--acc), 0 0 16px rgba(138,180,248,0.6);
  animation:sorbitDot 4s linear infinite;
}
.w-ring2 { position:absolute; inset:-26px; border-radius:50%; border:1px solid rgba(138,180,248,0.1); animation:sring 4s ease infinite 1.5s; }
.w-orb {
  width:96px; height:96px; border-radius:50%; position:relative; z-index:1;
  background: radial-gradient(circle at 30% 28%, #a0d8ff 0%, #38b2ff 35%, #0055cc 65%, #001266 100%);
  box-shadow: 0 0 40px rgba(138,180,248,0.6), 0 0 80px rgba(138,180,248,0.25), 0 8px 32px rgba(0,0,0,0.6), inset 0 2px 6px rgba(255,255,255,0.25);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font); font-size:32px; font-weight:700; color:rgba(255,255,255,0.95);
  transition:transform 0.3s, box-shadow 0.3s;
}
.w-orb:hover { transform:scale(1.04); box-shadow:0 0 60px rgba(138,180,248,0.8),0 8px 32px rgba(0,0,0,0.6),inset 0 2px 6px rgba(255,255,255,0.25); }
.wtitle { font-size:32px; font-weight:700; color:#eaf2ff; letter-spacing:-0.01em; margin-top:20px; }
.wsub { font-size:14px; color:#6a90b0; margin-top:6px; }

/* Suggestion cards */
.sugs { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; max-width:700px; width:100%; margin-top:20px; }
.sc {
  background: rgba(8,12,22,0.65); border: 1px solid rgba(138,180,248,0.15);
  border-radius: var(--radius-xl); padding: 0; cursor: pointer; text-align: left;
  font-family: var(--font); transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  box-shadow: var(--sh-card); overflow: hidden; min-height: 80px;
}
.sc:hover { transform:translateY(-3px); border-color:rgba(138,180,248,0.35); background:rgba(10,25,60,0.85); box-shadow:0 8px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(138,180,248,0.15); }
.sc-inner { display:flex; align-items:center; height:100%; }
.sc-text { flex:1; padding:20px 20px 20px 22px; }
.sc strong { display:block; font-size:13.5px; font-weight:600; color:#eaf2ff; margin-bottom:3px; }
.sc span { font-size:12px; color:#8bb8d8; line-height:1.4; }
.sc-emoji-wrap { width:80px; height:80px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.sc-emoji { font-size:42px; line-height:1; filter:drop-shadow(0 0 8px rgba(138,180,248,0.4)); transition:transform 0.25s; }
.sc:hover .sc-emoji { transform:scale(1.14) rotate(-4deg); }

/* Messages */
#msgs-wrap {
  max-width: 860px; width: 100%; margin: 0 auto;
  padding: 24px 28px 0; display: none; flex-direction: column; gap: 28px;
}
.mr { display:flex; align-items:flex-start; gap:12px; animation:smsgIn 0.28s cubic-bezier(0.16,1,0.3,1) both; }
.mr.user { justify-content: flex-end; }

/* Planet avatar for AI */
.mav-ai {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:#0a0c10; border:1px solid var(--bdr2);
  box-shadow:0 0 15px rgba(138,180,248,0.05);
  display:flex; align-items:center; justify-content:center; margin-top:2px;
}
.planet-svg { width:22px; height:22px; }

/* User avatar */
.mav-usr {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:#e2e8f0; border:1px solid var(--bdr2); overflow:hidden; margin-top:2px;
  display:flex; align-items:center; justify-content:center;
}
.user-svg { width:100%; height:100%; color:#64748b; margin-top:6px; }

.mbody-ai { display:flex; flex-direction:column; gap:6px; max-width:82%; }
.mbody-usr { display:flex; flex-direction:column; gap:6px; max-width:70%; align-items:flex-end; }

/* Bubbles */
.bubble-ai {
  padding:12px 20px; font-size:13px; line-height:1.65;
  background:rgba(10,12,22,0.85); color:#cbd5e1;
  border:1px solid var(--bdr); border-radius:4px 24px 24px 24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3); backdrop-filter:blur(8px);
}
.bubble-usr {
  padding:12px 20px; font-size:13px; line-height:1.65;
  background:rgba(30,35,45,0.92); color:var(--tx);
  border-radius:24px 4px 24px 24px; backdrop-filter:blur(8px);
}

/* Message actions */
.macts { display:flex; align-items:center; gap:4px; padding-left:8px; opacity:0; transition:opacity 0.15s; }
.mr:hover .macts { opacity:1; }
.abt {
  padding:5px 10px; border-radius:99px;
  background:none; border:1px solid transparent;
  color:var(--tx3); cursor:pointer; display:flex; align-items:center; gap:4px;
  font-size:11px; font-family:var(--font); transition:all 0.15s;
}
.abt:hover { background:#1e232d; color:var(--tx); }
.abt svg { flex-shrink:0; }

/* Typing dots */
.typing { display:flex; gap:4px; align-items:center; padding:6px 0; }
.td { width:5px; height:5px; border-radius:50%; background:var(--acc); box-shadow:0 0 6px var(--acc); animation:tdBounce 1.2s ease infinite; }
.td:nth-child(2){animation-delay:.14s;} .td:nth-child(3){animation-delay:.28s;}
.pad { height:28px; flex-shrink:0; }

/* ═══════════════════════════════════
   INPUT BAR
═══════════════════════════════════ */
#bottom {
  flex-shrink: 0; padding: 0 16px 28px;
  background: linear-gradient(to top, #000000 60%, rgba(0,0,0,0.92) 80%, transparent);
  display: flex; justify-content: center; z-index: 50; position: relative;
}
#inner { max-width: 860px; width: 100%; position: relative; }

#docbar {
  display: none; background: rgba(138,180,248,0.06);
  border: 1px solid var(--acc-bdr); border-radius: var(--radius-md);
  padding: 7px 14px; font-size: 12.5px; color: #8bb8d8;
  align-items: center; gap: 8px; margin-bottom: 8px;
}
#docbar.on { display: flex; }
.dic { color: var(--acc); flex-shrink: 0; }
.dnm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; color:var(--tx); }
.drm {
  background:none; border:none; cursor:pointer; color:var(--tx3);
  font-size:11.5px; font-family:var(--font); font-weight:600;
  padding:1px 7px; border-radius:4px; transition:all 0.15s;
}
.drm:hover { color:var(--red); }

.shell {
  background: var(--bg-input); backdrop-filter: blur(12px);
  border: 1px solid var(--bdr2); border-radius: 26px;
  display: flex; align-items: center; position: relative;
  height: 54px; box-shadow: 0 5px 24px rgba(0,0,0,0.5);
  transition: border-color 0.2s;
}
.shell:focus-within { border-color: #4b5563; }

/* Plus menu */
.plus-wrap { position: absolute; left: 6px; z-index: 50; }
#plusbtn {
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:none; border:none; color:var(--tx3); cursor:pointer;
  transition:all 0.2s;
}
#plusbtn:hover { color:var(--tx); }
#plusbtn.open { background:#1a1d24; color:#fff; transform:rotate(45deg); }
#plus-menu {
  display:none; position:absolute; bottom:52px; left:0;
  width:192px; background:rgba(15,17,26,0.97); backdrop-filter:blur(20px);
  border:1px solid var(--bdr2); border-radius:var(--radius-xl);
  box-shadow:0 12px 40px rgba(0,0,0,0.85); overflow:hidden; z-index:60; padding:6px;
}
#plus-menu.open { display:block; }
.pm-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--radius-md);
  background:none; border:none; color:var(--tx);
  font-size:13px; cursor:pointer; width:100%; text-align:left;
  font-family:var(--font); transition:background 0.12s;
}
.pm-item:hover { background:#1e232d; }
.pm-icon { color:var(--acc); display:flex; }

#inp {
  flex:1; background:transparent; border:none; outline:none; resize:none;
  font-family:var(--font); font-size:13.5px; color:var(--tx);
  height:100%; padding-left:58px; padding-right:200px;
}
#inp::placeholder { color:#4a6a88; }
input[type="file"]#finput { display:none; }

/* Right controls */
.ibar-right { position:absolute; right:6px; display:flex; align-items:center; gap:6px; }

/* Model selector */
.model-wrap { position:relative; }
#modelbtn {
  display:flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:20px;
  background:none; border:none; color:#9ca3af;
  cursor:pointer; font-size:12px; font-family:var(--font);
  white-space:nowrap; transition:all 0.15s;
}
#modelbtn:hover { color:#fff; }
#modelbtn.open { background:#1a1d24; color:#fff; }
#model-menu {
  display:none; position:absolute; bottom:48px; right:0;
  width:180px; background:rgba(15,17,26,0.97); backdrop-filter:blur(20px);
  border:1px solid var(--bdr2); border-radius:var(--radius-xl);
  box-shadow:0 12px 40px rgba(0,0,0,0.85); overflow:hidden; z-index:60; padding:6px;
}
#model-menu.open { display:block; }
.mm-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--radius-md);
  background:none; border:none; color:#cbd5e1;
  font-size:13px; cursor:pointer; width:100%; text-align:left;
  font-family:var(--font); transition:background 0.12s;
}
.mm-item:hover { background:#1a1d24; }
.mm-item.active { background:#1e232d; color:#fff; }
.mm-icon { color:var(--tx3); display:flex; flex-shrink:0; }
.mm-item.active .mm-icon { color:var(--acc); }
.mm-chevron { color:var(--tx3); display:flex; flex-shrink:0; }

#sendbtn {
  width:42px; height:42px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; border:1px solid transparent;
  background:#1e232d; color:var(--tx3);
  cursor:default; transition:all 0.25s;
}
#sendbtn.active {
  border-color:#4b6a9e; background:#2a3c5a; color:#fff;
  cursor:pointer; box-shadow:var(--sh-send);
}
#sendbtn:hover.active { transform:scale(1.05); }
#stopbtn {
  width:42px; height:42px; border-radius:50%;
  display:none; align-items:center; justify-content:center;
  flex-shrink:0; border:1px solid rgba(255,90,110,0.3);
  background:rgba(255,90,110,0.08); color:var(--red);
  cursor:pointer; transition:all 0.2s;
}
#stopbtn.on { display:flex; }
#stopbtn:hover { background:rgba(255,90,110,0.15); }

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
#toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(8,12,24,0.97);
  border:1px solid rgba(138,180,248,0.25); color:var(--acc);
  border-radius:var(--radius-md); padding:9px 18px;
  font-size:11px; font-weight:600; letter-spacing:0.10em; text-transform:uppercase;
  opacity:0; pointer-events:none; z-index:999;
  transition:opacity 0.2s, transform 0.2s; white-space:nowrap;
  box-shadow:0 0 20px rgba(138,180,248,0.10), 0 8px 32px rgba(0,0,0,0.5);
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════
   OVERLAY
═══════════════════════════════════ */
#overlay { position:fixed; inset:0; z-index:40; display:none; }
#overlay.on { display:block; }
#mobile-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
  z-index:30; display:none; pointer-events:none;
}
#mobile-backdrop.on { display:block; }

/* ═══════════════════════════════════
   MESSAGE CONTENT STYLES
═══════════════════════════════════ */
.mc { color:#cbd5e1; font-size:13.5px; line-height:1.80; font-family:var(--font); }
.mc > * + * { margin-top:10px; }
.mc p { margin:0; } .mc p+p { margin-top:10px; }
.mc ul { padding-left:20px; list-style:disc; margin:6px 0; }
.mc ol { padding-left:20px; list-style:decimal; margin:6px 0; }
.mc li { margin-bottom:3px; line-height:1.65; color:#c5d4e8; }
.mc h1 { font-size:18px; font-weight:700; margin:14px 0 5px; color:#e2e8f0; letter-spacing:-0.01em; }
.mc h2 { font-size:15px; font-weight:600; margin:12px 0 4px; color:#c5d4e8; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:5px; }
.mc h3 { font-size:13px; font-weight:600; margin:10px 0 3px; color:#8b92a5; }
.mc h1:first-child,.mc h2:first-child,.mc h3:first-child { margin-top:0; }
.mc strong { font-weight:600; color:var(--acc2); }
.mc em { font-style:italic; color:#8b92a5; }
.mc a { color:var(--acc); text-decoration:underline; text-underline-offset:3px; }
.mc code { font-family:var(--mono); background:rgba(138,180,248,0.1); border:1px solid rgba(138,180,248,0.18); border-radius:4px; padding:1px 5px; font-size:12px; color:var(--acc2); }
.mc blockquote { border-left:2px solid var(--acc); padding:6px 0 6px 14px; color:#8b92a5; font-style:italic; background:rgba(138,180,248,0.04); border-radius:0 5px 5px 0; margin:6px 0; }
.mc hr { border:none; border-top:1px solid rgba(255,255,255,0.08); margin:10px 0; }
.step-item { display:flex; gap:8px; align-items:flex-start; padding:8px 12px; border:1px solid rgba(138,180,248,0.15); border-radius:8px; background:rgba(10,15,30,0.6); margin:6px 0; }
.step-item strong { font-size:10px; color:var(--acc); white-space:nowrap; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
.step-item span { font-size:13px; color:var(--tx); }
.table-wrap { overflow-x:auto; margin:8px 0; }
.table-wrap table { width:100%; border-collapse:collapse; font-size:12.5px; }
.table-wrap th { background:rgba(138,180,248,0.08); font-weight:600; text-align:left; padding:7px 10px; border:1px solid rgba(138,180,248,0.15); font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--acc); }
.table-wrap td { padding:6px 10px; border:1px solid rgba(255,255,255,0.07); color:#9ca3af; }
.table-wrap tr:nth-child(even) td { background:rgba(138,180,248,0.02); }
.code-block { background:#060c1c; border:1px solid rgba(138,180,248,0.15); border-radius:8px; overflow:hidden; margin:8px 0; }
.code-block-hd { display:flex; align-items:center; justify-content:space-between; padding:7px 12px; background:#070d1f; border-bottom:1px solid rgba(138,180,248,0.1); }
.code-lang { font-family:var(--mono); font-size:10px; color:#4a6a88; text-transform:lowercase; }
.code-copy-btn { background:none; border:1px solid rgba(138,180,248,0.18); cursor:pointer; font-size:10.5px; font-weight:600; color:#4a6a88; font-family:var(--font); padding:2px 8px; border-radius:4px; transition:all 0.15s; }
.code-copy-btn:hover { background:rgba(138,180,248,0.08); color:var(--acc); }
.code-copy-btn.copied { background:rgba(61,255,160,0.08); color:var(--green); }
.code-block pre { margin:0; border-radius:0; border:none; background:#060c1c; }
.code-block pre code.hljs { font-family:var(--mono); font-size:12.5px; line-height:1.7; padding:14px 16px; background:#060c1c; display:block; }
.math-block { overflow-x:auto; padding:12px 16px; margin:8px 0; background:rgba(138,180,248,0.04); border:1px solid rgba(138,180,248,0.15); border-radius:8px; text-align:center; }
.mermaid-wrap { background:#0a1420; border:1px solid rgba(138,180,248,0.15); border-radius:8px; padding:14px; margin:8px 0; overflow-x:auto; }

/* ═══════════════════════════════════
   RESPONSIVE
═══════════════════════════════════ */
@media(max-width:768px){
  #sb { position:fixed; transform:translateX(calc(-1 * var(--sw))); }

}

  #topbar { display:flex !important; }
  #mobile-header { display:none !important; }
}
@media(max-width:480px){
  .auth-card { border:none; box-shadow:none; padding:36px 22px; }
}

      <div class="auth-logo-orb">S</div>

        <div class="auth-logo-name">StreminiAI</div>
        <div class="auth-logo-sub">AI · Cosmic Guide</div>
      </div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="signin" onclick="switchTab(this)">Sign in</button>
      <button class="auth-tab" data-tab="signup" onclick="switchTab(this)">Create account</button>
    </div>

    <div class="auth-field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"/></div>

    <button class="auth-submit" id="auth-btn" onclick="doAuth()">Sign in</button>
    <p class="auth-msg" id="auth-msg"></p>

async function doAuth(){
  var email=document.getElementById('auth-email').value.trim();
  var pass=document.getElementById('auth-password').value;
  var btn=document.getElementById('auth-btn');
  setMsg('',false);
  if(!email){setMsg('Email is required.',false);return;}
  if(!pass||pass.length<6){setMsg('Password must be at least 6 characters.',false);return;}
  btn.disabled=true;btn.textContent=_activeTab==='signin'?'Signing in…':'Creating account…';
  try{
    var res;
    if(_activeTab==='signin'){res=await sb.auth.signInWithPassword({email:email,password:pass});if(res.error)throw res.error;}
    else{
      var name=document.getElementById('auth-name').value.trim()||email.split('@')[0];
      res=await sb.auth.signUp({email:email,password:pass,options:{data:{display_name:name}}});
      if(res.error)throw res.error;
      if(res.data.user&&!res.data.session){setMsg('Check your email to confirm, then sign in.',true);_activeTab='signin';document.getElementById('auth-btn').textContent='Sign in';document.getElementById('auth-name-field').style.display='none';document.querySelectorAll('.auth-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab==='signin');});return;}
    }
  }catch(e){setMsg(e.message||'Authentication failed.',false);}
  finally{btn.disabled=false;btn.textContent=_activeTab==='signin'?'Sign in':'Create account';}

async function sendMsg(){
  if(busy||!currentUser)return;
  var inp=document.getElementById('inp'),text=inp.value.trim();
  if(!text)return;
  if(!activeId){try{activeId=await createChat(text.slice(0,52)+(text.length>52?'…':''));}catch(e){toast('Error creating chat: '+e.message);return;}}
  inp.value='';onInput(inp);
  var hist=messages.slice(-20).map(function(m){return{role:m.role,content:m.content};});
  await saveMessage(activeId,'user',text);
  if(messages.filter(function(m){return m.role==='user';}).length===1)updateChatTitle(activeId,text.slice(0,52)+(text.length>52?'…':''));
  addMsgRow('user',text);
  setBusy(true);
  addStreamRow();
  var answer='';
  try{
    if(docFile){answer=await callDoc(text,docFile.text);}
    else{answer=await callStream(text,hist);}
    if(!answer||!answer.trim())answer='No response from model. Please try again.';
    finalizeStream(answer);
    await saveMessage(activeId,'assistant',answer);
  }catch(err){
    var em=err.message==='stopped'?'*(Generation stopped)*':'Error: '+escHtml(err.message);
    finalizeStream(em);
    if(err.message!=='stopped')await saveMessage(activeId,'assistant',em);
  }finally{setBusy(false);}
}

/* ═══════════════════════════════════
   API CALLERS (preserved)
═══════════════════════════════════ */
async function callStream(message,history){
  var res;
  try{res=await fetch(API+'/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,history:history,userContext:userContext||''})});}
  catch(e){throw new Error('Network error: '+e.message);}
  if(!res.ok){console.warn('Stream failed '+res.status+', fallback');return await callMessage(message,history);}
  var reader=res.body.getReader();streamRdr=reader;
  var dec=new TextDecoder(),buf='',full='';
  try{
    while(true){
      if(stopFlag){reader.cancel();throw new Error('stopped');}
      var r=await reader.read();if(r.done)break;
      buf+=dec.decode(r.value,{stream:true});
      var lines=buf.split('\n');buf=lines.pop();
      for(var j=0;j<lines.length;j++){
        var line=lines[j].trim();
        if(!line.startsWith('data:'))continue;
        var data=line.slice(5).trim();
        if(data==='[DONE]')return full;
        try{var p=JSON.parse(data);if(p.token){full+=p.token;updateStream(full);}if(p.error)throw new Error(p.error);}catch(pe){}
      }
    }
  }finally{streamRdr=null;}
  if(!full.trim())return await callMessage(message,history);
  return full;
}
async function callMessage(message,history){
  updateStream('Thinking…');
  var res;
  try{res=await fetch(API+'/chat/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,history:history})});}
  catch(e){throw new Error('Network error: '+e.message);}
  if(!res.ok){var t=await res.text().catch(function(){return'';});throw new Error('API '+res.status+(t?': '+t:''));}
  var d=await res.json();if(d.error)throw new Error(d.error);return d.response||'';
}
async function callDoc(question,documentText){
  updateStream('Analyzing document…');
  var res;
  try{res=await fetch(API+'/chat/document',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:question,documentText:documentText})});}
  catch(e){throw new Error('Network error: '+e.message);}
  if(!res.ok){var t=await res.text().catch(function(){return'';});throw new Error('API '+res.status+(t?': '+t:''));}
  var d=await res.json();if(d.error)throw new Error(d.error);return d.response||'No response.';
}

async function onFile(e){var file=e.target.files[0];if(!file)return;e.target.value='';var ext=file.name.split('.').pop().toLowerCase();if(ext==='pdf'){toast('Extracting PDF…');try{var t=await extractPDF(file);docFile={name:file.name,text:t};updateDocBar();toast('PDF ready — '+Math.round(t.length/1000)+'k chars');}catch(e){toast('PDF error: '+e.message);}}else if(ext==='docx'||ext==='doc'){toast('Extracting DOCX…');try{var t=await extractDOCX(file);docFile={name:file.name,text:t};updateDocBar();toast('DOCX ready');}catch(e){toast('DOCX error: '+e.message);}}else toast('Use PDF or DOCX only');}
async function extractPDF(file){if(!window.pdfjsLib)throw new Error('PDF support unavailable.');var buf=await file.arrayBuffer();var pdf=await window.pdfjsLib.getDocument({data:buf}).promise;var text='';for(var p=1;p<=pdf.numPages;p++){var pg=await pdf.getPage(p);var ct=await pg.getTextContent();text+=ct.items.map(function(x){return x.str;}).join(' ')+'\n\n';}return text.trim();}
async function extractDOCX(file){var u8=new Uint8Array(await file.arrayBuffer()),pos=0;while(pos<u8.length-4){if(u8[pos]===0x50&&u8[pos+1]===0x4B&&u8[pos+2]===0x03&&u8[pos+3]===0x04){var comp=u8[pos+8]|(u8[pos+9]<<8),csz=u8[pos+18]|(u8[pos+19]<<8)|(u8[pos+20]<<16)|(u8[pos+21]<<24);var fnl=u8[pos+26]|(u8[pos+27]<<8),exl=u8[pos+28]|(u8[pos+29]<<8);var fn=new TextDecoder().decode(u8.slice(pos+30,pos+30+fnl)),ds=pos+30+fnl+exl;if(fn==='word/document.xml'){var xml;if(comp===0){xml=u8.slice(ds,ds+csz);}else if(comp===8){var c=u8.slice(ds,ds+csz),ds2=new DecompressionStream('deflate-raw'),w=ds2.writable.getWriter(),r2=ds2.readable.getReader();w.write(c);w.close();var cks=[],rd;while(true){rd=await r2.read();if(rd.done)break;cks.push(rd.value);}var tot=cks.reduce(function(s,ch){return s+ch.length;},0);xml=new Uint8Array(tot);var off=0;cks.forEach(function(ch){xml.set(ch,off);off+=ch.length;});}if(xml)return new TextDecoder().decode(xml).replace(/<w:br[^>]*\/>/g,'\n').replace(/<w:p[ >][^>]*>/g,'\n').replace(/<[^>]+>/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/ {2,}/g,' ').trim();}pos=ds+csz;}else pos++;}throw new Error('Could not find content in DOCX');}

/* ═══════════════════════════════════
   MARKDOWN + MATH + CODE RENDERER (preserved)
═══════════════════════════════════ */
function renderMath(tex,display){if(window.katex){try{return window.katex.renderToString(tex,{displayMode:display,throwOnError:false,output:'html'});}catch(e){}}return display?'<div class="math-block">\\['+escHtml(tex)+'\\]</div>':'<span>\\('+escHtml(tex)+'\\)</span>';}
function inlineRender(s){if(!s)return'';s=s.replace(/\\\(([^)]+?)\\\)/g,function(_,tex){return renderMath(tex,false);});s=s.replace(/(?<!\$)\$(?!\$)([^$\n]+?)(?<!\$)\$(?!\$)/g,function(_,tex){return renderMath(tex,false);});s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');s=s.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g,'<em>$1</em>');s=s.replace(/`([^`\n]+?)`/g,'<code>$1</code>');s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');return s;}
function buildCodeBlock(lang,code){var id='cb_'+Math.random().toString(36).slice(2);var hi='';if(window.hljs){try{hi=lang?hljs.highlight(code,{language:lang,ignoreIllegals:true}).value:hljs.highlightAuto(code).value;}catch(e){hi=escHtml(code);}}else{hi=escHtml(code);}return'<div class="code-block"><div class="code-block-hd"><span class="code-lang">'+escHtml(lang||'code')+'</span><button class="code-copy-btn" onclick="copyCode(this,\''+id+'\')">Copy</button></div><pre><code id="'+id+'" class="hljs'+(lang?' language-'+escHtml(lang):'')+'">'+hi+'</code></pre></div>';}
function copyCode(btn,id){var el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.innerText).then(function(){btn.textContent='✓ Copied';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied');},2000);});}
function renderMd(raw){
  if(!raw)return'';
  var blocks=[];
  raw=raw.replace(/\$\$([\s\S]+?)\$\$/g,function(_,tex){var i=blocks.length;blocks.push(renderMath(tex.trim(),true));return'\x02B'+i+'\x03';});
  raw=raw.replace(/\\\[([\s\S]+?)\\\]/g,function(_,tex){var i=blocks.length;blocks.push(renderMath(tex.trim(),true));return'\x02B'+i+'\x03';});
  raw=raw.replace(/```([\w-]*)\n?([\s\S]*?)```/g,function(_,lang,code){var i=blocks.length;var l=(lang||'').toLowerCase();blocks.push(l==='mermaid'?'<div class="mermaid-wrap"><pre class="mermaid">'+escHtml(code.trim())+'</pre></div>':buildCodeBlock(l,code.trim()));return'\x02B'+i+'\x03';});
  function isTableDivider(line){return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line||'');}
  function parseTableRow(line){var row=(line||'').trim();if(row.startsWith('|'))row=row.slice(1);if(row.endsWith('|'))row=row.slice(0,-1);return row.split('|').map(function(c){return c.trim();});}
  var lines=raw.split('\n'),out=[],i=0;
  while(i<lines.length){
    var l=lines[i];
    var bm=l.trim().match(/^\x02B(\d+)\x03$/);if(bm){out.push(blocks[+bm[1]]);i++;continue;}
    var hm=l.match(/^(#{1,4})\s+(.+)$/);if(hm){out.push('<h'+hm[1].length+'>'+inlineRender(hm[2])+'</h'+hm[1].length+'>');i++;continue;}
    if(l.includes('|')&&i+1<lines.length&&isTableDivider(lines[i+1])){var hc=parseTableRow(l),br=[];i+=2;while(i<lines.length&&lines[i].trim()&&lines[i].includes('|')){br.push(parseTableRow(lines[i]));i++;}var cols=hc.length;out.push('<div class="table-wrap"><table><thead><tr>'+hc.map(function(c){return'<th>'+inlineRender(c)+'</th>';}).join('')+'</tr></thead><tbody>'+br.map(function(r){return'<tr>'+Array.from({length:cols},function(_,ci){return'<td>'+inlineRender(r[ci]||'')+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table></div>');continue;}
    if(/^---+$/.test(l.trim())){out.push('<hr>');i++;continue;}
    if(/^> /.test(l)){var bq=[];while(i<lines.length&&/^> ?/.test(lines[i])){bq.push(lines[i].replace(/^> ?/,''));i++;}out.push('<blockquote>'+inlineRender(bq.join(' '))+'</blockquote>');continue;}
    if(/^\d+[.)]\s/.test(l)){var ol=[];while(i<lines.length&&/^\d+[.)]\s/.test(lines[i])){ol.push('<li>'+inlineRender(lines[i].replace(/^\d+[.)]\s+/,''))+'</li>');i++;}out.push('<ol>'+ol.join('')+'</ol>');continue;}
    if(/^[-*•]\s/.test(l)||/^[❌✅⚠️💡🔥⚡►▶]\s/.test(l)){var ul=[];while(i<lines.length&&(/^[-*•]\s/.test(lines[i])||/^[❌✅⚠️💡🔥⚡►▶]\s/.test(lines[i]))){ul.push('<li>'+inlineRender(lines[i].replace(/^[-*•❌✅⚠️💡🔥⚡►▶]\s+/,''))+'</li>');i++;}out.push('<ul>'+ul.join('')+'</ul>');continue;}
    var sm=l.match(/^Step\s*(\d+)\s*[:\-—]\s*(.+)$/i);if(sm){out.push('<div class="step-item"><strong>Step '+escHtml(sm[1])+'</strong><span>'+inlineRender(sm[2])+'</span></div>');i++;continue;}
    if(!l.trim()){i++;continue;}
    var pl=[];while(i<lines.length){var ll=lines[i];if(!ll.trim())break;if(/^(#{1,4}\s|> |[-*•]\s|\d+[.)]\s|---+$|\x02B|[❌✅⚠️💡🔥⚡►▶]\s)/.test(ll))break;pl.push(inlineRender(ll));i++;}
    if(pl.length)out.push('<p>'+pl.join('<br>')+'</p>');
  }
  return out.join('\n');
}
function postRender(el){
  if(!el)return;
  var merms=el.querySelectorAll('pre.mermaid:not([data-processed])');
  if(merms.length&&window.mermaid){try{merms.forEach(function(m){m.setAttribute('data-processed','1');});mermaid.init(undefined,merms);}catch(e){}}
  el.querySelectorAll('pre code:not(.hljs)').forEach(function(b){try{hljs.highlightElement(b);}catch(e){}});
  if(window.katex&&window.renderMathInElement){try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}],throwOnError:false});}catch(e){}}
}

/* ═══════════════════════════════════
   UTILITY
═══════════════════════════════════ */
function updateDocBar(){var b=document.getElementById('docbar'),n=document.getElementById('docnm');docFile?(b.classList.add('on'),n.textContent=docFile.name):(b.classList.remove('on'),n.textContent='');}
function removeDoc(){docFile=null;updateDocBar();toast('Document removed');}
function setBusy(v){
  busy=v;stopFlag=false;
  var sb2=document.getElementById('sendbtn'),st=document.getElementById('stopbtn');
  if(v){st.classList.add('on');sb2.style.display='none';}
  else{st.classList.remove('on');sb2.style.display='';}
}
function doStop(){stopFlag=true;if(streamRdr){try{streamRdr.cancel();}catch(e){}}}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function onInput(el){
  el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px';
  var btn=document.getElementById('sendbtn');
  el.value.trim()?btn.classList.add('active'):btn.classList.remove('active');
}
function useSug(t){var i=document.getElementById('inp');i.value=t;onInput(i);i.focus();}
function copyMsg(btn){var row=btn.closest('.mr');var bubble=row.querySelector('.bubble-ai');navigator.clipboard.writeText(bubble?bubble.innerText:'').then(function(){toast('Copied');}).catch(function(){toast('Copy failed');});}
var _tt;
function toast(msg){var e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('on');},2400);}
</script>
