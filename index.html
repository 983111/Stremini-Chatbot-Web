<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreminiAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="renderer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false, theme: 'neutral' });</script>
<script src="research-renderer.js"></script>
<script src="agent-router.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════
   DESIGN TOKENS — DARK (primary)
═══════════════════════════════════════════════ */
:root, [data-theme="dark"] {
  /* Base surfaces */
  --bg-deep:     #0a0908;
  --bg-base:     #0f0d0b;
  --bg-raised:   #161310;
  --bg-float:    #1d1916;
  --bg-overlay:  #252018;

  /* Borders */
  --bdr-faint:   rgba(255,220,120,0.06);
  --bdr-soft:    rgba(255,220,120,0.10);
  --bdr:         rgba(255,220,120,0.16);
  --bdr-strong:  rgba(255,220,120,0.28);

  /* Text */
  --tx:          #f2ece0;
  --tx2:         #9a8f7c;
  --tx3:         #5a5248;
  --tx-inv:      #0f0d0b;

  /* Accent — warm gold */
  --acc:         #d4a832;
  --acc-dim:     #9a7520;
  --acc-bg:      rgba(212,168,50,0.08);
  --acc-bdr:     rgba(212,168,50,0.22);
  --acc-glow:    rgba(212,168,50,0.15);

  /* Semantic */
  --red:         #e05c5c;
  --green:       #5cc48a;
  --blue:        #5c9ce0;

  /* Typography */
  --font:        'Syne', ui-sans-serif, sans-serif;
  --serif:       'Lora', Georgia, serif;
  --mono:        'JetBrains Mono', ui-monospace, monospace;

  /* Layout */
  --sw:          270px;
  --topbar-h:    56px;
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   18px;
  --radius-xl:   24px;

  /* Shadows */
  --sh-xs:       0 1px 3px rgba(0,0,0,0.4);
  --sh-sm:       0 2px 8px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
  --sh-md:       0 4px 20px rgba(0,0,0,0.6), 0 1px 4px rgba(0,0,0,0.4);
  --sh-lg:       0 12px 48px rgba(0,0,0,0.7), 0 4px 16px rgba(0,0,0,0.5);
  --sh-acc:      0 0 24px rgba(212,168,50,0.18), 0 0 8px rgba(212,168,50,0.10);
  --sh-acc-sm:   0 0 12px rgba(212,168,50,0.14);

  /* Gradients */
  --grad-gold:   linear-gradient(135deg, #d4a832 0%, #f0c84a 45%, #b8881a 100%);
  --grad-gold-sm:linear-gradient(135deg, #c8981e 0%, #e8b830 100%);
  --grad-bg:     radial-gradient(ellipse 80% 50% at 20% 0%, rgba(212,168,50,0.04) 0%, transparent 60%),
                 radial-gradient(ellipse 60% 40% at 80% 100%, rgba(180,120,20,0.03) 0%, transparent 50%),
                 #0f0d0b;
  --grad-sb:     linear-gradient(180deg, #0c0a08 0%, #0f0d0b 100%);
  --grad-input:  linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);

  /* Sidebar */
  --sb-bg:       var(--grad-sb);
  --topbar-bg:   rgba(10,9,8,0.85);
  --load-bg:     #0a0908;
  --auth-bg:     #0a0908;
}

/* ═══════════════════════════════════════════════
   LIGHT THEME
═══════════════════════════════════════════════ */
[data-theme="light"] {
  --bg-deep:     #faf7f2;
  --bg-base:     #f5f0e8;
  --bg-raised:   #ede7da;
  --bg-float:    #e8e1d4;
  --bg-overlay:  #e2dace;

  --bdr-faint:   rgba(140,110,60,0.06);
  --bdr-soft:    rgba(140,110,60,0.10);
  --bdr:         rgba(140,110,60,0.18);
  --bdr-strong:  rgba(140,110,60,0.32);

  --tx:          #1a1610;
  --tx2:         #7a6e5c;
  --tx3:         #b0a48e;
  --tx-inv:      #f5f0e8;

  --acc:         #b8760e;
  --acc-dim:     #8a5808;
  --acc-bg:      rgba(184,118,14,0.08);
  --acc-bdr:     rgba(184,118,14,0.22);
  --acc-glow:    rgba(184,118,14,0.12);

  --sh-xs:       0 1px 3px rgba(0,0,0,0.06);
  --sh-sm:       0 2px 8px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --sh-md:       0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
  --sh-lg:       0 12px 48px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.08);
  --sh-acc:      0 0 24px rgba(184,118,14,0.14), 0 0 8px rgba(184,118,14,0.08);
  --sh-acc-sm:   0 0 12px rgba(184,118,14,0.10);

  --grad-gold:   linear-gradient(135deg, #b8760e 0%, #d4941c 45%, #9a5e08 100%);
  --grad-gold-sm:linear-gradient(135deg, #b8760e 0%, #d4941c 100%);
  --grad-bg:     radial-gradient(ellipse 80% 50% at 20% 0%, rgba(184,118,14,0.05) 0%, transparent 60%),
                 radial-gradient(ellipse 60% 40% at 80% 100%, rgba(140,90,10,0.03) 0%, transparent 50%),
                 #f5f0e8;
  --grad-sb:     linear-gradient(180deg, #ede7da 0%, #e8e1d4 100%);
  --grad-input:  linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.4) 100%);

  --sb-bg:       var(--grad-sb);
  --topbar-bg:   rgba(245,240,232,0.88);
  --load-bg:     #f5f0e8;
  --auth-bg:     #faf7f2;
}

/* ═══════════════════════════════════
   RESET
═══════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--tx);
  font-size: 14.5px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.4s, color 0.4s;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--bdr-strong); }

/* ── Noise texture overlay ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}
[data-theme="dark"] body::after { opacity: 0.04; }

/* ═══════════════════════════════════
   LOADING
═══════════════════════════════════ */
#loading {
  position: fixed;
  inset: 0;
  background: var(--load-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  flex-direction: column;
  gap: 16px;
}
.load-orb {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--grad-gold);
  box-shadow: var(--sh-acc);
  animation: orbPulse 1.8s ease-in-out infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 24px;
  color: var(--tx-inv);
}
@keyframes orbPulse {
  0%, 100% { transform: scale(1); box-shadow: var(--sh-acc); }
  50% { transform: scale(1.06); box-shadow: 0 0 40px rgba(212,168,50,0.35), 0 0 16px rgba(212,168,50,0.20); }
}
.load-txt { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--tx3); }

/* ═══════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════ */
#auth-screen {
  position: fixed;
  inset: 0;
  background: var(--auth-bg);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
/* Auth background glow */
#auth-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--grad-bg);
  pointer-events: none;
}
.auth-card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  padding: 44px 40px;
  border: 1px solid var(--bdr);
  border-radius: var(--radius-xl);
  box-shadow: var(--sh-lg);
  background: var(--bg-raised);
  animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}
.auth-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.auth-orb {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--grad-gold);
  box-shadow: var(--sh-acc-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  color: var(--tx-inv);
  flex-shrink: 0;
}
.auth-logo-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--tx); }
.auth-logo-sub { font-size: 11px; color: var(--tx3); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; margin-top: 1px; }

.auth-tabs {
  display: flex;
  background: var(--bg-float);
  border: 1px solid var(--bdr-soft);
  border-radius: var(--radius-md);
  padding: 3px;
  margin-bottom: 24px;
  gap: 2px;
}
.auth-tab {
  flex: 1;
  padding: 8px 0;
  border: none;
  background: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  color: var(--tx3);
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.auth-tab.active {
  background: var(--bg-raised);
  color: var(--tx);
  box-shadow: var(--sh-xs);
}
.auth-field { margin-bottom: 14px; }
.auth-field label {
  display: block;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--tx3);
  margin-bottom: 6px;
}
.auth-field input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--bdr);
  border-radius: var(--radius-md);
  font-family: var(--font);
  font-size: 14px;
  color: var(--tx);
  background: var(--bg-float);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.auth-field input:focus {
  border-color: var(--acc);
  box-shadow: 0 0 0 3px var(--acc-bg);
}
.auth-submit {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--grad-gold);
  color: var(--tx-inv);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: var(--sh-acc-sm);
}
.auth-submit:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: var(--sh-acc); }
.auth-submit:active { transform: scale(0.98); }
.auth-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.auth-msg { font-size: 12.5px; margin-top: 10px; text-align: center; min-height: 18px; }
.auth-msg.err { color: var(--red); } .auth-msg.ok { color: var(--green); }
.auth-divider {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--tx3);
  margin: 20px 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.auth-divider::before, .auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--bdr);
}
.auth-google {
  width: 100%;
  padding: 11px;
  border: 1.5px solid var(--bdr);
  border-radius: var(--radius-md);
  background: var(--bg-float);
  font-family: var(--font);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--tx);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s;
}
.auth-google:hover { background: var(--bg-overlay); border-color: var(--bdr-strong); }
.auth-google:disabled { opacity: 0.6; cursor: not-allowed; }

/* ═══════════════════════════════════
   APP LAYOUT
═══════════════════════════════════ */
#app {
  display: none;
  height: 100vh;
  overflow: hidden;
  flex-direction: row;
  position: relative;
  z-index: 1;
  background: var(--grad-bg);
  transition: background 0.4s;
}

/* ═══════════════════════════════════
   SIDEBAR
═══════════════════════════════════ */
#sb {
  width: var(--sw);
  background: var(--sb-bg);
  border-right: 1px solid var(--bdr-soft);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 20;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), background 0.4s;
  position: relative;
}
#sb.collapsed { transform: translateX(calc(-1 * var(--sw))); position: absolute; height: 100%; }

/* Sidebar accent line */
[data-theme="dark"] #sb::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, transparent 0%, rgba(212,168,50,0.2) 20%, rgba(212,168,50,0.12) 80%, transparent 100%);
  pointer-events: none;
}

.sb-top {
  display: flex;
  align-items: center;
  padding: 16px 12px 14px;
  gap: 4px;
  border-bottom: 1px solid var(--bdr-faint);
}
.brand { display: flex; align-items: center; gap: 10px; flex: 1; }
.b-orb {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--grad-gold);
  box-shadow: var(--sh-acc-sm);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-style: italic; font-size: 15px;
  color: var(--tx-inv); flex-shrink: 0;
  transition: box-shadow 0.3s, transform 0.3s;
}
.b-orb:hover { transform: scale(1.05); box-shadow: var(--sh-acc); }
.bname {
  font-size: 13.5px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--tx);
}

.ib {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--tx3);
  padding: 7px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.ib:hover { background: rgba(255,255,255,0.06); color: var(--tx); }
[data-theme="light"] .ib:hover { background: rgba(0,0,0,0.06); }

/* New chat button — gold accent */
.ib-new {
  background: var(--acc-bg);
  border: 1px solid var(--acc-bdr);
  color: var(--acc);
}
.ib-new:hover { background: rgba(212,168,50,0.14) !important; color: var(--acc) !important; }

.clist { flex: 1; overflow-y: auto; padding: 8px 8px; }
.clabel {
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--tx3);
  padding: 12px 8px 5px;
}
.ci {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  font-size: 13px;
  font-weight: 500;
  color: var(--tx2);
  margin-bottom: 2px;
  border: 1px solid transparent;
  gap: 8px;
}
.ci:hover { background: rgba(255,255,255,0.05); color: var(--tx); }
[data-theme="light"] .ci:hover { background: rgba(0,0,0,0.04); }
.ci.active {
  background: var(--acc-bg);
  border-color: var(--acc-bdr);
  color: var(--tx);
}
.ci-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--tx3);
  flex-shrink: 0;
  transition: background 0.15s;
}
.ci.active .ci-dot { background: var(--acc); }
.ci-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ci-del {
  opacity: 0;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--tx3);
  padding: 2px 5px;
  border-radius: 5px;
  font-size: 11px;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.ci:hover .ci-del { opacity: 1; }
.ci-del:hover { color: var(--red); background: rgba(224,92,92,0.12); }

.sb-foot {
  padding: 8px 10px 14px;
  border-top: 1px solid var(--bdr-faint);
}
.ctx-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-md);
  border: none;
  background: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--tx3);
  transition: background 0.15s, color 0.15s;
  margin-bottom: 4px;
  letter-spacing: 0.01em;
}
.ctx-btn:hover { background: rgba(255,255,255,0.05); color: var(--tx); }
[data-theme="light"] .ctx-btn:hover { background: rgba(0,0,0,0.04); }
#ctx-panel { display: none; padding: 8px 4px 4px; }
#ctx-panel.open { display: block; }
#ctx-panel textarea {
  width: 100%;
  border: 1.5px solid var(--bdr);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  font-family: var(--font);
  font-size: 12.5px;
  color: var(--tx);
  resize: none;
  outline: none;
  line-height: 1.5;
  height: 90px;
  background: var(--bg-float);
  transition: border-color 0.2s;
}
#ctx-panel textarea:focus { border-color: var(--acc); }
.ctx-save {
  margin-top: 6px;
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--grad-gold-sm);
  color: var(--tx-inv);
  font-family: var(--font);
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
  letter-spacing: 0.02em;
}
.ctx-save:hover { opacity: 0.85; }

.urow {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-md);
  cursor: default;
  transition: background 0.15s;
}
.urow:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .urow:hover { background: rgba(0,0,0,0.03); }
.uav {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--tx-inv); flex-shrink: 0;
  background: var(--grad-gold-sm);
  box-shadow: var(--sh-acc-sm);
  position: relative;
}
.uinfo { flex: 1; min-width: 0; }
.ulabel { font-size: 12.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--tx); }
.uemail { font-size: 10.5px; color: var(--tx3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.signout-btn {
  background: none; border: none; cursor: pointer; color: var(--tx3); padding: 6px;
  border-radius: 6px; display: flex; align-items: center;
  transition: color 0.15s, background 0.15s;
}
.signout-btn:hover { color: var(--red); background: rgba(224,92,92,0.10); }

/* ═══════════════════════════════════
   MAIN PANEL
═══════════════════════════════════ */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

#topbar {
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: var(--topbar-h);
  border-bottom: 1px solid var(--bdr-soft);
  background: var(--topbar-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  flex-shrink: 0;
  gap: 10px;
  position: relative;
  z-index: 5;
  transition: background 0.4s, border-color 0.4s;
}

/* Model pill */
.mpill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 14px 5px 10px;
  border-radius: 99px;
  border: 1px solid var(--bdr);
  background: var(--bg-float);
  font-size: 12.5px;
  font-weight: 700;
  color: var(--tx);
  letter-spacing: -0.01em;
  box-shadow: var(--sh-xs);
  transition: all 0.3s;
}
.mdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--acc);
  flex-shrink: 0;
  box-shadow: 0 0 0 2px var(--acc-bg);
  animation: dotPulse 3s ease infinite;
}
@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 0 2px var(--acc-bg); }
  50% { box-shadow: 0 0 0 4px rgba(212,168,50,0.08), 0 0 8px rgba(212,168,50,0.12); }
}

/* Domain pill */
#domain-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 99px;
  transition: all 0.3s;
  animation: dpIn .3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes dpIn { from { opacity:0; transform:scale(.8) translateX(-6px) } to { opacity:1; transform:none } }

/* Theme toggle */
#theme-toggle {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--bdr);
  background: var(--bg-float);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--tx2); flex-shrink: 0;
  transition: all 0.2s;
  position: relative;
}
#theme-toggle:hover { background: var(--bg-overlay); border-color: var(--bdr-strong); color: var(--tx); }
#theme-toggle .i-sun, #theme-toggle .i-moon { position: absolute; transition: opacity 0.2s, transform 0.25s; }
[data-theme="light"] .i-sun  { opacity: 1; transform: rotate(0deg) scale(1); }
[data-theme="light"] .i-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }
[data-theme="dark"]  .i-sun  { opacity: 0; transform: rotate(-90deg) scale(0.5); }
[data-theme="dark"]  .i-moon { opacity: 1; transform: rotate(0deg) scale(1); }

/* ═══════════════════════════════════
   CHAT AREA
═══════════════════════════════════ */
#chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; scroll-behavior: smooth; }

/* ── WELCOME ── */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px 24px;
  gap: 24px;
  animation: wIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
  text-align: center;
}
@keyframes wIn { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }

.w-orb-wrap {
  position: relative;
  width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center;
}
.w-orb-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid var(--acc-bdr);
  opacity: 0.5;
  animation: ringPulse 4s ease infinite;
}
.w-orb-ring2 {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  border: 1px solid var(--acc-bdr);
  opacity: 0.2;
  animation: ringPulse 4s ease infinite 0.8s;
}
@keyframes ringPulse { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:0.2;transform:scale(1.04)} }
.w-orb {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--grad-gold);
  box-shadow: var(--sh-acc), var(--sh-md);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-style: italic; font-size: 38px;
  color: var(--tx-inv);
  position: relative; z-index: 1;
}

.whead { display: flex; flex-direction: column; align-items: center; gap: 8px; max-width: 680px; width: 100%; }
.wtitle {
  font-family: var(--serif);
  font-size: 34px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--tx);
}
.wsub {
  font-size: 13px;
  font-weight: 500;
  color: var(--tx3);
  letter-spacing: 0.02em;
}

/* ── SUGGESTION CARDS ── */
.sugs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 820px;
  width: 100%;
  margin-top: 4px;
}
.sc {
  background: var(--bg-raised);
  border: 1px solid var(--bdr-soft);
  border-radius: var(--radius-lg);
  padding: 0;
  cursor: pointer;
  text-align: left;
  font-family: var(--font);
  transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s, background 0.2s, border-color 0.2s;
  box-shadow: var(--sh-sm);
  position: relative;
  overflow: hidden;
  min-height: 88px;
}
.sc::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
.sc:hover {
  transform: translateY(-3px);
  border-color: var(--acc-bdr);
  box-shadow: var(--sh-md), var(--sh-acc-sm);
  background: var(--bg-float);
}
.sc:active { transform: translateY(-1px); }
.sc-inner {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 16px 16px 14px;
  height: 100%;
  position: relative; z-index: 1;
}
.sc-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.sc strong {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--tx);
  letter-spacing: -0.01em;
}
.sc span {
  font-size: 11.5px;
  color: var(--tx3);
  line-height: 1.4;
  display: block;
  font-weight: 500;
}

/* ═══════════════════════════════════
   MESSAGES
═══════════════════════════════════ */
#msgs-wrap {
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  padding: 24px 32px 0;
  display: none;
  flex-direction: column;
}
.mr {
  padding: 22px 0;
  display: flex;
  gap: 16px;
  border-bottom: 1px solid var(--bdr-faint);
  animation: msgIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
}
.mr:last-child { border-bottom: none; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }

.mav {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.mav.ai {
  background: var(--grad-gold);
  color: var(--tx-inv);
  font-family: var(--serif); font-style: italic; font-size: 15px;
  box-shadow: var(--sh-acc-sm);
}
.mav.usr {
  background: var(--bg-float);
  color: var(--tx2);
  border: 1px solid var(--bdr);
}

.mbody { flex: 1; min-width: 0; }
.mname {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--tx3);
  margin-bottom: 8px;
}
.mc { color: var(--tx); font-size: 14.5px; line-height: 1.78; }
.mc > * + * { margin-top: 10px; }
.mc p { margin: 0; } .mc p+p { margin-top: 10px; }
.mc ul { padding-left: 22px; list-style: disc; } .mc ol { padding-left: 22px; list-style: decimal; }
.mc li { margin-bottom: 5px; line-height: 1.7; }
.mc h1 { font-family: var(--serif); font-size: 22px; font-weight: 400; font-style: italic; margin: 20px 0 6px; letter-spacing: -0.02em; line-height: 1.3; }
.mc h2 { font-size: 15px; font-weight: 700; margin: 18px 0 5px; letter-spacing: -0.01em; border-bottom: 1px solid var(--bdr-faint); padding-bottom: 6px; }
.mc h3 { font-size: 13.5px; font-weight: 700; margin: 14px 0 4px; color: var(--tx2); text-transform: uppercase; letter-spacing: 0.05em; }
.mc h1:first-child, .mc h2:first-child, .mc h3:first-child { margin-top: 0; }
.mc strong { font-weight: 700; } .mc em { font-style: italic; color: var(--tx2); }
.mc a { color: var(--acc); text-decoration: underline; text-underline-offset: 3px; }
.mc code {
  font-family: var(--mono);
  background: var(--bg-float);
  border: 1px solid var(--bdr);
  border-radius: 5px;
  padding: 2px 6px;
  font-size: 12.5px;
  color: var(--acc);
}
.mc pre {
  background: var(--bg-deep);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  overflow-x: auto;
  font-size: 12.5px;
  line-height: 1.7;
}
.mc pre code { background: none; border: none; padding: 0; color: var(--tx); }
.mc blockquote {
  border-left: 2px solid var(--acc);
  padding: 10px 0 10px 18px;
  color: var(--tx2);
  font-style: italic;
  background: var(--acc-bg);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.mc hr { border: none; border-top: 1px solid var(--bdr-soft); }
.mc table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.mc th {
  background: var(--bg-float);
  font-weight: 700;
  text-align: left;
  padding: 8px 12px;
  border: 1px solid var(--bdr);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--tx2);
}
.mc td { padding: 7px 12px; border: 1px solid var(--bdr); vertical-align: top; color: var(--tx); }
.mc tr:nth-child(even) td { background: var(--bg-raised); }

/* Message actions */
.macts { display: flex; gap: 4px; margin-top: 12px; opacity: 0; transition: opacity 0.15s; }
.mr:hover .macts { opacity: 1; }
.abt {
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  color: var(--tx3);
  padding: 4px 9px;
  border-radius: 6px;
  font-size: 11.5px;
  font-family: var(--font);
  font-weight: 600;
  display: flex; align-items: center; gap: 4px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  letter-spacing: 0.01em;
}
.abt:hover { background: var(--bg-float); border-color: var(--bdr); color: var(--tx); }

/* Typing indicator */
.typing { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
.td {
  width: 5px; height: 5px;
  background: var(--tx3);
  border-radius: 50%;
  animation: tdBounce 1.2s ease infinite;
}
.td:nth-child(2) { animation-delay: .14s; } .td:nth-child(3) { animation-delay: .28s; }
@keyframes tdBounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }
.pad { height: 32px; flex-shrink: 0; }

/* ═══════════════════════════════════
   INPUT SHELL
═══════════════════════════════════ */
#bottom {
  flex-shrink: 0;
  padding: 8px 32px 20px;
  position: relative; z-index: 5;
}
/* Fade fade from content to input */
#bottom::before {
  content: '';
  position: absolute;
  top: -28px; left: 0; right: 0; height: 28px;
  background: linear-gradient(transparent, var(--bg-base));
  pointer-events: none;
}
#inner { max-width: 780px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 6px; }

/* Doc bar */
#docbar {
  display: none;
  background: var(--acc-bg);
  border: 1px solid var(--acc-bdr);
  border-radius: var(--radius-md);
  padding: 8px 14px;
  font-size: 12.5px;
  color: var(--tx2);
  align-items: center;
  gap: 8px;
}
#docbar.on { display: flex; }
.dic { color: var(--acc); flex-shrink: 0; }
.dnm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; color: var(--tx); }
.drm {
  background: none; border: none; cursor: pointer;
  color: var(--tx3); padding: 2px 7px; border-radius: 5px;
  font-size: 11.5px; font-family: var(--font); font-weight: 600;
  transition: color 0.15s, background 0.15s;
}
.drm:hover { color: var(--red); background: rgba(224,92,92,0.1); }

/* Input shell */
.shell {
  background: var(--bg-raised);
  border: 1.5px solid var(--bdr);
  border-radius: var(--radius-xl);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  box-shadow: var(--sh-sm);
  position: relative;
}
.shell::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 50%;
  background: var(--grad-input);
  pointer-events: none; z-index: 0;
}
.shell:focus-within {
  border-color: var(--acc-bdr);
  box-shadow: var(--sh-md), 0 0 0 3px var(--acc-bg);
}

#inp {
  display: block; width: 100%;
  background: none; border: none; outline: none; resize: none;
  font-family: var(--font); font-size: 14.5px; color: var(--tx);
  line-height: 1.65; padding: 15px 18px 7px;
  max-height: 200px; overflow-y: auto; min-height: 54px;
  position: relative; z-index: 1;
}
#inp::placeholder { color: var(--tx3); }

.ibar {
  display: flex; align-items: center;
  padding: 7px 10px 11px; gap: 4px;
  position: relative; z-index: 1;
}
.ibar-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }

.bb {
  background: none; border: none; cursor: pointer;
  color: var(--tx3); padding: 6px 10px; border-radius: var(--radius-sm);
  font-size: 12.5px; font-family: var(--font); font-weight: 600;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.15s, color 0.15s;
  letter-spacing: 0.01em;
}
.bb:hover { background: rgba(255,255,255,0.06); color: var(--tx); }
[data-theme="light"] .bb:hover { background: rgba(0,0,0,0.05); }

#sendbtn {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--tx-inv); flex-shrink: 0;
  position: relative; overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  background: var(--grad-gold);
  box-shadow: var(--sh-acc-sm);
}
#sendbtn::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 100%);
  border-radius: var(--radius-md) var(--radius-md) 0 0;
}
#sendbtn:hover { transform: translateY(-1px); box-shadow: var(--sh-acc); }
#sendbtn:active { transform: scale(0.94); }
#sendbtn:disabled { background: var(--bg-overlay); box-shadow: none; cursor: not-allowed; color: var(--tx3); }
#sendbtn svg { position: relative; z-index: 1; }

#stopbtn {
  background: none;
  border: 1.5px solid var(--bdr);
  border-radius: var(--radius-sm);
  color: var(--tx2);
  font-family: var(--font);
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  padding: 5px 13px;
  display: none;
  align-items: center; gap: 5px;
  transition: background 0.15s, border-color 0.15s;
  letter-spacing: 0.01em;
}
#stopbtn.on { display: flex; }
#stopbtn:hover { background: var(--bg-float); border-color: var(--bdr-strong); }

.disc {
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--tx3);
  padding-top: 8px;
}

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--tx); color: var(--bg-base);
  border-radius: var(--radius-md);
  padding: 9px 18px;
  font-size: 12.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
  opacity: 0; pointer-events: none; z-index: 999;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  box-shadow: var(--sh-md);
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════
   CODE AGENT RENDERER
═══════════════════════════════════ */
.ca-prose { font-family: var(--font); font-size: 14px; line-height: 1.78; color: var(--tx); }
.ca-prose p { margin: 0 0 .7em } .ca-prose p:last-child { margin-bottom: 0 }
.ca-prose h2, .ca-prose h3 { font-size: 14.5px; font-weight: 700; margin: .9em 0 .3em; letter-spacing: -.01em; }
.ca-prose h4 { font-size: 13px; font-weight: 700; margin: .8em 0 .25em; color: var(--tx2); text-transform: uppercase; letter-spacing: .05em; }
.ca-prose hr { border: none; border-top: 1px solid var(--bdr-faint); margin: .9em 0 }
.ca-prose ul, .ca-prose ol { padding-left: 1.4em; margin: .3em 0 .7em }
.ca-prose li { margin: .2em 0; line-height: 1.7 }
.ca-prose code { font-family: var(--mono); font-size: 12px; background: var(--bg-float); border: 1px solid var(--bdr); padding: 1px 5px; border-radius: 4px; color: var(--acc); }
.ca-prose blockquote { border-left: 2px solid var(--acc); margin: .5em 0; padding: .3em .8em; color: var(--tx2); font-style: italic; }
.ca-prose strong { font-weight: 700 } .ca-prose em { font-style: italic; color: var(--tx2); }
.ca-prose .sh { font-size: 10px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .08em; margin: 1.3em 0 .4em; display: block }
.ca-prose .sh:first-child { margin-top: 0 }
.ca-prose .arrow-item { display: flex; gap: 7px; margin: .25em 0; align-items: flex-start }
.ca-prose .arrow-icon { color: var(--acc); font-size: 10px; flex-shrink: 0; margin-top: .3em; font-weight: 700 }
.ca-prose .arrow-body { flex: 1 }
.ca-prose .step-wrap { margin: .4em 0; padding: 10px 13px; border: 1px solid var(--bdr); border-radius: var(--radius-md); background: var(--bg-raised); }
.ca-prose .step-lbl { font-size: 9.5px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px }
.ca-code-block { background: var(--bg-deep); border: 1px solid var(--bdr); border-radius: var(--radius-md); overflow: hidden; margin: .6em 0; box-shadow: var(--sh-sm); }
.ca-code-block-hd { display: flex; align-items: center; justify-content: space-between; padding: 8px 13px; background: var(--bg-raised); border-bottom: 1px solid var(--bdr-faint); }
.ca-code-lang { font-family: var(--mono); font-size: 10.5px; font-weight: 500; color: var(--tx3); text-transform: lowercase; }
.ca-copy-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--bdr); cursor: pointer; font-size: 10.5px; color: var(--tx3); font-family: var(--font); font-weight: 600; padding: 3px 8px; border-radius: 4px; transition: all .15s; }
.ca-copy-btn:hover { background: var(--bg-float); color: var(--tx) }
.ca-copy-btn.copied { background: rgba(92,196,138,0.1); color: var(--green); border-color: rgba(92,196,138,0.3) }
.ca-code-block pre { margin: 0; border-radius: 0; border: none; background: var(--bg-deep) }
.ca-code-block pre code.hljs { font-family: var(--mono); font-size: 12.5px; line-height: 1.7; padding: 16px 18px; background: var(--bg-deep); display: block; border-radius: 0; }
.ca-files-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--acc-bg); border: 1px solid var(--acc-bdr); border-radius: var(--radius-md); font-size: 12.5px; color: var(--tx2); margin-bottom: 8px; }
.ca-files-bar-count { font-weight: 700; color: var(--acc); }
.ca-files-actions { display: flex; gap: 5px; margin-left: auto }
.ca-files-btn { background: none; border: 1px solid var(--bdr); cursor: pointer; font-size: 11px; font-weight: 600; color: var(--tx2); font-family: var(--font); padding: 3px 9px; border-radius: 4px; transition: all .15s; }
.ca-files-btn:hover { background: var(--bg-float) }
.ca-file-widgets { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px }
.ca-fw { background: var(--bg-raised); border: 1px solid var(--bdr); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--sh-xs); transition: border-color .15s; }
.ca-fw:hover { border-color: var(--acc-bdr) }
.ca-fw-hd { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; background: var(--bg-float); cursor: pointer; user-select: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
.ca-fw.open .ca-fw-hd { border-bottom-color: var(--bdr-faint) }
.ca-fw-hd:hover { background: var(--bg-overlay) }
.ca-fw-left { display: flex; align-items: center; gap: 9px }
.ca-fw-icon { width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 8px; font-weight: 700; letter-spacing: -.2px; }

function hideLoading() { document.getElementById('loading').style.display = 'none'; }

  _activeTab = btn.dataset.tab;
  document.querySelectorAll('.auth-tab').forEach(function (t) { t.classList.toggle('active', t.dataset.tab === _activeTab); });
  document.getElementById('auth-btn').textContent = _activeTab === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('auth-name-field').style.display = _activeTab === 'signup' ? 'block' : 'none';
  setMsg('', false);
}

async function doAuth() {
  var email = document.getElementById('auth-email').value.trim();
  var pass  = document.getElementById('auth-password').value;
  var btn   = document.getElementById('auth-btn');
  setMsg('', false);
  if (!email) { setMsg('Email is required.', false); return; }
  if (!pass || pass.length < 6) { setMsg('Password must be at least 6 characters.', false); return; }
  btn.disabled = true;
  btn.textContent = _activeTab === 'signin' ? 'Signing in…' : 'Creating account…';
  try {
    var res;
    if (_activeTab === 'signin') { res = await sb.auth.signInWithPassword({ email: email, password: pass }); if (res.error) throw res.error; }
    else {
      var name = document.getElementById('auth-name').value.trim() || email.split('@')[0];
      res = await sb.auth.signUp({ email: email, password: pass, options: { data: { display_name: name } } });
      if (res.error) throw res.error;
      if (res.data.user && !res.data.session) {
        setMsg('Check your email to confirm, then sign in.', true);
        document.querySelectorAll('.auth-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab==='signin');});
        _activeTab='signin'; document.getElementById('auth-btn').textContent='Sign in'; document.getElementById('auth-name-field').style.display='none';
        return;
      }
    }
  } catch (e) { setMsg(e.message || 'Authentication failed.', false); }
  finally { btn.disabled = false; btn.textContent = _activeTab === 'signin' ? 'Sign in' : 'Create account'; }
}

  var btn = document.getElementById('google-btn');

  try {
    var redirectTo = window.location.origin + window.location.pathname;
    var res = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: redirectTo, queryParams: { access_type: 'offline', prompt: 'consent' } } });
    if (res.error) throw res.error;
  } catch (e) { setMsg(e.message || 'Google sign-in failed.', false); btn.disabled = false; }
}

  var name = m.display_name || m.full_name || m.name || currentUser.email.split('@')[0];
  await sb.from('users').upsert({ id: currentUser.id, display_name: name, email: currentUser.email, updated_at: new Date().toISOString() }, { onConflict: 'id' });
}

function ctxKey() { return 'sai_ctx_' + currentUser.id; }
async function loadContext() {
  try { var l = localStorage.getItem(ctxKey()); if (l) { userContext = l; document.getElementById('ctx-text').value = l; } } catch(e){}
  var res = await sb.from('users').select('context').eq('id', currentUser.id).single();
  if (!res.error && res.data && res.data.context) { userContext = res.data.context; document.getElementById('ctx-text').value = userContext; try { localStorage.setItem(ctxKey(), userContext); } catch(e){} }
}
async function saveContext() {
  userContext = document.getElementById('ctx-text').value.trim();
  try { localStorage.setItem(ctxKey(), userContext); } catch(e){}
  var res = await sb.from('users').update({ context: userContext, updated_at: new Date().toISOString() }).eq('id', currentUser.id);
  if (res.error) { toast('Context saved locally. Cloud sync failed.'); return; }
  toast('Context saved'); toggleCtx();
}
function toggleCtx() { document.getElementById('ctx-panel').classList.toggle('open'); }

async function loadChats() {
  var res = await sb.from('chats').select('id,title,updated_at').eq('user_id', currentUser.id).order('updated_at', { ascending: false });
  if (res.error) { console.error(res.error.message); return; }
  chats = {};
  (res.data || []).forEach(function(c){ chats[c.id] = { id: c.id, title: c.title, ts: new Date(c.updated_at).getTime() }; });
  renderSidebar();
}
async function createChat(title) {
  var res = await sb.from('chats').insert({ user_id: currentUser.id, title: title || 'New Chat' }).select().single();
  if (res.error) throw new Error(res.error.message);
  var c = res.data;
  chats[c.id] = { id: c.id, title: c.title, ts: new Date(c.updated_at).getTime() };
  renderSidebar(); return c.id;
}
async function updateChatTitle(chatId, title) { if (!chats[chatId]) return; chats[chatId].title = title; chats[chatId].ts = Date.now(); renderSidebar(); await sb.from('chats').update({ title: title }).eq('id', chatId); }
async function deleteChat(chatId) { delete chats[chatId]; if (activeId === chatId) { activeId = null; messages = []; showWelcome(); } renderSidebar(); await sb.from('messages').delete().eq('chat_id', chatId); await sb.from('chats').delete().eq('id', chatId); }
async function loadMessages(chatId) { var res = await sb.from('messages').select('role,content,created_at').eq('chat_id', chatId).order('created_at', { ascending: true }); if (res.error) throw new Error(res.error.message); messages = (res.data || []).map(function(m){ return { role: m.role, content: m.content }; }); return res.data || []; }
async function saveMessage(chatId, role, content) { var res = await sb.from('messages').insert({ chat_id: chatId, user_id: currentUser.id, role: role, content: content }); if (res.error) { console.error('saveMessage:', res.error.message); return; } messages.push({ role: role, content: content }); await sb.from('chats').update({ updated_at: new Date().toISOString() }).eq('id', chatId); if (chats[chatId]) chats[chatId].ts = Date.now(); }

function toggleSb() {
  var s = document.getElementById('sb');
  if (window.innerWidth <= 768) s.classList.toggle('open');
  else { sbOpen = !sbOpen; sbOpen ? s.classList.remove('collapsed') : s.classList.add('collapsed'); }
}
function renderSidebar() {
  var el = document.getElementById('clist');
  var list = Object.values(chats).sort(function(a,b){ return b.ts-a.ts; });
  if (!list.length) { el.innerHTML = '<div style="padding:10px 8px;font-size:12.5px;color:var(--tx3);font-weight:500;">No chats yet</div>'; return; }
  var now = Date.now(), day = 86400000, g = { Today:[], Yesterday:[], Older:[] };
  list.forEach(function(c){ var age=now-c.ts; if(age<day)g.Today.push(c); else if(age<2*day)g.Yesterday.push(c); else g.Older.push(c); });
  var html = '';
  ['Today','Yesterday','Older'].forEach(function(lbl){
    if(!g[lbl].length) return;
    html += '<div class="clabel">'+lbl+'</div>';
    g[lbl].forEach(function(c){
      var act = c.id===activeId?' active':'';
      var sid = c.id.replace(/['"]/g,'');
      html += '<div class="ci'+act+'" onclick="openChat(\''+sid+'\')"><span class="ci-dot"></span><span class="ci-title">'+escHtml(c.title)+'</span><button class="ci-del" onclick="event.stopPropagation();deleteChat(\''+sid+'\')">✕</button></div>';
    });
  });
  el.innerHTML = html;
}

/* ═══════════════════════════════════
   MARKDOWN RENDERER
═══════════════════════════════════ */
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function inlineRender(s){
  if(!s)return '';
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[\s(])\*([^*\n]+?)\*(?=[\s).,!?]|$)/g,'$1<em>$2</em>');
  s=s.replace(/`([^`\n]+?)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function renderMd(raw){
  if(!raw)return '';
  function isTableDivider(line){return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line||'');}
  function parseTableRow(line){var row=(line||'').trim();if(row.startsWith('|'))row=row.slice(1);if(row.endsWith('|'))row=row.slice(0,-1);return row.split('|').map(function(cell){return cell.trim();});}
  var blocks=[];
  var t=raw.replace(/\$\$([\s\S]+?)\$\$/g,function(_,expr){var i=blocks.length;blocks.push('<div class="math-block">'+escHtml(expr.trim())+'</div>');return '\x02B'+i+'\x03';});
  t=t.replace(/```([\w-]*)\n?([\s\S]*?)```/g,function(_,lang,code){var i=blocks.length;var l=(lang||'').toLowerCase();if(l==='mermaid')blocks.push('<pre class="mermaid">'+escHtml(code.trim())+'</pre>');else blocks.push('<pre><code'+(lang?' class="lang-'+escHtml(lang)+'"':'')+'>'+escHtml(code.trim())+'</code></pre>');return '\x02B'+i+'\x03';});
  var lines=t.split('\n'),out=[],i=0;
  while(i<lines.length){
    var l=lines[i];
    var bm=l.trim().match(/^\x02B(\d+)\x03$/);if(bm){out.push(blocks[+bm[1]]);i++;continue;}
    var hm=l.match(/^(#{1,3})\s+(.+)$/);if(hm){out.push('<h'+hm[1].length+'>'+inlineRender(escHtml(hm[2]))+'</h'+hm[1].length+'>');i++;continue;}
    if(l.includes('|')&&i+1<lines.length&&isTableDivider(lines[i+1])){var headerCells=parseTableRow(l),bodyRows=[];i+=2;while(i<lines.length&&lines[i].trim()&&lines[i].includes('|')){bodyRows.push(parseTableRow(lines[i]));i++;}var cols=headerCells.length;var thead='<thead><tr>'+headerCells.map(function(c){return '<th>'+inlineRender(escHtml(c))+'</th>';}).join('')+'</tr></thead>';var tbody='<tbody>'+bodyRows.map(function(r){var cells=[];for(var ci=0;ci<cols;ci++)cells.push('<td>'+inlineRender(escHtml(r[ci]||''))+'</td>');return '<tr>'+cells.join('')+'</tr>';}).join('')+'</tbody>';out.push('<div style="overflow-x:auto"><table>'+thead+tbody+'</table></div>');continue;}
    if(/^---+$/.test(l.trim())){out.push('<hr>');i++;continue;}
    if(/^> /.test(l)){var bq=[];while(i<lines.length&&/^> ?/.test(lines[i])){bq.push(lines[i].replace(/^> ?/,''));i++;}out.push('<blockquote>'+inlineRender(escHtml(bq.join(' ')))+'</blockquote>');continue;}
    if(/^\d+\.\s/.test(l)){var ol=[];while(i<lines.length&&/^\d+\.\s/.test(lines[i])){ol.push('<li>'+inlineRender(escHtml(lines[i].replace(/^\d+\.\s+/,'')))+'</li>');i++;}out.push('<ol>'+ol.join('')+'</ol>');continue;}
    if(/^[-*]\s/.test(l)){var kv=[],ul=[];while(i<lines.length&&/^[-*]\s/.test(lines[i])){var item=lines[i].replace(/^[-*]\s+/,'');var kvm=item.match(/^([^:]{1,60}):\s+(.+)$/);if(kvm)kv.push('<div class="kv-item"><strong>'+inlineRender(escHtml(kvm[1]))+'</strong><span>'+inlineRender(escHtml(kvm[2]))+'</span></div>');else ul.push('<li>'+inlineRender(escHtml(item))+'</li>');i++;}if(kv.length)out.push('<div class="rs-kv-grid">'+kv.join('')+'</div>');if(ul.length)out.push('<ul>'+ul.join('')+'</ul>');continue;}
    var sm=l.match(/^Step\s*(\d+)\s*[—-]\s*(.+)$/i);if(sm){out.push('<div class="step-item"><strong>Step '+escHtml(sm[1])+'</strong><span>'+inlineRender(escHtml(sm[2]))+'</span></div>');i++;continue;}
    if(!l.trim()){i++;continue;}
    var pl=[];
    while(i<lines.length){var ll=lines[i];if(!ll.trim()||/^(#{1,3}\s|> |[-*]\s|\d+\.\s|---+$|\x02B)/.test(ll))break;pl.push(inlineRender(escHtml(ll)));i++;}
    if(pl.length)out.push('<p>'+pl.join('<br>')+'</p>');
  }
  return out.join('\n');
}

/* ═══════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════ */
async function sendMsg() {
  if (busy || !currentUser) return;
  var inp = document.getElementById('inp'), text = inp.value.trim();
  _lastUserQuery = text;
  if (!text) return;
  if (!activeId) {
    try { activeId = await createChat(text.slice(0, 52) + (text.length > 52 ? '…' : '')); }
    catch (e) { toast('Error creating chat: ' + e.message); return; }
  }
  inp.value = ''; resize(inp);
  var hist = messages.slice(-20).map(function(m) { return { role: m.role, content: m.content }; });
  await saveMessage(activeId, 'user', text);
  if (messages.filter(function(m) { return m.role === 'user'; }).length === 1) { updateChatTitle(activeId, text.slice(0, 52) + (text.length > 52 ? '…' : '')); }
  addMsgRow('user', text);
  setBusy(true);
  var answer = '', detectedDomain = 'general';
  addStreamRow();
  try {
    if (docFile) {
      var docAnswer = await callDoc(text, docFile.text);
      answer = docAnswer || 'No response.';
      finalizeStream(answer, detectedDomain);
      await saveMessage(activeId, 'assistant', answer);
      setBusy(false);
      return;
    }
    answer = await callStream(text, hist, function(domain) {
      detectedDomain = domain || 'general';
      showDomainPill(detectedDomain);
    });
    if (!answer || !answer.trim()) answer = 'No response from model. Please try again.';
    finalizeStream(answer, detectedDomain);
    await saveMessage(activeId, 'assistant', answer);
  } catch (err) {
    var em = err.message === 'stopped' ? '*(Generation stopped)*' : 'Error: ' + escHtml(err.message);
    finalizeStream(em, detectedDomain);
    if (err.message !== 'stopped') await saveMessage(activeId, 'assistant', em);
  } finally { setBusy(false); }
}

/* ═══════════════════════════════════
   API CALLERS
═══════════════════════════════════ */
async function callStream(message, history, onDomain) {
  var res;
  try { res = await fetch(API + '/chat/stream', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message, history: history, userContext: userContext || '' }) }); }
  catch (e) { throw new Error('Network error: ' + e.message); }
  if (!res.ok) { console.warn('Stream failed ' + res.status + ', fallback'); return await callMessage(message, history); }
  var reader = res.body.getReader(); streamRdr = reader;
  var dec = new TextDecoder(), buf = '', full = '';
  try {
    while (true) {
      if (stopFlag) { reader.cancel(); throw new Error('stopped'); }
      var r = await reader.read(); if (r.done) break;
      buf += dec.decode(r.value, { stream: true });
      var lines = buf.split('\n'); buf = lines.pop();
      for (var j = 0; j < lines.length; j++) {
        var line = lines[j].trim();
        if (!line.startsWith('data:')) continue;
        var data = line.slice(5).trim();
        if (data === '[DONE]') return full;
        try { var p = JSON.parse(data); if (p.domain && onDomain) onDomain(p.domain); if (p.token) { full += p.token; updateStream(full); } if (p.error) throw new Error(p.error); } catch (pe) {}
      }
    }
  } finally { streamRdr = null; }
  if (!full.trim()) return await callMessage(message, history);
  return full;
}
async function callMessage(message,history){updateStream('Thinking…');var res;try{res=await fetch(API+'/chat/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,history:history})});}catch(e){throw new Error('Network error: '+e.message);}if(!res.ok){var t=await res.text().catch(function(){return '';});throw new Error('API '+res.status+(t?': '+t:''));}var d=await res.json();if(d.error)throw new Error(d.error);return d.response||'';}
async function callDoc(question,documentText){updateStream('Analyzing document…');var res;try{res=await fetch(API+'/chat/document',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:question,documentText:documentText})});}catch(e){throw new Error('Network error: '+e.message);}if(!res.ok){var t=await res.text().catch(function(){return '';});throw new Error('API '+res.status+(t?': '+t:''));}var d=await res.json();if(d.error)throw new Error(d.error);return d.response||'No response.';}

═══════════════════════════════════ */
async function onFile(e){var file=e.target.files[0];if(!file)return;e.target.value='';var ext=file.name.split('.').pop().toLowerCase();if(ext==='pdf'){toast('Extracting PDF…');try{var t=await extractPDF(file);docFile={name:file.name,text:t};updateDocBar();toast('PDF ready — '+Math.round(t.length/1000)+'k chars');}catch(e){toast('PDF error: '+e.message);}}else if(ext==='docx'||ext==='doc'){toast('Extracting DOCX…');try{var t=await extractDOCX(file);docFile={name:file.name,text:t};updateDocBar();toast('DOCX ready');}catch(e){toast('DOCX error: '+e.message);}}else toast('Use PDF or DOCX only');}
async function extractPDF(file){if(!window.pdfjsLib)throw new Error('PDF support unavailable.');var buf=await file.arrayBuffer();var pdf=await window.pdfjsLib.getDocument({data:buf}).promise;var text='';for(var p=1;p<=pdf.numPages;p++){var pg=await pdf.getPage(p);var ct=await pg.getTextContent();text+=ct.items.map(function(x){return x.str;}).join(' ')+'\n\n';}return text.trim();}
async function extractDOCX(file){var u8=new Uint8Array(await file.arrayBuffer()),pos=0;while(pos<u8.length-4){if(u8[pos]===0x50&&u8[pos+1]===0x4B&&u8[pos+2]===0x03&&u8[pos+3]===0x04){var comp=u8[pos+8]|(u8[pos+9]<<8),csz=u8[pos+18]|(u8[pos+19]<<8)|(u8[pos+20]<<16)|(u8[pos+21]<<24);var fnl=u8[pos+26]|(u8[pos+27]<<8),exl=u8[pos+28]|(u8[pos+29]<<8);var fn=new TextDecoder().decode(u8.slice(pos+30,pos+30+fnl)),ds=pos+30+fnl+exl;if(fn==='word/document.xml'){var xml;if(comp===0){xml=u8.slice(ds,ds+csz);}else if(comp===8){var c=u8.slice(ds,ds+csz),ds2=new DecompressionStream('deflate-raw'),w=ds2.writable.getWriter(),r2=ds2.readable.getReader();w.write(c);w.close();var cks=[],rd;while(true){rd=await r2.read();if(rd.done)break;cks.push(rd.value);}var tot=cks.reduce(function(s,ch){return s+ch.length;},0);xml=new Uint8Array(tot);var off=0;cks.forEach(function(ch){xml.set(ch,off);off+=ch.length;});}if(xml)return new TextDecoder().decode(xml).replace(/<w:br[^>]*\/>/g,'\n').replace(/<w:p[ >][^>]*>/g,'\n').replace(/<[^>]+>/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/ {2,}/g,' ').trim();}pos=ds+csz;}else pos++;}throw new Error('Could not find content in DOCX');}

function updateDocBar(){ var b=document.getElementById('docbar'),n=document.getElementById('docnm'); docFile?(b.classList.add('on'),n.textContent=docFile.name):(b.classList.remove('on'),n.textContent=''); }
function removeDoc(){ docFile=null; updateDocBar(); toast('Document removed'); }
function setBusy(v){ busy=v; stopFlag=false; document.getElementById('sendbtn').disabled=v; var s=document.getElementById('stopbtn'); v?s.classList.add('on'):s.classList.remove('on'); }
function doStop(){ stopFlag=true; if(streamRdr){try{streamRdr.cancel();}catch(e){}} }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }
function useSug(t){ var i=document.getElementById('inp'); i.value=t; resize(i); i.focus(); }
function copyMsg(btn){ var row=btn.closest('.mr'); navigator.clipboard.writeText(row.querySelector('.mc').innerText).then(function(){toast('Copied');}).catch(function(){toast('Copy failed');}); }
var _tt;
function toast(msg){ var e=document.getElementById('toast'); e.textContent=msg; e.classList.add('on'); clearTimeout(_tt); _tt=setTimeout(function(){e.classList.remove('on');},2400); }
</script>
