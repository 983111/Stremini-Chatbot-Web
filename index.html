<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreminiAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════
   DESIGN TOKENS — Deep Space
═══════════════════════════════════════════════ */
:root, [data-theme="dark"] {
  /* Sidebar — deep space dark */
  --bg-sidebar:    #080d1e;
  --bg-sidebar2:   #030710;

  /* Main — near-black cosmos */
  --bg-main:       #090f20;
  --bg-main2:      #0a1525;
  --bg-card:       #0c1830;
  --bg-card-hover: #0f2040;
  --bg-input:      #0c1628;
  --bg-input-focus:#0e1c38;

  /* Sidebar text */
  --sb-tx:         #ddeeff;
  --sb-tx2:        #7a9aba;
  --sb-tx3:        #4a6070;
  --sb-active-bg:  rgba(80,160,255,0.08);
  --sb-active-bdr: rgba(80,160,255,0.22);
  --sb-hover-bg:   rgba(80,160,255,0.05);
  --sb-bdr:        rgba(80,160,255,0.08);

  /* Main area text */
  --tx:            #eaf2ff;
  --tx2:           #8bb8d8;
  --tx3:           #4a6a88;

  /* Accent — cyan-blue nebula glow */
  --acc:           #38b2ff;
  --acc2:          #60c8ff;
  --acc-bg:        rgba(56,178,255,0.08);
  --acc-bdr:       rgba(56,178,255,0.20);

  /* Borders */
  --bdr-card:      rgba(56,130,220,0.15);
  --bdr-input:     rgba(56,130,220,0.20);
  --bdr-strong:    rgba(56,178,255,0.40);

  /* Semantic */
  --red:           #ff5a6e;
  --green:         #3dffa0;
  --blue:          #38b2ff;

  /* Typography */
  --font:          'Space Grotesk', ui-sans-serif, sans-serif;
  --serif:         'Space Mono', monospace;
  --mono:          'JetBrains Mono', ui-monospace, monospace;

  /* Layout */
  --sw:            264px;
  --topbar-h:      52px;
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     14px;
  --radius-xl:     18px;
  --radius-2xl:    24px;

  /* Shadows — neon glow */
  --sh-card:       0 1px 3px rgba(0,0,0,0.40), 0 4px 20px rgba(0,20,60,0.50), inset 0 1px 0 rgba(80,160,255,0.06);
  --sh-card-hover: 0 2px 8px rgba(0,0,0,0.50), 0 8px 40px rgba(20,60,120,0.40), 0 0 0 1px rgba(56,178,255,0.15);
  --sh-input:      0 1px 2px rgba(0,0,0,0.30), inset 0 0 0 1.5px var(--bdr-input);
  --sh-input-focus:0 0 0 3px rgba(56,178,255,0.16), inset 0 0 0 1.5px var(--acc), 0 0 20px rgba(56,178,255,0.10);
  --sh-orb:        0 0 30px rgba(56,178,255,0.50), 0 0 60px rgba(56,178,255,0.20), 0 8px 32px rgba(0,0,0,0.50), inset 0 1px 0 rgba(255,255,255,0.20);
  --sh-send:       0 0 20px rgba(56,178,255,0.55), 0 4px 16px rgba(0,0,0,0.40);
}

[data-theme="light"] {
  --bg-sidebar:    #080d1e;
  --bg-main:       #090f20;
  --bg-main2:      #0a1525;
  --bg-card:       #0c1830;
  --bg-card-hover: #0f2040;
  --bg-input:      #0c1628;
  --bg-input-focus:#0e1c38;
  --tx:            #eaf2ff;
  --tx2:           #8bb8d8;
  --tx3:           #4a6a88;
}

/* ═══════════════════════════════════
   RESET
═══════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  background: #030710;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(56,178,255,0.95); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(56,178,255,0.95); }

/* ═══════════════════════════════════
   LOADING
═══════════════════════════════════ */
#loading {
  position: fixed; inset: 0;
  background: #04070f;
  display: flex; align-items: center; justify-content: center;
  z-index: 200; flex-direction: column; gap: 18px;
}
.load-orb {
  width: 56px; height: 56px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 40%, #0055cc 100%);
  box-shadow: var(--sh-orb);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 0.01em;
  animation: orbBreath 2s ease-in-out infinite;
}
@keyframes orbBreath {
  0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(56,178,255,0.50), 0 0 60px rgba(56,178,255,0.20), 0 8px 32px rgba(0,0,0,0.50); }
  50% { transform: scale(1.04); box-shadow: 0 0 50px rgba(56,178,255,0.80), 0 0 100px rgba(56,178,255,0.35), 0 12px 48px rgba(0,0,0,0.60); }
}
.load-txt {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; color: #4a6a88;
}

/* ═══════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════ */
#auth-screen {
  position: fixed; inset: 0;
  background: #030710;
  display: none; align-items: center; justify-content: center; z-index: 100;
}
#auth-screen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(20,80,200,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(80,20,160,0.15) 0%, transparent 60%);
  pointer-events: none;
}
.auth-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 400px; padding: 44px 40px;
  background: #0a1020;
  border: 1px solid rgba(56,130,220,0.20);
  border-radius: var(--radius-2xl);
  box-shadow: 0 0 0 1px rgba(56,178,255,0.05), 0 40px 80px rgba(0,0,0,0.60), 0 0 80px rgba(20,60,160,0.20);
  animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn { from { opacity:0; transform:translateY(24px) scale(0.97) } to { opacity:1; transform:none } }
.auth-logo { display:flex; align-items:center; gap:14px; margin-bottom:32px; }
.auth-orb {
  width: 44px; height: 44px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 40%, #0044aa 100%);
  box-shadow: var(--sh-orb);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.05em;
}
.auth-logo-name { font-family: var(--font); font-size: 17px; font-weight: 700; letter-spacing: 0.01em; color: #eaf2ff; }
.auth-logo-sub { font-family: var(--font); font-size: 11px; color: #6a90b0; letter-spacing: 0.04em; margin-top: 2px; }
.auth-tabs {
  display: flex; background: rgba(0,10,30,0.60);
  border: 1px solid var(--bdr-card); border-radius: var(--radius-md);
  padding: 3px; margin-bottom: 22px; gap: 2px;
}
.auth-tab {
  flex: 1; padding: 8px 0; border: none; background: none; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 500; color: #6a90b0;
  border-radius: var(--radius-sm); transition: all 0.2s; letter-spacing: 0.01em;
}
.auth-tab.active { background: rgba(56,178,255,0.95); color: var(--acc); box-shadow: 0 0 12px rgba(56,178,255,0.15); }
.auth-field { margin-bottom: 14px; }
.auth-field label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:var(--tx3); margin-bottom:6px; }
.auth-field input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--bdr-input); border-radius: var(--radius-md);
  font-family: var(--font); font-size: 14px; color: var(--tx);
  background: var(--bg-input); outline: none; transition: all 0.2s;
}
.auth-field input:focus { border-color: var(--acc); box-shadow: var(--sh-input-focus); background: var(--bg-input-focus); }
.auth-submit {
  width: 100%; padding: 12px; border: none; border-radius: var(--radius-md);
  background: linear-gradient(135deg, #38b2ff 0%, #0077dd 50%, #0044aa 100%);
  color: #fff; font-family: var(--font); font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
  cursor: pointer; margin-top: 8px;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: var(--sh-send);
}
.auth-submit:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 30px rgba(56,178,255,0.70), 0 4px 20px rgba(0,0,0,0.40); }
.auth-submit:active { transform: scale(0.98); }
.auth-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.auth-msg { font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
.auth-msg.err { color: var(--red); } .auth-msg.ok { color: var(--green); }
.auth-divider {
  text-align: center; font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--tx3); margin: 18px 0 14px;
  display: flex; align-items: center; gap: 12px;
}
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--bdr-card); }
.auth-google {
  width: 100%; padding: 11px; border: 1.5px solid var(--bdr-input);
  border-radius: var(--radius-md); background: var(--bg-input);
  font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--tx2);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.2s;
}
.auth-google:hover { background: var(--bg-input-focus); border-color: var(--acc); box-shadow: 0 0 12px rgba(56,178,255,0.12); }
.auth-google:disabled { opacity: 0.6; cursor: not-allowed; }

/* ═══════════════════════════════════
   APP LAYOUT — Space Canvas
═══════════════════════════════════ */
#app {
  display: none; height: 100vh; overflow: hidden;
  flex-direction: row; position: relative; z-index: 1;
  /* Deep space gradient base */
  background:
    radial-gradient(ellipse 100% 60% at 50% -5%, rgba(15,60,160,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 15%, rgba(60,10,120,0.30) 0%, transparent 50%),
    radial-gradient(ellipse 40% 25% at 15% 75%, rgba(10,80,160,0.20) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 50% 110%, rgba(8,30,100,0.40) 0%, transparent 60%),
    #04070f;
  /* Star field using background-image on #app itself */
  background-image:
    /* Nebula gradients */
    radial-gradient(ellipse 100% 60% at 50% -5%, rgba(15,60,160,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 15%, rgba(60,10,120,0.30) 0%, transparent 50%),
    radial-gradient(ellipse 40% 25% at 15% 75%, rgba(10,80,160,0.20) 0%, transparent 50%),
    /* Stars layer 1 - small */
    radial-gradient(1px 1px at 8% 12%, rgba(210,230,255,0.80) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 5%,  rgba(210,230,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 23% 20%, rgba(210,230,255,0.65) 0%, transparent 100%),
    radial-gradient(1px 1px at 31% 8%,  rgba(210,230,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 15%, rgba(210,230,255,0.70) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 3%,  rgba(210,230,255,0.50) 0%, transparent 100%),
    radial-gradient(1px 1px at 58% 18%, rgba(210,230,255,0.60) 0%, transparent 100%),
    radial-gradient(1px 1px at 67% 9%,  rgba(210,230,255,0.75) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 22%, rgba(210,230,255,0.50) 0%, transparent 100%),
    radial-gradient(1px 1px at 83% 6%,  rgba(210,230,255,0.65) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 17%, rgba(210,230,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 97% 11%, rgba(210,230,255,0.70) 0%, transparent 100%),
    /* Stars layer 2 - mid */
    radial-gradient(1px 1px at 4%  35%, rgba(210,230,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 12% 42%, rgba(210,230,255,0.60) 0%, transparent 100%),
    radial-gradient(2px 2px at 20% 30%, rgba(230,245,255,0.90) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 50%, rgba(210,230,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 37% 38%, rgba(210,230,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 46% 55%, rgba(210,230,255,0.40) 0%, transparent 100%),
    radial-gradient(2px 2px at 55% 32%, rgba(230,245,255,0.85) 0%, transparent 100%),
    radial-gradient(1px 1px at 63% 48%, rgba(210,230,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 40%, rgba(210,230,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 58%, rgba(210,230,255,0.65) 0%, transparent 100%),
    radial-gradient(2px 2px at 88% 36%, rgba(230,245,255,0.80) 0%, transparent 100%),
    radial-gradient(1px 1px at 94% 52%, rgba(210,230,255,0.50) 0%, transparent 100%),
    /* Stars layer 3 - bottom half */
    radial-gradient(1px 1px at 6%  68%, rgba(210,230,255,0.50) 0%, transparent 100%),
    radial-gradient(1px 1px at 14% 78%, rgba(210,230,255,0.35) 0%, transparent 100%),
    radial-gradient(2px 2px at 22% 62%, rgba(230,245,255,0.75) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 85%, rgba(210,230,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 38% 72%, rgba(210,230,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 47% 90%, rgba(210,230,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 56% 65%, rgba(210,230,255,0.60) 0%, transparent 100%),
    radial-gradient(2px 2px at 64% 80%, rgba(230,245,255,0.70) 0%, transparent 100%),
    radial-gradient(1px 1px at 73% 70%, rgba(210,230,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 81% 88%, rgba(210,230,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 89% 75%, rgba(210,230,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 96% 82%, rgba(210,230,255,0.60) 0%, transparent 100%);
  background-color: #04070f;
}

@keyframes twinkle {
  0%   { opacity: 0.55; }
  50%  { opacity: 1;    }
  100% { opacity: 0.65; }
}

/* Twinkling star overlay on #app */
#app::after {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 18% 28%, rgba(220,240,255,0.90) 0%, transparent 100%),
    radial-gradient(1px 1px at 33% 62%, rgba(220,240,255,0.70) 0%, transparent 100%),
    radial-gradient(2px 2px at 48% 18%, rgba(220,240,255,1.00) 0%, transparent 100%),
    radial-gradient(1px 1px at 61% 74%, rgba(220,240,255,0.80) 0%, transparent 100%),
    radial-gradient(1px 1px at 76% 44%, rgba(220,240,255,0.65) 0%, transparent 100%),
    radial-gradient(2px 2px at 88% 28%, rgba(220,240,255,0.90) 0%, transparent 100%),
    radial-gradient(1px 1px at 7%  55%, rgba(220,240,255,0.75) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 88%, rgba(220,240,255,0.60) 0%, transparent 100%),
    radial-gradient(1px 1px at 53% 95%, rgba(220,240,255,0.70) 0%, transparent 100%),
    radial-gradient(2px 2px at 70% 8%,  rgba(220,240,255,0.95) 0%, transparent 100%);
  animation: twinkle 6s ease-in-out infinite alternate;
}

/* ═══════════════════════════════════
   SIDEBAR — deep space
═══════════════════════════════════ */
#sb {
  width: var(--sw);
  background: rgba(4,8,20,0.82);
  z-index: 2;
  display: flex; flex-direction: column; flex-shrink: 0;
  z-index: 20; position: relative;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  border-right: 1px solid rgba(56,130,220,0.18);
  box-shadow: inset -1px 0 0 rgba(56,130,220,0.08);
}
#sb::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 200px;
  background: radial-gradient(ellipse 100% 100% at 50% 0%, rgba(56,130,255,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
#sb > * { position: relative; z-index: 1; }
#sb.collapsed { transform: translateX(calc(-1 * var(--sw))); position: absolute; height: 100%; }

.sb-top {
  display: flex; align-items: center;
  padding: 14px 12px 12px; gap: 6px;
  border-bottom: 1px solid rgba(56,130,220,0.14);
}
.brand { display:flex; align-items:center; gap:10px; flex:1; }
.b-orb {
  width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 45%, #0044aa 100%);
  box-shadow: 0 0 12px rgba(56,178,255,0.50), 0 2px 8px rgba(0,0,0,0.40);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.05em;
  flex-shrink: 0; transition: transform 0.2s, box-shadow 0.2s;
}
.b-orb:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(56,178,255,0.80), 0 2px 8px rgba(0,0,0,0.40); }
.bname { font-family: var(--font); font-size: 14px; font-weight: 600; color: #ddeeff; letter-spacing: 0.02em; }

.ib {
  background: none; border: none; cursor: pointer; color: var(--sb-tx2);
  padding: 6px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.ib:hover { background: var(--sb-hover-bg); color: var(--acc); }
.ib-new {
  background: rgba(56,178,255,0.08);
  border: 1px solid rgba(56,178,255,0.15);
  color: var(--sb-tx);
}
.ib-new:hover { background: rgba(56,178,255,0.15) !important; color: var(--acc) !important; box-shadow: 0 0 10px rgba(56,178,255,0.20); }

.clist { flex:1; overflow-y:auto; padding: 6px 8px; }
.clabel {
  font-family: var(--font); font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.10em; color: #4a6070;
  padding: 12px 8px 4px;
}
.ci {
  display: flex; align-items: center; padding: 7px 10px;
  border-radius: var(--radius-md); cursor: pointer;
  font-size: 12px; font-weight: 400; color: var(--sb-tx2);
  margin-bottom: 1px; border: 1px solid transparent;
  gap: 10px; transition: all 0.15s; letter-spacing: 0.02em;
}
.ci:hover { background: var(--sb-hover-bg); color: var(--sb-tx); border-color: rgba(56,178,255,0.08); }
.ci.active { background: var(--sb-active-bg); border-color: var(--sb-active-bdr); color: var(--acc); box-shadow: 0 0 12px rgba(56,178,255,0.08); }
.ci-icon {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 11px;
  background: rgba(56,178,255,0.06); color: var(--sb-tx2);
  border: 1px solid rgba(56,178,255,0.10);
}
.ci.active .ci-icon { background: rgba(56,178,255,0.95); color: var(--acc); border-color: rgba(56,178,255,0.25); }
.ci-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ci-del {
  opacity: 0; background: none; border: none; cursor: pointer;
  color: var(--sb-tx3); padding: 2px 5px; border-radius: 4px;
  font-size: 11px; transition: all 0.15s; flex-shrink: 0;
}
.ci:hover .ci-del { opacity: 1; }
.ci-del:hover { color: var(--red); background: rgba(255,90,110,0.95); }

.sb-foot {
  padding: 8px 10px 12px;
  border-top: 1px solid rgba(56,130,220,0.14);
}
.ctx-btn {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--radius-md); border: none;
  background: none; cursor: pointer; font-family: var(--font);
  font-size: 12px; font-weight: 500; color: var(--sb-tx2); letter-spacing: 0.04em;
  transition: all 0.15s; margin-bottom: 4px;
}
.ctx-btn:hover { background: var(--sb-hover-bg); color: var(--acc); }
#ctx-panel { display: none; padding: 6px 4px 4px; }
#ctx-panel.open { display: block; }
#ctx-panel textarea {
  width: 100%; border: 1.5px solid rgba(56,178,255,0.15);
  border-radius: var(--radius-md); padding: 9px 12px;
  font-family: var(--font); font-size: 12px; color: var(--sb-tx);
  resize: none; outline: none; line-height: 1.5; height: 85px;
  background: rgba(4,10,26,0.90); transition: border-color 0.2s;
}
#ctx-panel textarea:focus { border-color: var(--acc); box-shadow: 0 0 12px rgba(56,178,255,0.15); }
#ctx-panel textarea::placeholder { color: var(--sb-tx3); }
.ctx-save {
  margin-top: 6px; width: 100%; padding: 7px; border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #38b2ff, #0055cc);
  color: #fff; font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.02em;
}
.ctx-save:hover { opacity: 0.88; }

.urow {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-md);
  cursor: default; transition: background 0.15s;
}
.urow:hover { background: var(--sb-hover-bg); }
.uav {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 50%, #0044aa 100%);
  box-shadow: 0 0 10px rgba(56,178,255,0.40);
}
.uinfo { flex:1; min-width:0; }
.ulabel { font-size: 12px; font-weight: 600; color: var(--sb-tx); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.uemail { font-size: 10px; color: var(--sb-tx3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.signout-btn {
  background: none; border: none; cursor: pointer; color: var(--sb-tx3);
  padding: 5px; border-radius: 5px; display:flex; align-items:center;
  transition: all 0.15s;
}
.signout-btn:hover { color: var(--red); background: rgba(255,90,110,0.95); }

/* ═══════════════════════════════════
   MAIN PANEL — cosmos
═══════════════════════════════════ */
#main {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  background: transparent;
  position: relative;
  z-index: 2;
}

/* subtle vignette overlay on main */
#main::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(10,40,120,0.18) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

#topbar {
  display: flex; align-items: center; padding: 0 20px;
  height: var(--topbar-h);
  background: rgba(4,8,22,0.70);
  border-bottom: 1px solid rgba(56,130,220,0.20);
  flex-shrink: 0; gap: 10px;
  position: relative; z-index: 5;
}

.mpill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 14px 5px 10px; border-radius: 99px;
  border: 1px solid rgba(56,178,255,0.20);
  background: rgba(56,178,255,0.06);
  font-family: var(--font); font-size: 12.5px; font-weight: 600; color: #ddeeff; letter-spacing: 0.01em;
  box-shadow: 0 0 12px rgba(56,178,255,0.10);
}
.mdot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--acc); flex-shrink: 0;
  box-shadow: 0 0 6px var(--acc), 0 0 12px rgba(56,178,255,0.50);
  animation: pulseDot 2s ease-in-out infinite;
}
@keyframes pulseDot {
  0%,100%{ box-shadow: 0 0 6px var(--acc), 0 0 12px rgba(56,178,255,0.50); }
  50%{ box-shadow: 0 0 10px var(--acc), 0 0 20px rgba(56,178,255,0.80); }
}

#domain-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: .10em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 99px;
  transition: all 0.3s;
}

#theme-toggle {
  width: 34px; height: 34px; border-radius: var(--radius-md);
  border: 1px solid var(--bdr-card);
  background: rgba(56,178,255,0.05);
  cursor: pointer; display:flex; align-items:center; justify-content:center;
  color: var(--tx2); flex-shrink: 0; transition: all 0.2s;
}
#theme-toggle:hover { background: rgba(56,178,255,0.95); color: var(--acc); box-shadow: 0 0 10px rgba(56,178,255,0.20); }
#theme-toggle .i-sun, #theme-toggle .i-moon { position:absolute; transition: opacity 0.2s, transform 0.25s; }
[data-theme="light"] .i-sun  { opacity:1; transform:rotate(0deg) scale(1); }
[data-theme="light"] .i-moon { opacity:0; transform:rotate(90deg) scale(0.5); }
[data-theme="dark"]  .i-sun  { opacity:0; transform:rotate(-90deg) scale(0.5); }
[data-theme="dark"]  .i-moon { opacity:1; transform:rotate(0deg) scale(1); }

/* ═══════════════════════════════════
   CHAT AREA
═══════════════════════════════════ */
#chat-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; position:relative; z-index:1; scroll-behavior:smooth; background: transparent; }

/* ── WELCOME ── */
#welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px 0; gap: 28px; text-align: center;
  animation: wIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
  background: transparent;
  position: relative; z-index: 1;
}
@keyframes wIn { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:none } }

/* Cosmic orb */
.w-orb-wrap { position:relative; width:96px; height:96px; display:flex; align-items:center; justify-content:center; }
.w-orb-ring {
  position: absolute; inset: -12px; border-radius: 50%;
  border: 1px solid rgba(56,178,255,0.25);
  animation: ringPulse 4s ease infinite;
  box-shadow: inset 0 0 20px rgba(56,178,255,0.05);
}
.w-orb-ring2 {
  position: absolute; inset: -26px; border-radius: 50%;
  border: 1px solid rgba(56,178,255,0.10);
  animation: ringPulse 4s ease infinite 1.5s;
}
/* Orbital dot */
.w-orb-ring::after {
  content: '';
  position: absolute; top: -4px; left: 50%;
  width: 6px; height: 6px; border-radius: 50%; margin-left: -3px;
  background: var(--acc);
  box-shadow: 0 0 8px var(--acc), 0 0 16px rgba(56,178,255,0.60);
  animation: orbitDot 4s linear infinite;
}
@keyframes orbitDot {
  0% { transform: rotate(0deg) translateX(60px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
}
@keyframes ringPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.04)} }

.w-orb {
  width: 96px; height: 96px; border-radius: 50%;
  background: radial-gradient(circle at 30% 28%, #a0d8ff 0%, #38b2ff 35%, #0055cc 65%, #001266 100%);
  box-shadow:
    0 0 40px rgba(56,178,255,0.60),
    0 0 80px rgba(56,178,255,0.25),
    0 0 120px rgba(20,80,200,0.20),
    0 8px 32px rgba(0,0,0,0.60),
    inset 0 2px 6px rgba(255,255,255,0.25),
    inset -4px -4px 12px rgba(0,0,40,0.50);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 36px; font-weight: 700;
  color: rgba(255,255,255,0.95); letter-spacing: 0.05em;
  position: relative; z-index: 1;
  transition: transform 0.3s, box-shadow 0.3s;
}
.w-orb:hover {
  transform: scale(1.04);
  box-shadow: 0 0 60px rgba(56,178,255,0.80), 0 0 120px rgba(56,178,255,0.35), 0 0 160px rgba(20,80,200,0.25), 0 8px 32px rgba(0,0,0,0.60), inset 0 2px 6px rgba(255,255,255,0.25);
}

.whead { display:flex; flex-direction:column; align-items:center; gap:8px; max-width:700px; width:100%; }
.wtitle {
  font-family: var(--font);
  font-size: 38px; font-weight: 700;
  letter-spacing: -0.01em; line-height: 1.2;
  color: #eaf2ff;
  text-shadow: 0 0 40px rgba(56,178,255,0.25);
}
.wsub { font-size: 14px; font-weight: 400; color: #6a90b0; letter-spacing: 0.02em; }

/* ── SUGGESTION CARDS — space themed ── */
.sugs {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 12px; max-width: 780px; width: 100%;
}
.sc {
  background: rgba(8,18,44,0.68);
  border: 1px solid rgba(56,130,220,0.22);
  border-radius: var(--radius-xl);
  padding: 0; cursor: pointer; text-align: left;
  font-family: var(--font);
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  box-shadow: var(--sh-card);
  position: relative; overflow: hidden;
  min-height: 80px;
}
.sc::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(56,178,255,0.30), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.sc:hover {
  transform: translateY(-3px);
  background: rgba(10,25,60,0.90);
  border-color: rgba(56,178,255,0.40);
  box-shadow: 0 0 0 1px rgba(56,178,255,0.15), 0 8px 30px rgba(0,20,80,0.50), 0 0 40px rgba(56,178,255,0.08);
}
.sc:hover::before { opacity: 1; }
.sc:active { transform: translateY(-1px); }
.sc-inner {
  display: flex; align-items: center; gap: 0; height: 100%;
}
.sc-text {
  flex: 1; padding: 20px 20px 20px 22px;
}
.sc strong {
  display: block; font-size: 13.5px; font-weight: 600;
  color: #eaf2ff; letter-spacing: 0.02em; margin-bottom: 3px;
}
.sc span {
  font-size: 12px; color: #8bb8d8; line-height: 1.4;
  font-weight: 400;
}
.sc-img-wrap {
  width: 80px; height: 80px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
  position: relative;
}
.sc-emoji {
  font-size: 44px; line-height: 1;
  filter: drop-shadow(0 0 8px rgba(56,178,255,0.40));
  transition: transform 0.25s, filter 0.25s;
  user-select: none;
}
.sc:hover .sc-emoji { transform: scale(1.14) rotate(-4deg); filter: drop-shadow(0 0 14px rgba(56,178,255,0.70)); }

/* ═══════════════════════════════════
   MESSAGES
═══════════════════════════════════ */
#msgs-wrap {
  max-width: 780px; width: 100%; margin: 0 auto;
  padding: 24px 28px 0; display: none; flex-direction: column;
  position: relative; z-index: 1;
  background: transparent;
}
.mr {
  padding: 20px 0; display: flex; gap: 14px;
  border-bottom: 1px solid rgba(56,130,220,0.10);
  animation: msgIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
}
.mr:last-child { border-bottom: none; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }

.mav {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.mav.ai {
  background: radial-gradient(circle at 35% 35%, #80d0ff 0%, #38b2ff 50%, #0044aa 100%);
  color: #fff;
  font-family: var(--serif); font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
  box-shadow: 0 0 12px rgba(56,178,255,0.50), 0 2px 8px rgba(0,0,0,0.40);
}
.mav.usr {
  background: rgba(10,25,55,0.80);
  border: 1px solid rgba(56,130,220,0.25); color: var(--tx2);
}

.mbody { flex:1; min-width:0; }
.mname {
  font-family: var(--font); font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--tx3); margin-bottom: 8px;
}
.mc { color: #ddeeff; font-size: 14px; line-height: 1.80; }
.mc > * + * { margin-top: 10px; }
.mc p { margin:0; } .mc p+p { margin-top: 10px; }
.mc ul { padding-left: 22px; list-style: disc; } .mc ol { padding-left: 22px; list-style: decimal; }
.mc li { margin-bottom: 4px; line-height: 1.68; }
.mc h1 { font-family:var(--font); font-size:20px; font-weight:700; margin:18px 0 6px; letter-spacing:-0.01em; line-height:1.3; color:#60c8ff; }
.mc h2 { font-family:var(--font); font-size:15px; font-weight:600; margin:16px 0 5px; letter-spacing:-0.01em; border-bottom:1px solid rgba(56,130,220,0.18); padding-bottom:6px; color:#c8dff5; }
.mc h3 { font-size:13px; font-weight:600; margin:12px 0 4px; color:#6a90b0; letter-spacing:0.01em; font-family:var(--font); }
.mc h1:first-child, .mc h2:first-child, .mc h3:first-child { margin-top:0; }
.mc strong { font-weight:600; color:var(--acc2); } .mc em { font-style:italic; color:var(--tx2); }
.mc a { color:var(--acc); text-decoration:underline; text-underline-offset:3px; }
.mc code {
  font-family: var(--mono);
  background: rgba(56,178,255,0.08);
  border: 1px solid rgba(56,178,255,0.20);
  border-radius: 4px; padding: 2px 6px; font-size: 12.5px; color: var(--acc2);
}
.mc pre {
  background: rgba(4,10,25,0.90); border: 1px solid rgba(56,130,220,0.20);
  border-radius: var(--radius-md); padding: 16px 18px; overflow-x: auto;
  font-size: 13px; line-height: 1.7;
  box-shadow: inset 0 1px 0 rgba(56,178,255,0.06);
}
.mc pre code { background:none; border:none; padding:0; color:#a8d8ff; }
.mc blockquote {
  border-left: 2px solid var(--acc); padding: 8px 0 8px 16px;
  color: var(--tx2); font-style: italic;
  background: rgba(56,178,255,0.05);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.mc hr { border:none; border-top:1px solid rgba(56,130,220,0.15); }
.mc table { width:100%; border-collapse:collapse; font-size:13.5px; }
.mc th { background:rgba(56,178,255,0.08); font-weight:600; text-align:left; padding:8px 12px; border:1px solid rgba(56,130,220,0.20); font-family:var(--font); font-size:12px; text-transform:uppercase; letter-spacing:0.05em; color:#38b2ff; }
.mc td { padding:7px 12px; border:1px solid rgba(56,130,220,0.12); vertical-align:top; color:var(--tx2); }
.mc tr:nth-child(even) td { background:rgba(56,178,255,0.03); }

.macts { display:flex; gap:4px; margin-top:10px; opacity:0; transition:opacity 0.15s; }
.mr:hover .macts { opacity:1; }
.abt {
  background: none; border:1px solid transparent; cursor:pointer;
  color:var(--tx3); padding:4px 9px; border-radius:5px;
  font-size:11px; font-family:var(--font); font-weight:500;
  display:flex; align-items:center; gap:4px; transition:all 0.15s; letter-spacing:0.04em;
}
.abt:hover { background:rgba(56,178,255,0.08); border-color:rgba(56,178,255,0.20); color:var(--acc); }

.typing { display:flex; gap:4px; align-items:center; padding:6px 0; }
.td {
  width: 5px; height: 5px; background: var(--acc); border-radius: 50%;
  animation: tdBounce 1.2s ease infinite;
  box-shadow: 0 0 6px var(--acc);
}
.td:nth-child(2) { animation-delay:.14s; } .td:nth-child(3) { animation-delay:.28s; }
@keyframes tdBounce { 0%,60%,100%{transform:translateY(0);opacity:.25} 30%{transform:translateY(-6px);opacity:1} }
.pad { height: 28px; flex-shrink: 0; }

/* ═══════════════════════════════════
   INPUT SHELL — space glass
═══════════════════════════════════ */
#bottom {
  flex-shrink: 0; padding: 8px 28px 20px;
  position: relative; z-index: 5;
  background: linear-gradient(to top, rgba(4,8,20,0.75) 0%, transparent 100%);
}
#inner { max-width: 780px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 6px; }

#docbar {
  display: none; background: rgba(56,178,255,0.06);
  border: 1px solid var(--acc-bdr); border-radius: var(--radius-md);
  padding: 7px 14px; font-size: 12.5px; color: var(--tx2);
  align-items: center; gap: 8px;
}
#docbar.on { display: flex; }
.dic { color: var(--acc); flex-shrink: 0; }
.dnm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; color:var(--tx); }
.drm {
  background: none; border: none; cursor: pointer; color: var(--tx3);
  padding: 2px 7px; border-radius: 4px; font-size: 11.5px;
  font-family: var(--font); font-weight: 600; transition: all 0.15s;
}
.drm:hover { color: var(--red); background: rgba(255,90,110,0.95); }

/* The main input box */
.shell {
  background: rgba(6,14,35,0.72);
  border: 1.5px solid rgba(56,140,240,0.30);
  border-radius: var(--radius-2xl);
  overflow: hidden;
  transition: all 0.25s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.40), inset 0 1px 0 rgba(56,178,255,0.08);
}
.shell:focus-within {
  border-color: rgba(56,178,255,0.65);
  box-shadow: 0 0 0 3px rgba(56,178,255,0.14), 0 0 28px rgba(56,178,255,0.18), 0 2px 12px rgba(0,0,0,0.40), inset 0 1px 0 rgba(56,178,255,0.12);
  background: rgba(6,16,42,0.85);
}

#inp {
  display: block; width: 100%; background: none; border: none; outline: none;
  resize: none; font-family: var(--font); font-size: 14px; color: #eaf2ff;
  line-height: 1.65; padding: 16px 20px 8px; max-height: 200px;
  overflow-y: auto; min-height: 52px;
}
#inp::placeholder { color: #4a6a88; }

.ibar {
  display: flex; align-items: center; padding: 8px 12px 12px; gap: 4px;
}
.ibar-actions { margin-left: auto; display:flex; align-items:center; gap:6px; }

.bb {
  background: none; border: none; cursor: pointer; color: var(--tx3);
  padding: 6px 11px; border-radius: var(--radius-md);
  font-size: 12px; font-family: var(--font); font-weight: 500;
  display: flex; align-items: center; gap: 5px; transition: all 0.15s; letter-spacing: 0.04em;
}
.bb:hover { background: rgba(56,178,255,0.08); color: var(--acc); }

/* Send button — cosmic blue */
#sendbtn {
  width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0; position: relative; overflow: hidden;
  transition: all 0.2s;
  background: radial-gradient(circle at 40% 35%, #60c8ff 0%, #38b2ff 50%, #0055cc 100%);
  box-shadow: var(--sh-send);
}
#sendbtn::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.20) 0%, transparent 100%);
}
#sendbtn:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(56,178,255,0.80), 0 0 60px rgba(56,178,255,0.30), 0 4px 16px rgba(0,0,0,0.40); }
#sendbtn:active { transform: scale(0.95); }
#sendbtn:disabled { background: rgba(20,40,80,0.95); box-shadow: none; cursor: not-allowed; color: var(--tx3); }
#sendbtn svg { position:relative; z-index:1; }

#stopbtn {
  background: none; border: 1.5px solid rgba(56,130,220,0.25); border-radius: var(--radius-md);
  color: var(--tx2); font-family: var(--font); font-size: 12px; font-weight: 500;
  cursor: pointer; padding: 5px 12px; display: none; align-items: center; gap: 5px;
  transition: all 0.15s; letter-spacing: 0.04em;
}
#stopbtn.on { display: flex; }
#stopbtn:hover { background: rgba(255,90,110,0.08); border-color: rgba(255,90,110,0.30); color: var(--red); }

.disc {
  text-align: center; font-size: 11px; font-weight: 400;
  letter-spacing: 0.01em; color: #4a6a88; padding-top: 6px;
}

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(8,20,50,0.95);
  border: 1px solid rgba(56,178,255,0.30);
  color: var(--acc);
  border-radius: var(--radius-md); padding: 9px 18px;
  font-family: var(--serif); font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase;
  opacity: 0; pointer-events: none; z-index: 999;
  transition: opacity 0.2s, transform 0.2s; white-space: nowrap;
  box-shadow: 0 0 20px rgba(56,178,255,0.20), 0 8px 32px rgba(0,0,0,0.40);
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════
   CODE AGENT RENDERER
═══════════════════════════════════ */
.ca-prose { font-family:var(--font); font-size:14px; line-height:1.75; color:var(--tx); }
.ca-prose p { margin:0 0 .7em } .ca-prose p:last-child { margin-bottom:0 }

   CODE BLOCKS (new renderer)

.code-block {

/* Mermaid wrapper */
.mermaid-wrap {

  10% { opacity: 1; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
}

function scoreAgents(message){var text=(message||'').toLowerCase();var scored=ROUTER_AGENT_IDS.map(function(id){var kws=PROMPT_LIBRARY[id].keywords;var score=0;for(var i=0;i<kws.length;i++)if(text.indexOf(kws[i])!==-1)score++;return{id:id,score:score};});scored.sort(function(a,b){return b.score-a.score;});return scored;}
function parseRouterOutput(raw){var t=String(raw||'').toUpperCase().trim().replace(/[^A-Z_]/g,'');return ROUTER_AGENT_IDS.indexOf(t)!==-1?t:'';}
async function getRoutingDecision(message){var scored=scoreAgents(message);var primaryLocal=scored[0]&&scored[0].score>0?scored[0].id:'CONCEPT_EXPLAINER';var collaboratorsLocal=scored.filter(function(x){return x.id!==primaryLocal&&x.score>0;}).slice(0,2).map(function(x){return x.id;});var routePrompt=['You are the Master Router for Stremini AI.','Analyze the user input and route to exactly ONE specialist ID.','Allowed IDs: '+ROUTER_AGENT_IDS.join(', '),'Return ONLY the exact ID, nothing else.','User input: '+message].join('\n');try{var ctrl=new AbortController();var timer=setTimeout(function(){ctrl.abort();},2500);var res=await fetch(API+'/chat/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:routePrompt,history:[]}),signal:ctrl.signal});clearTimeout(timer);if(res.ok){var d=await res.json();var routed=parseRouterOutput(d&&d.response);if(routed)return{primary:routed,collaborators:collaboratorsLocal,source:'router_model'};}}catch(e){}return{primary:primaryLocal,collaborators:collaboratorsLocal,source:'local_fallback'};}

window.addEventListener('DOMContentLoaded', function () {
  if (window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  try {
    sb = window.supabase.createClient(SB_URL, SB_ANON, { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } });
  } catch (e) { hideLoading(); showAuth('Could not init auth. Please refresh.'); return; }
  sb.auth.onAuthStateChange(function (event, session) {
    if (session && session.user) { currentUser = session.user; if (!booted) { booted = true; startApp(); } }
    else if (event === 'SIGNED_OUT') { currentUser = null; booted = false; chats = {}; activeId = null; messages = []; userContext = ''; document.getElementById('app').style.display = 'none'; showAuth(); }
  });
  sb.auth.getSession().then(function (res) {
    if (res.data && res.data.session) { currentUser = res.data.session.user; if (!booted) { booted = true; startApp(); } }
    else { hideLoading(); showAuth(); }
  }).catch(function () { hideLoading(); showAuth('Connection error. Please refresh.'); });
});

function startApp() {
  hideLoading();
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  updateUserUI();
  upsertUser().then(function () { return Promise.all([loadContext(), loadChats()]); }).catch(console.error);
  resize(document.getElementById('inp'));
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }
function showAuth(msg) { document.getElementById('auth-screen').style.display = 'flex'; setMsg(msg || '', false); }

function switchTab(btn) {
  _activeTab = btn.dataset.tab;
  document.querySelectorAll('.auth-tab').forEach(function (t) { t.classList.toggle('active', t.dataset.tab === _activeTab); });
  document.getElementById('auth-btn').textContent = _activeTab === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('auth-name-field').style.display = _activeTab === 'signup' ? 'block' : 'none';
  setMsg('', false);
}
function setMsg(msg, ok) { var el = document.getElementById('auth-msg'); el.textContent = msg; el.className = 'auth-msg' + (msg ? (ok ? ' ok' : ' err') : ''); }
async function doAuth() {
  var email = document.getElementById('auth-email').value.trim();
  var pass  = document.getElementById('auth-password').value;
  var btn   = document.getElementById('auth-btn');
  setMsg('', false);
  if (!email) { setMsg('Email is required.', false); return; }
  if (!pass || pass.length < 6) { setMsg('Password must be at least 6 characters.', false); return; }
  btn.disabled = true;
  btn.textContent = _activeTab === 'signin' ? 'Signing in…' : 'Creating account…';
  try {
    var res;
    if (_activeTab === 'signin') { res = await sb.auth.signInWithPassword({ email: email, password: pass }); if (res.error) throw res.error; }
    else {
      var name = document.getElementById('auth-name').value.trim() || email.split('@')[0];
      res = await sb.auth.signUp({ email: email, password: pass, options: { data: { display_name: name } } });
      if (res.error) throw res.error;
      if (res.data.user && !res.data.session) {
        setMsg('Check your email to confirm, then sign in.', true);
        document.querySelectorAll('.auth-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab==='signin');});
        _activeTab='signin'; document.getElementById('auth-btn').textContent='Sign in'; document.getElementById('auth-name-field').style.display='none';
        return;
      }
    }
  } catch (e) { setMsg(e.message || 'Authentication failed.', false); }
  finally { btn.disabled = false; btn.textContent = _activeTab === 'signin' ? 'Sign in' : 'Create account'; }
}
async function doGoogle() {
  var btn = document.getElementById('google-btn');
  btn.disabled = true; setMsg('', false);
  try {
    var redirectTo = window.location.origin + window.location.pathname;
    var res = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: redirectTo, queryParams: { access_type: 'offline', prompt: 'consent' } } });
    if (res.error) throw res.error;
  } catch (e) { setMsg(e.message || 'Google sign-in failed.', false); btn.disabled = false; }
}

function getChatIcon(title) {
  var t = (title || '').toLowerCase();
  if (/code|function|api|debug|script|python|javascript|react/.test(t)) return '</>';
  if (/math|equation|calcul|solve|proof/.test(t)) return '∑';
  if (/research|paper|study|analysis/.test(t)) return '◈';
  if (/write|essay|doc|report/.test(t)) return '✎';
  return '·';
}

function renderSidebar() {
  var el = document.getElementById('clist');
  var list = Object.values(chats).sort(function(a,b){ return b.ts-a.ts; });
  if (!list.length) { el.innerHTML = '<div style="padding:12px 8px;font-size:12px;color:var(--sb-tx3);font-weight:400;letter-spacing:0.04em;">No transmissions yet</div>'; return; }
  var now = Date.now(), day = 86400000, g = { Today:[], Yesterday:[], Older:[] };
  list.forEach(function(c){ var age=now-c.ts; if(age<day)g.Today.push(c); else if(age<2*day)g.Yesterday.push(c); else g.Older.push(c); });
  var html = '';
  ['Today','Yesterday','Older'].forEach(function(lbl){
    if(!g[lbl].length) return;
    html += '<div class="clabel">'+lbl+'</div>';
    g[lbl].forEach(function(c){
      var act = c.id===activeId?' active':'';
      var sid = c.id.replace(/['"]/g,'');
      var icon = getChatIcon(c.title);
      html += '<div class="ci'+act+'" onclick="openChat(\''+sid+'\')"><span class="ci-icon">'+icon+'</span><span class="ci-title">'+escHtml(c.title)+'</span><button class="ci-del" onclick="event.stopPropagation();deleteChat(\''+sid+'\')">✕</button></div>';
    });
  });
  el.innerHTML = html;
}

   MARKDOWN + MATH + CODE RENDERER
═══════════════════════════════════ */
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderMath(tex, display) {
  if (window.katex) {
    try { return window.katex.renderToString(tex, { displayMode: display, throwOnError: false, output: 'html' }); }
    catch(e) {}
  }
  return display
    ? '<div class="math-block math-display">\\[' + escHtml(tex) + '\\]</div>'
    : '<span class="math-inline">\\(' + escHtml(tex) + '\\)</span>';
}

function inlineRender(s) {
  if (!s) return '';
  s = s.replace(/\\\(([^)]+?)\\\)/g, function(_, tex) { return renderMath(tex, false); });
  s = s.replace(/(?<!\$)\$(?!\$)([^$\n]+?)(?<!\$)\$(?!\$)/g, function(_, tex) { return renderMath(tex, false); });
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, '<em>$1</em>');
  s = s.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/&lt;br&gt;/gi, '<br>');
  s = s.replace(/<br\s*\/?>/gi, '<br>');
  return s;
}

function buildCodeBlock(lang, code) {
  var id = 'cb_' + Math.random().toString(36).slice(2);
  var langLabel = lang || 'code';
  var highlighted = '';
  if (window.hljs) {
    try {
      highlighted = lang ? hljs.highlight(code, { language: lang, ignoreIllegals: true }).value
                         : hljs.highlightAuto(code).value;
    } catch(e) { highlighted = escHtml(code); }
  } else { highlighted = escHtml(code); }
  return '<div class="code-block">'
    + '<div class="code-block-hd"><span class="code-lang">' + escHtml(langLabel) + '</span>'
    + '<button class="code-copy-btn" onclick="copyCode(this,\'' + id + '\')">'
    + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy</button></div>'
    + '<pre><code id="' + id + '" class="hljs' + (lang ? ' language-' + escHtml(lang) : '') + '">' + highlighted + '</code></pre></div>';
}

function copyCode(btn, id) {
  var el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(function() {
    btn.innerHTML = '✓ Copied'; btn.classList.add('copied');
    setTimeout(function(){ btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderMd(raw) {
  if (!raw) return '';
  var blocks = [];

  raw = raw.replace(/\$\$([\s\S]+?)\$\$/g, function(_, tex) {
    var i = blocks.length;
    blocks.push(renderMath(tex.trim(), true));
    return '\x02B' + i + '\x03';
  });
  raw = raw.replace(/\\\[([\s\S]+?)\\\]/g, function(_, tex) {
    var i = blocks.length;
    blocks.push(renderMath(tex.trim(), true));
    return '\x02B' + i + '\x03';
  });
  raw = raw.replace(/```([\w-]*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    var i = blocks.length;
    var l = (lang || '').toLowerCase();
    if (l === 'mermaid') {
      blocks.push('<div class="mermaid-wrap"><pre class="mermaid">' + escHtml(code.trim()) + '</pre></div>');
    } else {
      blocks.push(buildCodeBlock(l, code.trim()));
    }
    return '\x02B' + i + '\x03';
  });

  function isTableDivider(line) { return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line || ''); }
  function parseTableRow(line) {
    var row = (line || '').trim();
    if (row.startsWith('|')) row = row.slice(1);
    if (row.endsWith('|')) row = row.slice(0, -1);
    return row.split('|').map(function(c) { return c.trim(); });
  }

  var lines = raw.split('\n'), out = [], i = 0;
  while (i < lines.length) {
    var l = lines[i];
    var bm = l.trim().match(/^\x02B(\d+)\x03$/);
    if (bm) { out.push(blocks[+bm[1]]); i++; continue; }
    var hm = l.match(/^(#{1,4})\s+(.+)$/);
    if (hm) { out.push('<h' + hm[1].length + '>' + inlineRender(hm[2]) + '</h' + hm[1].length + '>'); i++; continue; }
    if (l.includes('|') && i + 1 < lines.length && isTableDivider(lines[i + 1])) {
      var headerCells = parseTableRow(l), bodyRows = [];
      i += 2;
      while (i < lines.length && lines[i].trim() && lines[i].includes('|')) { bodyRows.push(parseTableRow(lines[i])); i++; }
      var cols = headerCells.length;
      var thead = '<thead><tr>' + headerCells.map(function(c) { return '<th>' + inlineRender(c) + '</th>'; }).join('') + '</tr></thead>';
      var tbody = '<tbody>' + bodyRows.map(function(r) {
        var cells = []; for (var ci = 0; ci < cols; ci++) cells.push('<td>' + inlineRender(r[ci] || '') + '</td>');
        return '<tr>' + cells.join('') + '</tr>';
      }).join('') + '</tbody>';
      out.push('<div class="table-wrap"><table>' + thead + tbody + '</table></div>');
      continue;
    }
    if (/^---+$/.test(l.trim())) { out.push('<hr>'); i++; continue; }
    if (/^> /.test(l)) {
      var bq = [];
      while (i < lines.length && /^> ?/.test(lines[i])) { bq.push(lines[i].replace(/^> ?/, '')); i++; }
      out.push('<blockquote>' + inlineRender(bq.join(' ')) + '</blockquote>');
      continue;
    }
    if (/^\d+[.)]\s/.test(l)) {
      var ol = [];
      while (i < lines.length && /^\d+[.)]\s/.test(lines[i])) {
        ol.push('<li>' + inlineRender(lines[i].replace(/^\d+[.)]\s+/, '')) + '</li>'); i++;
      }
      out.push('<ol>' + ol.join('') + '</ol>'); continue;
    }
    if (/^[-*•]\s/.test(l) || /^[❌✅⚠️💡🔥⚡►▶]\s/.test(l)) {
      var ul = [];
      while (i < lines.length && (/^[-*•]\s/.test(lines[i]) || /^[❌✅⚠️💡🔥⚡►▶]\s/.test(lines[i]))) {
        ul.push('<li>' + inlineRender(lines[i].replace(/^[-*•❌✅⚠️💡🔥⚡►▶]\s+/, '')) + '</li>'); i++;
      }
      out.push('<ul>' + ul.join('') + '</ul>'); continue;
    }
    var sm = l.match(/^Step\s*(\d+)\s*[:\-—]\s*(.+)$/i);
    if (sm) { out.push('<div class="step-item"><strong>Step ' + escHtml(sm[1]) + '</strong><span>' + inlineRender(sm[2]) + '</span></div>'); i++; continue; }
    if (!l.trim()) { i++; continue; }
    var pl = [];
    while (i < lines.length) {
      var ll = lines[i];
      if (!ll.trim()) break;
      if (/^(#{1,4}\s|> |[-*•]\s|\d+[.)]\s|---+$|\x02B|[❌✅⚠️💡🔥⚡►▶]\s)/.test(ll)) break;
      pl.push(inlineRender(ll)); i++;
    }
    if (pl.length) out.push('<p>' + pl.join('<br>') + '</p>');
  }
  return out.join('\n');
}

function postRender(el) {
  if (!el) return;
  var merms = el.querySelectorAll('pre.mermaid:not([data-processed])');
  if (merms.length && window.mermaid) {
    try {
      merms.forEach(function(m) { m.setAttribute('data-processed','1'); });
      mermaid.init(undefined, merms);
    } catch(e) { console.warn('mermaid error', e); }
  }
  el.querySelectorAll('pre code:not(.hljs)').forEach(function(block) {
    try { hljs.highlightElement(block); } catch(e) {}
  });
  if (window.katex && window.renderMathInElement) {
    try {
      renderMathInElement(el, {
        delimiters: [
          {left:'$$',right:'$$',display:true},
          {left:'\\[',right:'\\]',display:true},
          {left:'$',right:'$',display:false},
          {left:'\\(',right:'\\)',display:false}
        ],
        throwOnError: false
      });
    } catch(e) {}
  }
}

/* ═══════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════ */
async function sendMsg() {
  if (busy || !currentUser) return;
  var inp = document.getElementById('inp'), text = inp.value.trim();
  _lastUserQuery = text;
  if (!text) return;
  if (!activeId) {
    try { activeId = await createChat(text.slice(0, 52) + (text.length > 52 ? '…' : '')); }
    catch (e) { toast('Error creating chat: ' + e.message); return; }
  }
  inp.value = ''; resize(inp);
  var hist = messages.slice(-20).map(function(m) { return { role: m.role, content: m.content }; });
  await saveMessage(activeId, 'user', text);
  if (messages.filter(function(m) { return m.role === 'user'; }).length === 1) { updateChatTitle(activeId, text.slice(0, 52) + (text.length > 52 ? '…' : '')); }
  addMsgRow('user', text);
  setBusy(true);
  var answer = '', detectedDomain = 'general';
  addStreamRow();
  try {
    if (docFile) {
      var docAnswer = await callDoc(text, docFile.text);
      answer = docAnswer || 'No response.';
      finalizeStream(answer, detectedDomain);
      await saveMessage(activeId, 'assistant', answer);
      setBusy(false);
      return;
    }
    answer = await callStream(text, hist, function(domain) {
      detectedDomain = domain || 'general';
      showDomainPill(detectedDomain);
    });
    if (!answer || !answer.trim()) answer = 'No response from model. Please try again.';
    finalizeStream(answer, detectedDomain);
    await saveMessage(activeId, 'assistant', answer);
  } catch (err) {
    var em = err.message === 'stopped' ? '*(Generation stopped)*' : 'Error: ' + escHtml(err.message);
    finalizeStream(em, detectedDomain);
    if (err.message !== 'stopped') await saveMessage(activeId, 'assistant', em);
  } finally { setBusy(false); }
}

/* ═══════════════════════════════════
   API CALLERS
═══════════════════════════════════ */
async function callStream(message, history, onDomain) {
  var res;
  try { res = await fetch(API + '/chat/stream', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message, history: history, userContext: userContext || '' }) }); }
  catch (e) { throw new Error('Network error: ' + e.message); }
  if (!res.ok) { console.warn('Stream failed ' + res.status + ', fallback'); return await callMessage(message, history); }
  var reader = res.body.getReader(); streamRdr = reader;
  var dec = new TextDecoder(), buf = '', full = '';
  try {
    while (true) {
      if (stopFlag) { reader.cancel(); throw new Error('stopped'); }
      var r = await reader.read(); if (r.done) break;
      buf += dec.decode(r.value, { stream: true });
      var lines = buf.split('\n'); buf = lines.pop();
      for (var j = 0; j < lines.length; j++) {
        var line = lines[j].trim();
        if (!line.startsWith('data:')) continue;
        var data = line.slice(5).trim();
        if (data === '[DONE]') return full;
        try { var p = JSON.parse(data); if (p.domain && onDomain) onDomain(p.domain); if (p.token) { full += p.token; updateStream(full); } if (p.error) throw new Error(p.error); } catch (pe) {}
      }
    }
  } finally { streamRdr = null; }
  if (!full.trim()) return await callMessage(message, history);
  return full;
}
async function callMessage(message,history){updateStream('Thinking…');var res;try{res=await fetch(API+'/chat/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,history:history})});}catch(e){throw new Error('Network error: '+e.message);}if(!res.ok){var t=await res.text().catch(function(){return '';});throw new Error('API '+res.status+(t?': '+t:''));}var d=await res.json();if(d.error)throw new Error(d.error);return d.response||'';}
async function callDoc(question,documentText){updateStream('Analyzing document…');var res;try{res=await fetch(API+'/chat/document',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:question,documentText:documentText})});}catch(e){throw new Error('Network error: '+e.message);}if(!res.ok){var t=await res.text().catch(function(){return '';});throw new Error('API '+res.status+(t?': '+t:''));}var d=await res.json();if(d.error)throw new Error(d.error);return d.response||'No response.';}

/* ═══════════════════════════════════
   FILE HANDLING
═══════════════════════════════════ */
async function onFile(e){var file=e.target.files[0];if(!file)return;e.target.value='';var ext=file.name.split('.').pop().toLowerCase();if(ext==='pdf'){toast('Extracting PDF…');try{var t=await extractPDF(file);docFile={name:file.name,text:t};updateDocBar();toast('PDF ready — '+Math.round(t.length/1000)+'k chars');}catch(e){toast('PDF error: '+e.message);}}else if(ext==='docx'||ext==='doc'){toast('Extracting DOCX…');try{var t=await extractDOCX(file);docFile={name:file.name,text:t};updateDocBar();toast('DOCX ready');}catch(e){toast('DOCX error: '+e.message);}}else toast('Use PDF or DOCX only');}
async function extractPDF(file){if(!window.pdfjsLib)throw new Error('PDF support unavailable.');var buf=await file.arrayBuffer();var pdf=await window.pdfjsLib.getDocument({data:buf}).promise;var text='';for(var p=1;p<=pdf.numPages;p++){var pg=await pdf.getPage(p);var ct=await pg.getTextContent();text+=ct.items.map(function(x){return x.str;}).join(' ')+'\n\n';}return text.trim();}
async function extractDOCX(file){var u8=new Uint8Array(await file.arrayBuffer()),pos=0;while(pos<u8.length-4){if(u8[pos]===0x50&&u8[pos+1]===0x4B&&u8[pos+2]===0x03&&u8[pos+3]===0x04){var comp=u8[pos+8]|(u8[pos+9]<<8),csz=u8[pos+18]|(u8[pos+19]<<8)|(u8[pos+20]<<16)|(u8[pos+21]<<24);var fnl=u8[pos+26]|(u8[pos+27]<<8),exl=u8[pos+28]|(u8[pos+29]<<8);var fn=new TextDecoder().decode(u8.slice(pos+30,pos+30+fnl)),ds=pos+30+fnl+exl;if(fn==='word/document.xml'){var xml;if(comp===0){xml=u8.slice(ds,ds+csz);}else if(comp===8){var c=u8.slice(ds,ds+csz),ds2=new DecompressionStream('deflate-raw'),w=ds2.writable.getWriter(),r2=ds2.readable.getReader();w.write(c);w.close();var cks=[],rd;while(true){rd=await r2.read();if(rd.done)break;cks.push(rd.value);}var tot=cks.reduce(function(s,ch){return s+ch.length;},0);xml=new Uint8Array(tot);var off=0;cks.forEach(function(ch){xml.set(ch,off);off+=ch.length;});}if(xml)return new TextDecoder().decode(xml).replace(/<w:br[^>]*\/>/g,'\n').replace(/<w:p[ >][^>]*>/g,'\n').replace(/<[^>]+>/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/ {2,}/g,' ').trim();}pos=ds+csz;}else pos++;}throw new Error('Could not find content in DOCX');}

function updateDocBar(){ var b=document.getElementById('docbar'),n=document.getElementById('docnm'); docFile?(b.classList.add('on'),n.textContent=docFile.name):(b.classList.remove('on'),n.textContent=''); }
function removeDoc(){ docFile=null; updateDocBar(); toast('Document removed'); }
function setBusy(v){ busy=v; stopFlag=false; document.getElementById('sendbtn').disabled=v; var s=document.getElementById('stopbtn'); v?s.classList.add('on'):s.classList.remove('on'); }
function doStop(){ stopFlag=true; if(streamRdr){try{streamRdr.cancel();}catch(e){}} }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }
function useSug(t){ var i=document.getElementById('inp'); i.value=t; resize(i); i.focus(); }
function copyMsg(btn){ var row=btn.closest('.mr'); navigator.clipboard.writeText(row.querySelector('.mc').innerText).then(function(){toast('Copied');}).catch(function(){toast('Copy failed');}); }
var _tt;
function toast(msg){ var e=document.getElementById('toast'); e.textContent=msg; e.classList.add('on'); clearTimeout(_tt); _tt=setTimeout(function(){e.classList.remove('on');},2400); }
